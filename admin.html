<!-- admin.html - لوحة تحكم فاخرة بنفس تصميم الصفحة الرئيسية -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>عشانك • لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0b0b0e;
      color: #f5f5f7;
      line-height: 1.5;
      min-height: 100vh;
      padding: 20px 16px;
      transition: background 0.3s;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, #1a1a2e, #0b0b0e 80%);
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><circle fill="rgba(255,255,255,0.02)" cx="20" cy="20" r="1.5"></circle></pattern></defs><rect width="100%" height="100%" fill="url(%23dots)"></rect></svg>');
      z-index: -1;
      animation: drift 40s linear infinite;
    }
    @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(-40px,-40px); } }

    .container { max-width: 1300px; margin: 0 auto; }

    /* الهيدر الزجاجي */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 16px 24px;
      border-radius: 48px;
      background: rgba(30,30,45,0.6);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 0.5px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 36px; color: #ff9f0a; filter: drop-shadow(0 0 12px #ff9f0a); }
    .logo-text {
      font-size: 34px; font-weight: 800;
      background: linear-gradient(135deg, #fff8e0, #ffd966);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; letter-spacing: -1px;
      text-shadow: 0 0 20px rgba(255,159,10,0.5);
    }
    .admin-badge {
      background: rgba(0,122,255,0.15); padding: 6px 16px; border-radius: 40px;
      color: #007aff; font-weight: 700; font-size: 14px;
      backdrop-filter: blur(10px); border: 0.5px solid rgba(0,122,255,0.3);
    }
    .logout-btn {
      background: rgba(60,60,80,0.5); border: none; padding: 12px 24px; border-radius: 40px;
      font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px;
      cursor: pointer; backdrop-filter: blur(10px); border: 0.5px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }
    .logout-btn:hover { background: rgba(255,59,48,0.2); color: #ff6b6b; }

    /* بطاقة تسجيل الدخول */
    .login-card {
      max-width: 420px; margin: 100px auto; padding: 40px 30px; border-radius: 48px;
      background: rgba(30,30,45,0.7); backdrop-filter: blur(30px);
      box-shadow: 0 30px 50px rgba(0,0,0,0.3); border: 0.5px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    .login-card input {
      width: 100%; padding: 18px; border: none; border-radius: 40px;
      background: rgba(255,255,255,0.08); font-size: 16px; color: #fff;
      margin: 20px 0; text-align: center; border: 0.5px solid rgba(255,255,255,0.1);
    }
    .login-btn {
      background: #007aff; color: white; border: none; padding: 16px; border-radius: 40px;
      font-weight: 700; font-size: 18px; width: 100%; cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,122,255,0.3);
    }

    /* البطاقات الإحصائية */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(40,40,55,0.5); backdrop-filter: blur(20px);
      border-radius: 32px; padding: 24px; border: 0.5px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .stat-value { font-size: 42px; font-weight: 800; color: #ffd966; }
    .stat-label { font-size: 16px; color: #a0a0b0; margin-top: 8px; }

    /* تخطيط dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } }

    /* بطاقة النموذج */
    .form-card {
      background: rgba(30,30,45,0.5); backdrop-filter: blur(20px);
      border-radius: 36px; padding: 28px; margin-bottom: 24px;
      border: 0.5px solid rgba(255,255,255,0.08);
    }
    .section-title {
      font-size: 24px; font-weight: 800; margin-bottom: 28px; display: flex;
      align-items: center; gap: 12px; color: #fff;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group.full-width { grid-column: span 2; }
    label { font-weight: 600; margin-bottom: 8px; display: block; color: #e0e0e0; }
    input, textarea, select {
      width: 100%; padding: 16px 18px; border: none; border-radius: 30px;
      background: rgba(255,255,255,0.06); font-family: 'Cairo'; font-size: 15px;
      color: #fff; border: 0.5px solid rgba(255,255,255,0.05); transition: 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; background: rgba(255,255,255,0.15); box-shadow: 0 0 0 3px rgba(0,122,255,0.2);
    }
    .checkbox-group { display: flex; align-items: center; gap: 20px; margin-top: 8px; }
    .checkbox-group label { display: flex; align-items: center; gap: 8px; font-weight: 400; cursor: pointer; }
    .image-preview { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .thumb { width: 90px; height: 90px; border-radius: 24px; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
    .btn-primary {
      background: #007aff; color: white; border: none; padding: 18px 28px;
      border-radius: 40px; font-weight: 700; font-size: 16px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;
      width: 100%; justify-content: center; box-shadow: 0 8px 20px rgba(0,122,255,0.25);
    }
    .btn-primary:active { background: #0051d5; transform: scale(0.98); }

    /* قائمة المنتجات */
    .products-list {
      background: rgba(30,30,45,0.4); backdrop-filter: blur(20px);
      border-radius: 36px; padding: 24px; border: 0.5px solid rgba(255,255,255,0.08);
    }
    .product-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; background: rgba(60,60,80,0.3); border-radius: 28px;
      margin-bottom: 12px; backdrop-filter: blur(10px);
      border: 0.5px solid rgba(255,255,255,0.05);
    }
    .product-info { display: flex; align-items: center; gap: 16px; }
    .product-info img { width: 65px; height: 65px; border-radius: 20px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
    .product-details { line-height: 1.6; }
    .product-title { font-weight: 700; color: #fff; }
    .product-meta { font-size: 13px; color: #aaa; display: flex; gap: 12px; flex-wrap: wrap; }
    .badge { background: rgba(0,122,255,0.15); padding: 2px 10px; border-radius: 30px; font-size: 12px; color: #007aff; }
    .badge.warning { background: rgba(255,159,10,0.15); color: #ff9f0a; }
    .product-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,0.05); border: none; width: 44px; height: 44px;
      border-radius: 30px; display: flex; align-items: center; justify-content: center;
      color: #e0e0e0; cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px);
    }
    .icon-btn.danger { color: #ff6b6b; }
    .icon-btn:hover { background: rgba(255,255,255,0.1); }
    .stock-indicator { display: flex; align-items: center; gap: 6px; }
    .stock-high { color: #34c759; }
    .stock-low { color: #ff9f0a; }
    .stock-out { color: #ff3b30; }

    .hidden { display: none !important; }
    .toast-message {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,30,0.9); backdrop-filter: blur(20px); color: white;
      padding: 14px 28px; border-radius: 60px; z-index: 2000;
      opacity: 0; transition: 0.3s; pointer-events: none;
    }
    .toast-message.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="toast" class="toast-message"></div>

<div class="container">
  <!-- تسجيل الدخول -->
  <div id="loginSection">
    <div class="login-card">
      <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
      <h2 style="color:#fff;">لوحة التحكم</h2>
      <p style="color:#aaa;">أدخل كلمة المرور للمتابعة</p>
      <input type="password" id="password" placeholder="كلمة المرور" value="">
      <button class="login-btn" id="loginBtn">دخول</button>
      <p style="margin-top: 20px; font-size: 14px; opacity:0.5;">admin123</p>
    </div>
  </div>

  <!-- لوحة التحكم الرئيسية -->
  <div id="adminPanel" class="hidden">
    <!-- الهيدر -->
    <div class="admin-header">
      <div class="logo-area">
        <span class="logo-icon"><i class="fas fa-sparkles"></i></span>
        <span class="logo-text">عشانك</span>
        <span class="admin-badge"><i class="fas fa-shield"></i> مدير</span>
      </div>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
    </div>

    <!-- الإحصائيات -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalProducts">0</div>
        <div class="stat-label"><i class="fas fa-box"></i> إجمالي المنتجات</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="activeProducts">0</div>
        <div class="stat-label"><i class="fas fa-check-circle" style="color:#34c759;"></i> منتجات نشطة</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalStock">0</div>
        <div class="stat-label"><i class="fas fa-cubes"></i> إجمالي المخزون</div>
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- نموذج إضافة/تعديل منتج -->
      <div>
        <div class="form-card">
          <div class="section-title">
            <i class="fas fa-plus-circle" style="color:#007aff;"></i>
            <span id="formTitle">إضافة منتج جديد</span>
          </div>

          <form id="productForm">
            <input type="hidden" id="editId" value="">
            <div class="form-grid">
              <div class="form-group full-width">
                <label>اسم المنتج</label>
                <input type="text" id="prodName" placeholder="مثال: تيشيرت قطن كلاسيك" required>
              </div>
              <div class="form-group">
                <label>الفئة</label>
                <select id="prodCategory">
                  <option value="men">رجالي</option>
                  <option value="women">نسائي</option>
                </select>
              </div>
              <div class="form-group">
                <label>المخزون (الكمية)</label>
                <input type="number" id="prodStock" value="10" min="0" required>
              </div>
              <div class="form-group">
                <label>السعر الأصلي</label>
                <input type="number" id="prodOriginalPrice" step="0.01" placeholder="للتخفيضات">
                <div style="font-size:12px; opacity:0.6;">اتركه فارغاً إذا لا يوجد خصم</div>
              </div>
              <div class="form-group">
                <label>السعر النهائي (ج.م)</label>
                <input type="number" id="prodPrice" step="0.01" placeholder="السعر للبيع" required>
              </div>
              <div class="form-group full-width">
                <label>الوصف</label>
                <textarea id="prodDesc" rows="2" placeholder="وصف مختصر..."></textarea>
              </div>
              <div class="form-group">
                <label>المقاسات</label>
                <input type="text" id="prodSizes" value="S, M, L, XL" placeholder="S, M, L, XL">
              </div>
              <div class="form-group">
                <label>الأعمار</label>
                <input type="text" id="prodAges" value="15-18, 18+" placeholder="15-18, 18+">
              </div>
              <div class="form-group full-width">
                <label>حالة المنتج</label>
                <div class="checkbox-group">
                  <label><input type="checkbox" id="prodActive" checked> نشط (يظهر في المتجر)</label>
                  <label><input type="checkbox" id="prodNew"> وسم "جديد"</label>
                  <label><input type="checkbox" id="prodBestseller"> وسم "الأكثر مبيعاً"</label>
                </div>
              </div>
              <div class="form-group full-width">
                <label><i class="fas fa-images"></i> صور المنتج</label>
                <input type="file" id="imageUpload" accept="image/*" multiple>
                <div id="imagePreview" class="image-preview"></div>
              </div>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">
              <i class="fas fa-save"></i> حفظ المنتج
            </button>
            <button type="button" class="btn-primary" style="background:#5a5a6e; margin-top:10px;" onclick="resetForm()">إلغاء</button>
          </form>
        </div>
      </div>

      <!-- قائمة المنتجات -->
      <div>
        <div class="products-list">
          <div class="section-title" style="margin-bottom: 20px;">
            <i class="fas fa-list"></i>
            <span>المنتجات الحالية</span>
          </div>
          <div id="productList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    let products = [];
    let uploadedImages = [];
    const PASSWORD = 'admin123';

    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    async function loadProducts() {
      try {
        const res = await fetch('products.json');
        const json = await res.json();
        const stored = localStorage.getItem('ashanak_products');
        const local = stored ? JSON.parse(stored) : [];
        const merged = [...json];
        local.forEach(lp => {
          const idx = merged.findIndex(p => p.id === lp.id);
          if (idx >= 0) merged[idx] = lp;
          else merged.push(lp);
        });
        products = merged;
      } catch {
        const s = localStorage.getItem('ashanak_products');
        products = s ? JSON.parse(s) : [];
      }
      products = products.map(p => ({
        ...p,
        stock: p.stock ?? 10,
        active: p.active ?? true,
        isNew: p.isNew ?? false,
        isBestseller: p.isBestseller ?? false,
        images: p.images?.length ? p.images : ['https://images.pexels.com/photos/428338/pexels-photo-428338.jpeg?auto=compress&cs=tinysrgb&w=600']
      }));
      renderProductList();
      updateStats();
    }

    function saveProducts() {
      localStorage.setItem('ashanak_products', JSON.stringify(products));
      updateStats();
    }

    function updateStats() {
      document.getElementById('totalProducts').innerText = products.length;
      document.getElementById('activeProducts').innerText = products.filter(p => p.active).length;
      document.getElementById('totalStock').innerText = products.reduce((s, p) => s + (p.stock || 0), 0);
    }

    function renderProductList() {
      const list = document.getElementById('productList');
      if (products.length === 0) {
        list.innerHTML = '<p style="text-align:center; padding:30px; color:#aaa;">لا توجد منتجات</p>';
        return;
      }

      list.innerHTML = products.map(p => {
        const hasDiscount = p.originalPrice && p.originalPrice > p.price;
        const categoryText = p.category === 'men' ? 'رجالي' : 'نسائي';
        const stockLevel = p.stock > 10 ? 'stock-high' : (p.stock > 0 ? 'stock-low' : 'stock-out');
        const stockIcon = p.stock > 10 ? 'fa-circle-check' : (p.stock > 0 ? 'fa-exclamation-circle' : 'fa-circle-xmark');
        
        return `
          <div class="product-item" style="${!p.active ? 'opacity:0.6;' : ''}">
            <div class="product-info">
              <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
              <div class="product-details">
                <div class="product-title">
                  ${p.name}
                  ${p.isNew ? '<span class="badge" style="background:#34c75920; color:#34c759;">جديد</span>' : ''}
                  ${p.isBestseller ? '<span class="badge warning">🔥 الأكثر مبيعاً</span>' : ''}
                  ${!p.active ? '<span class="badge" style="background:#ff3b3020; color:#ff3b30;">غير نشط</span>' : ''}
                </div>
                <div class="product-meta">
                  <span>${categoryText}</span>
                  <span class="stock-indicator ${stockLevel}">
                    <i class="fas ${stockIcon}"></i> ${p.stock} قطعة
                  </span>
                  ${hasDiscount ? 
                    `<span><s style="opacity:0.6;">${p.originalPrice}</s> <strong>${p.price} ج.م</strong></span>` : 
                    `<span>${p.price} ج.م</span>`
                  }
                </div>
              </div>
            </div>
            <div class="product-actions">
              <button class="icon-btn" onclick="editProduct('${p.id}')" title="تعديل">
                <i class="fas fa-pen"></i>
              </button>
              <button class="icon-btn" onclick="toggleActive('${p.id}')" title="${p.active ? 'تعطيل' : 'تفعيل'}">
                <i class="fas fa-power-off" style="color: ${p.active ? '#34c759' : '#8e8e93'};"></i>
              </button>
              <button class="icon-btn danger" onclick="deleteProduct('${p.id}')" title="حذف">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.toggleActive = (id) => {
      const product = products.find(p => p.id === id);
      if (product) {
        product.active = !product.active;
        saveProducts();
        renderProductList();
        showToast(product.active ? '✅ تم تفعيل المنتج' : '⏸️ تم تعطيل المنتج');
      }
    };

    window.deleteProduct = (id) => {
      if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
        products = products.filter(p => p.id !== id);
        saveProducts();
        renderProductList();
        showToast('🗑️ تم حذف المنتج');
      }
    };

    window.editProduct = (id) => {
      const p = products.find(p => p.id === id);
      if (!p) return;
      
      document.getElementById('editId').value = p.id;
      document.getElementById('prodName').value = p.name;
      document.getElementById('prodCategory').value = p.category;
      document.getElementById('prodStock').value = p.stock;
      document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
      document.getElementById('prodPrice').value = p.price;
      document.getElementById('prodDesc').value = p.description;
      document.getElementById('prodSizes').value = p.sizes.join(', ');
      document.getElementById('prodAges').value = p.ages.join(', ');
      document.getElementById('prodActive').checked = p.active;
      document.getElementById('prodNew').checked = p.isNew;
      document.getElementById('prodBestseller').checked = p.isBestseller;
      
      uploadedImages = p.images || [];
      const preview = document.getElementById('imagePreview');
      preview.innerHTML = uploadedImages.map(src => `<img src="${src}" class="thumb">`).join('');
      
      document.getElementById('formTitle').innerText = 'تعديل المنتج';
      document.getElementById('submitBtn').innerHTML = '<i class="fas fa-pen"></i> تحديث المنتج';
    };

    window.resetForm = () => {
      document.getElementById('editId').value = '';
      document.getElementById('productForm').reset();
      document.getElementById('imagePreview').innerHTML = '';
      uploadedImages = [];
      document.getElementById('prodActive').checked = true;
      document.getElementById('prodStock').value = 10;
      document.getElementById('formTitle').innerText = 'إضافة منتج جديد';
      document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> حفظ المنتج';
    };

    document.getElementById('imageUpload').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      uploadedImages = [];
      const preview = document.getElementById('imagePreview');
      preview.innerHTML = '';

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          uploadedImages.push(ev.target.result);
          const img = document.createElement('img');
          img.src = ev.target.result;
          img.className = 'thumb';
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    });

    document.getElementById('productForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const editId = document.getElementById('editId').value;
      
      if (uploadedImages.length === 0) {
        showToast('⚠️ الرجاء رفع صورة واحدة على الأقل');
        return;
      }

      const name = document.getElementById('prodName').value.trim();
      const category = document.getElementById('prodCategory').value;
      const price = parseFloat(document.getElementById('prodPrice').value);
      const originalPriceInput = document.getElementById('prodOriginalPrice').value;
      const originalPrice = originalPriceInput ? parseFloat(originalPriceInput) : null;
      const description = document.getElementById('prodDesc').value.trim();
      const sizes = document.getElementById('prodSizes').value.split(',').map(s => s.trim());
      const ages = document.getElementById('prodAges').value.split(',').map(a => a.trim());
      const stock = parseInt(document.getElementById('prodStock').value) || 0;
      const active = document.getElementById('prodActive').checked;
      const isNew = document.getElementById('prodNew').checked;
      const isBestseller = document.getElementById('prodBestseller').checked;

      if (originalPrice && originalPrice <= price) {
        showToast('⚠️ السعر الأصلي يجب أن يكون أكبر من السعر بعد الخصم');
        return;
      }

      const productData = {
        name, category, price, description, sizes, ages, stock, active, isNew, isBestseller,
        images: uploadedImages
      };
      if (originalPrice && originalPrice > price) productData.originalPrice = originalPrice;

      if (editId) {
        const index = products.findIndex(p => p.id === editId);
        if (index !== -1) {
          products[index] = { ...products[index], ...productData };
          showToast('✏️ تم تحديث المنتج');
        }
      } else {
        productData.id = Date.now().toString();
        products.push(productData);
        showToast('✅ تم إضافة المنتج بنجاح!');
      }

      saveProducts();
      renderProductList();
      resetForm();
    });

    // تسجيل الدخول
    document.getElementById('loginBtn').addEventListener('click', () => {
      if (document.getElementById('password').value === PASSWORD) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        sessionStorage.setItem('admin_logged', 'true');
        loadProducts();
        showToast('👋 مرحباً بك في لوحة التحكم');
      } else {
        showToast('❌ كلمة مرور غير صحيحة');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('password').value = '';
      sessionStorage.removeItem('admin_logged');
    });

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    if (sessionStorage.getItem('admin_logged') === 'true') {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('adminPanel').classList.remove('hidden');
      loadProducts();
    }
  })();
</script>
</body>
</html>
