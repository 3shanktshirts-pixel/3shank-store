<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>لوحة التحكم · عشانك</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#ffdad6", "on-surface": "#1a1c1f", "inverse-surface": "#2e3034",
            "on-secondary-fixed": "#1c1b1b", "tertiary-container": "#592300", "surface-bright": "#f9f9fe",
            "on-tertiary-fixed-variant": "#723610", "surface-container": "#ededf2", "on-secondary-container": "#636262",
            "surface-container-high": "#e8e8ed", "secondary": "#5f5e5e", "on-background": "#1a1c1f",
            "on-error": "#ffffff", "on-tertiary-container": "#d8885c", "surface-container-low": "#f3f3f8",
            "primary-fixed-dim": "#a7c8ff", "primary": "#001e40", "on-primary-fixed-variant": "#1f477b",
            "surface": "#f9f9fe", "on-secondary": "#ffffff", "on-error-container": "#93000a",
            "surface-dim": "#d9dade", "outline": "#737780", "tertiary": "#381300",
            "secondary-container": "#e2dfde", "error": "#ba1a1a", "tertiary-fixed-dim": "#ffb690",
            "surface-container-lowest": "#ffffff", "primary-container": "#003366", "on-secondary-fixed-variant": "#474746",
            "on-primary": "#ffffff", "tertiary-fixed": "#ffdbca", "outline-variant": "#c3c6d1",
            "inverse-on-surface": "#f0f0f5", "primary-fixed": "#d5e3ff", "on-tertiary-fixed": "#341100",
            "surface-tint": "#3a5f94", "on-primary-container": "#799dd6", "on-surface-variant": "#43474f",
            "on-primary-fixed": "#001b3c", "secondary-fixed": "#e5e2e1", "inverse-primary": "#a7c8ff",
            "background": "#f9f9fe", "secondary-fixed-dim": "#c8c6c5", "surface-container-highest": "#e2e2e7",
            "surface-variant": "#e2e2e7", "on-tertiary": "#ffffff"
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Inter"], "label": ["Inter"] }
        }
      }
    }
  </script>
  
  <style>
    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased pb-24">

<!-- الهيدر -->
<header class="glass-nav sticky top-0 z-30 py-4 px-4 border-b border-outline-variant">
  <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
    <a href="index.html" class="w-11 h-11 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors">
      <i class="fas fa-arrow-right text-lg text-primary"></i>
    </a>
    <h1 class="font-headline text-2xl font-bold text-primary flex items-center gap-2">
      <i class="fas fa-crown text-[#8e44ad]"></i> لوحة التحكم
    </h1>
    <div class="w-11"></div>
  </div>
</header>

<div class="max-w-screen-2xl mx-auto px-4 py-6">
  
  <!-- الإحصائيات -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
    <div class="bg-surface rounded-2xl p-5 shadow-sm border border-white/20">
      <i class="fas fa-box text-2xl text-primary mb-2"></i>
      <div class="font-headline text-3xl font-bold text-primary" id="totalProducts">0</div>
      <div class="text-sm text-on-surface/60">المنتجات</div>
    </div>
    <div class="bg-surface rounded-2xl p-5 shadow-sm border border-white/20">
      <i class="fas fa-users text-2xl text-primary mb-2"></i>
      <div class="font-headline text-3xl font-bold text-primary" id="totalUsers">0</div>
      <div class="text-sm text-on-surface/60">المستخدمين</div>
    </div>
    <div class="bg-surface rounded-2xl p-5 shadow-sm border border-white/20">
      <i class="fas fa-shopping-cart text-2xl text-primary mb-2"></i>
      <div class="font-headline text-3xl font-bold text-primary" id="totalOrders">0</div>
      <div class="text-sm text-on-surface/60">الطلبات</div>
    </div>
    <div class="bg-surface rounded-2xl p-5 shadow-sm border border-white/20">
      <i class="fas fa-clock text-2xl text-primary mb-2"></i>
      <div class="font-headline text-3xl font-bold text-primary" id="pendingOrders">0</div>
      <div class="text-sm text-on-surface/60">معلقة</div>
    </div>
  </div>

  <div class="grid lg:grid-cols-2 gap-6">
    <!-- إضافة منتج -->
    <div class="bg-surface rounded-[2.5rem] p-6 shadow-sm border border-white/20">
      <h2 class="font-headline text-xl font-bold text-primary mb-4 flex items-center gap-2">
        <i class="fas fa-plus-circle"></i> إضافة منتج جديد
      </h2>
      
      <div class="space-y-3">
        <input type="text" id="productName" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body" placeholder="اسم المنتج">
        <input type="number" id="productPrice" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body" placeholder="السعر (ج.م)">
        <select id="productCategory" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body">
          <option value="men">👔 رجالي</option>
          <option value="women">🌸 نسائي</option>
        </select>
        <input type="text" id="productSizes" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body" placeholder="المقاسات (S, M, L, XL)" value="S, M, L, XL">
        <textarea id="productDesc" class="w-full p-4 bg-surface-container-low rounded-2xl border-none font-body" placeholder="الوصف" rows="2"></textarea>
        <input type="text" id="productImage" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body" placeholder="رابط الصورة">
        <div id="imagePreview" class="mt-2"></div>
        <button id="addProductBtn" class="w-full bg-primary text-white py-4 rounded-full font-headline font-semibold hover:shadow-lg transition-all active:scale-95">
          <i class="fas fa-plus mr-2"></i> إضافة المنتج
        </button>
      </div>
    </div>

    <!-- إدارة المنتجات -->
    <div class="bg-surface rounded-[2.5rem] p-6 shadow-sm border border-white/20">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-headline text-xl font-bold text-primary flex items-center gap-2">
          <i class="fas fa-list"></i> المنتجات الحالية
        </h2>
        <div class="flex gap-2">
          <button id="exportProductsBtn" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors" title="تصدير">
            <i class="fas fa-download"></i>
          </button>
          <button onclick="document.getElementById('importFile').click()" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors" title="استيراد">
            <i class="fas fa-upload"></i>
          </button>
          <input type="file" id="importFile" accept=".json,application/json" class="hidden">
        </div>
      </div>
      
      <div id="productsList" class="max-h-[400px] overflow-y-auto custom-scrollbar space-y-2"></div>
      
      <button id="clearAllBtn" class="w-full bg-error-container text-error py-4 rounded-full font-headline font-semibold hover:bg-error/10 transition-all active:scale-95 mt-4">
        <i class="fas fa-trash mr-2"></i> حذف جميع المنتجات
      </button>
    </div>
  </div>
</div>

<!-- رسائل التنبيه -->
<div id="toastMessage" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-on-surface text-white px-6 py-3 rounded-full shadow-lg z-50 opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap"></div>

<script>
  (function() {
    const STORAGE_CURRENT = 'teeshop_current';
    const STORAGE_PRODUCTS = 'teeshop_products';
    const STORAGE_ORDERS = 'teeshop_orders_v3';
    const STORAGE_USERS = 'teeshop_users';

    const currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT));
    if (!currentUser || currentUser.role !== 'admin') {
      alert('غير مصرح لك بالدخول');
      window.location.href = 'index.html';
      return;
    }

    let products = [];
    let editingId = null;

    function showToast(msg) {
      const toast = document.getElementById('toastMessage');
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 2500);
    }

    async function loadProducts() {
      try {
        const res = await fetch('products.json');
        if (res.ok) products = await res.json();
        else {
          const local = localStorage.getItem(STORAGE_PRODUCTS);
          products = local ? JSON.parse(local) : [];
        }
      } catch {
        const local = localStorage.getItem(STORAGE_PRODUCTS);
        products = local ? JSON.parse(local) : [];
      }

      if (!products.length) {
        products = [
          { id: 1, name: 'تيشيرت أساسي أبيض', price: 299, category: 'men', size: ['S','M','L'], image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300', description: 'قطن 100%' },
          { id: 2, name: 'تيشيرت نسائي وردي', price: 319, category: 'women', size: ['XS','S','M'], image: 'https://images.unsplash.com/photo-1434389677669-e08b4cac3105?w=300', description: 'قصة أنثوية' }
        ];
      }
      
      saveProductsToLocal();
      renderProductsList();
      updateStats();
    }

    function saveProductsToLocal() {
      localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products));
    }

    function updateStats() {
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
      const orders = JSON.parse(localStorage.getItem(STORAGE_ORDERS)) || [];
      const pending = orders.filter(o => o.status === 'pending').length;

      document.getElementById('totalProducts').textContent = products.length;
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('totalOrders').textContent = orders.length;
      document.getElementById('pendingOrders').textContent = pending;
    }

    function renderProductsList() {
      const container = document.getElementById('productsList');
      
      if (!products.length) {
        container.innerHTML = '<p class="text-center py-8 text-on-surface/50">لا توجد منتجات</p>';
        return;
      }

      container.innerHTML = products.map(p => `
        <div class="flex items-center gap-3 p-3 bg-surface-container-low rounded-2xl">
          <img src="${p.image}" class="w-14 h-14 rounded-xl object-cover" onerror="this.src='https://via.placeholder.com/56'">
          <div class="flex-1">
            <h4 class="font-bold text-sm">${p.name}</h4>
            <p class="text-xs text-on-surface/60">${p.price} ج.م | ${p.category === 'men' ? 'رجالي' : 'نسائي'}</p>
          </div>
          <div class="flex gap-1">
            <button onclick="editProduct(${p.id})" class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-primary hover:text-white transition-colors">
              <i class="fas fa-edit text-xs"></i>
            </button>
            <button onclick="deleteProduct(${p.id})" class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center hover:bg-error hover:text-white transition-colors">
              <i class="fas fa-trash text-xs"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('addProductBtn').addEventListener('click', () => {
      const name = document.getElementById('productName').value.trim();
      const price = parseFloat(document.getElementById('productPrice').value);
      const category = document.getElementById('productCategory').value;
      const sizesStr = document.getElementById('productSizes').value;
      const sizes = sizesStr.split(',').map(s => s.trim()).filter(s => s);
      const description = document.getElementById('productDesc').value.trim();
      const image = document.getElementById('productImage').value.trim();

      if (!name || !price || !image) {
        showToast('الاسم والسعر والصورة مطلوبة');
        return;
      }

      const productData = { name, price, category, size: sizes.length ? sizes : ['M'], description, image };

      if (editingId) {
        const index = products.findIndex(p => p.id === editingId);
        if (index !== -1) products[index] = { ...products[index], ...productData };
        editingId = null;
        document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-plus mr-2"></i> إضافة المنتج';
      } else {
        const newId = Math.max(...products.map(p => p.id), 0) + 1;
        products.push({ id: newId, ...productData });
      }

      saveProductsToLocal();
      renderProductsList();
      updateStats();
      clearForm();
      showToast(editingId ? '✅ تم تحديث المنتج' : '✅ تمت إضافة المنتج');
    });

    function clearForm() {
      document.getElementById('productName').value = '';
      document.getElementById('productPrice').value = '';
      document.getElementById('productSizes').value = 'S, M, L, XL';
      document.getElementById('productDesc').value = '';
      document.getElementById('productImage').value = '';
      document.getElementById('imagePreview').innerHTML = '';
      editingId = null;
      document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-plus mr-2"></i> إضافة المنتج';
    }

    document.getElementById('productImage').addEventListener('input', (e) => {
      const preview = document.getElementById('imagePreview');
      if (e.target.value) {
        preview.innerHTML = `<img src="${e.target.value}" class="w-24 h-24 rounded-xl object-cover">`;
      } else {
        preview.innerHTML = '';
      }
    });

    window.editProduct = (id) => {
      const p = products.find(p => p.id === id);
      if (!p) return;

      document.getElementById('productName').value = p.name;
      document.getElementById('productPrice').value = p.price;
      document.getElementById('productCategory').value = p.category;
      document.getElementById('productSizes').value = (p.size || []).join(', ');
      document.getElementById('productDesc').value = p.description || '';
      document.getElementById('productImage').value = p.image;
      document.getElementById('imagePreview').innerHTML = `<img src="${p.image}" class="w-24 h-24 rounded-xl object-cover">`;
      
      editingId = id;
      document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-save mr-2"></i> حفظ التعديلات';
    };

    window.deleteProduct = (id) => {
      if (!confirm('حذف المنتج؟')) return;
      products = products.filter(p => p.id !== id);
      saveProductsToLocal();
      renderProductsList();
      updateStats();
      showToast('🗑️ تم الحذف');
    };

    document.getElementById('exportProductsBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'products.json';
      a.click();
      showToast('📂 تم التصدير');
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          products = JSON.parse(ev.target.result);
          saveProductsToLocal();
          renderProductsList();
          updateStats();
          showToast('✅ تم الاستيراد');
        } catch { alert('ملف غير صالح'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (!confirm('⚠️ حذف جميع المنتجات؟')) return;
      products = [];
      saveProductsToLocal();
      renderProductsList();
      updateStats();
      showToast('🗑️ تم حذف الكل');
    });

    loadProducts();
  })();
</script>

<style>
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e2e7; border-radius: 10px; }
</style>
</body>
</html>
