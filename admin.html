<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>لوحة التحكم · عشانك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif; background: #f2f5f9; color: #0a1929;
      padding: 20px; min-height: 100vh;
    }
    :root { --primary: #0a1929; --accent: #c0392b; --glass: rgba(255,255,255,0.7); --blur: 25px; }
    .glass-card {
      background: var(--glass); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
      border-radius: 36px; padding: 28px; border: 0.5px solid rgba(255,255,255,0.8);
      box-shadow: 0 20px 40px -10px rgba(10,25,41,0.1); margin-bottom: 24px;
    }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    h1, h2 { color: var(--primary); }
    .btn {
      background: var(--primary); color: white; border: none; padding: 12px 24px;
      border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px;
    }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-danger { background: var(--accent); }
    .input-field, .select-field, textarea {
      width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.8); border: 0.5px solid rgba(10,25,41,0.1);
      border-radius: 28px; margin-bottom: 16px; font-size: 15px; font-family: inherit;
    }
    textarea { min-height: 80px; resize: vertical; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 24px; }
    .admin-product-card {
      background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); border-radius: 24px;
      padding: 16px; border: 0.5px solid rgba(255,255,255,0.7);
    }
    .admin-product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 16px; margin-bottom: 12px; }
    .size-input { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .size-tag { background: rgba(10,25,41,0.05); padding: 6px 12px; border-radius: 30px; display: inline-flex; align-items: center; gap: 6px; }
    .preview-image { max-width: 200px; max-height: 200px; border-radius: 20px; margin: 12px 0; }
  </style>
</head>
<body>

<div class="glass-card" style="max-width: 1200px; margin: 0 auto;">
  <div class="top-bar">
    <h1><i class="fas fa-crown" style="color: #8e44ad;"></i> لوحة تحكم المدير</h1>
    <div style="display: flex; gap: 12px;">
      <button class="btn btn-outline" onclick="window.location.href='index.html'"><i class="fas fa-store"></i> المتجر</button>
      <button class="btn btn-outline" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i> الملف</button>
    </div>
  </div>

  <!-- إضافة منتج جديد -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
    <div>
      <h2 style="margin-bottom: 16px;">➕ إضافة منتج جديد</h2>
      <input type="text" id="productName" class="input-field" placeholder="اسم المنتج">
      <input type="number" id="productPrice" class="input-field" placeholder="السعر (ج.م)">
      <select id="productCategory" class="select-field input-field">
        <option value="men">رجالي</option>
        <option value="women">نسائي</option>
      </select>
      <div class="size-input" id="sizeContainer">
        <input type="text" id="sizeInput" class="input-field" placeholder="المقاسات (مثال: S, M, L)" value="S, M, L, XL">
        <small style="opacity:0.6; display:block; margin-top:-10px; margin-bottom:12px;">افصل بين المقاسات بفاصلة</small>
      </div>
      <textarea id="productDesc" class="input-field" placeholder="وصف المنتج"></textarea>
      <input type="text" id="productImage" class="input-field" placeholder="رابط الصورة">
      <div id="imagePreview"></div>
      <button class="btn" id="addProductBtn" style="width: 100%;">📦 إضافة المنتج</button>
    </div>

    <!-- تحميل ملف products.json -->
    <div>
      <h2 style="margin-bottom: 16px;">📂 إدارة المنتجات</h2>
      <button class="btn btn-outline" id="exportProducts" style="width: 100%; margin-bottom: 12px;"><i class="fas fa-download"></i> تصدير products.json</button>
      <label class="btn btn-outline" style="display: block; text-align: center; cursor: pointer;">
        <i class="fas fa-upload"></i> استيراد products.json
        <input type="file" id="importFile" accept=".json,application/json" style="display: none;">
      </label>
      <button class="btn btn-danger" id="clearAllProducts" style="width: 100%; margin-top: 12px;"><i class="fas fa-trash"></i> حذف جميع المنتجات</button>
      <div style="margin-top: 20px; padding: 16px; background: rgba(10,25,41,0.03); border-radius: 20px;">
        <p><strong>📊 إحصائيات</strong></p>
        <p id="statsText">جاري التحميل...</p>
      </div>
    </div>
  </div>

  <!-- قائمة المنتجات الحالية -->
  <h2 style="margin: 32px 0 16px;">📋 المنتجات الحالية</h2>
  <div id="adminProductGrid" class="product-grid"></div>
</div>

<script>
  (function(){
    const STORAGE_CURRENT = 'teeshop_current';
    const STORAGE_PRODUCTS = 'teeshop_products';
    const currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT));
    
    if(!currentUser || currentUser.role !== 'admin') {
      alert('غير مصرح لك بالدخول');
      window.location.href = 'index.html';
      return;
    }

    let products = [];

    async function loadProducts() {
      try {
        const res = await fetch('products.json');
        if(res.ok) products = await res.json();
        else {
          const local = localStorage.getItem(STORAGE_PRODUCTS);
          products = local ? JSON.parse(local) : [];
        }
      } catch(e) {
        const local = localStorage.getItem(STORAGE_PRODUCTS);
        products = local ? JSON.parse(local) : [];
      }
      if(!products.length) {
        products = [
          { id:1, name:'تيشيرت أساسي أبيض', price:299, category:'men', size:['S','M','L'], image:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300', description:'قطن 100%' }
        ];
      }
      saveProductsToLocal();
      renderAdminProducts();
      updateStats();
    }

    function saveProductsToLocal() {
      localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products));
    }

    function renderAdminProducts() {
      const grid = document.getElementById('adminProductGrid');
      grid.innerHTML = products.map(p => `
        <div class="admin-product-card">
          <img src="${p.image}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p style="color: #1e3a5f; font-weight: 700; margin: 4px 0;">${p.price} ج.م</p>
          <p style="font-size: 13px;">${p.category === 'men' ? 'رجالي' : 'نسائي'}</p>
          <p style="font-size: 12px; margin: 8px 0;">المقاسات: ${(p.size||[]).join(', ')}</p>
          <div style="display: flex; gap: 8px; margin-top: 12px;">
            <button class="btn btn-outline" onclick="editProduct(${p.id})" style="flex:1; padding:8px;"><i class="fas fa-edit"></i></button>
            <button class="btn btn-danger" onclick="deleteProduct(${p.id})" style="flex:1; padding:8px;"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function updateStats() {
      const menCount = products.filter(p => p.category === 'men').length;
      const womenCount = products.filter(p => p.category === 'women').length;
      document.getElementById('statsText').innerHTML = `إجمالي المنتجات: ${products.length}<br>👔 رجالي: ${menCount}<br>🌸 نسائي: ${womenCount}`;
    }

    // إضافة منتج
    document.getElementById('addProductBtn').addEventListener('click', () => {
      const name = document.getElementById('productName').value.trim();
      const price = parseFloat(document.getElementById('productPrice').value);
      const category = document.getElementById('productCategory').value;
      const sizeStr = document.getElementById('sizeInput').value;
      const sizes = sizeStr.split(',').map(s => s.trim()).filter(s => s);
      const description = document.getElementById('productDesc').value.trim();
      const image = document.getElementById('productImage').value.trim();

      if(!name || !price || !image) { alert('الاسم والسعر والصورة مطلوبة'); return; }

      const newId = Math.max(...products.map(p => p.id), 0) + 1;
      const newProduct = {
        id: newId, name, price, category, size: sizes.length ? sizes : ['M'],
        image, description: description || name
      };
      products.push(newProduct);
      saveProductsToLocal();
      renderAdminProducts();
      updateStats();
      
      // مسح الحقول
      document.getElementById('productName').value = '';
      document.getElementById('productPrice').value = '';
      document.getElementById('productDesc').value = '';
      document.getElementById('productImage').value = '';
      document.getElementById('imagePreview').innerHTML = '';
      alert('✅ تمت إضافة المنتج');
    });

    // معاينة الصورة
    document.getElementById('productImage').addEventListener('input', (e) => {
      const url = e.target.value;
      const preview = document.getElementById('imagePreview');
      if(url) preview.innerHTML = `<img src="${url}" class="preview-image" onerror="this.style.display='none'">`;
      else preview.innerHTML = '';
    });

    // تصدير
    document.getElementById('exportProducts').addEventListener('click', () => {
      const dataStr = JSON.stringify(products, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'products.json';
      a.click(); URL.revokeObjectURL(url);
    });

    // استيراد
    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if(Array.isArray(imported)) {
            products = imported;
            saveProductsToLocal();
            renderAdminProducts();
            updateStats();
            alert('✅ تم استيراد المنتجات');
          }
        } catch(err) { alert('ملف JSON غير صالح'); }
      };
      reader.readAsText(file);
    });

    // حذف الكل
    document.getElementById('clearAllProducts').addEventListener('click', () => {
      if(confirm('هل أنت متأكد من حذف جميع المنتجات؟')) {
        products = [];
        saveProductsToLocal();
        renderAdminProducts();
        updateStats();
      }
    });

    // دوال عامة
    window.deleteProduct = (id) => {
      if(confirm('حذف المنتج؟')) {
        products = products.filter(p => p.id !== id);
        saveProductsToLocal();
        renderAdminProducts();
        updateStats();
      }
    };

    window.editProduct = (id) => {
      const product = products.find(p => p.id === id);
      if(!product) return;
      document.getElementById('productName').value = product.name;
      document.getElementById('productPrice').value = product.price;
      document.getElementById('productCategory').value = product.category;
      document.getElementById('sizeInput').value = (product.size || []).join(', ');
      document.getElementById('productDesc').value = product.description || '';
      document.getElementById('productImage').value = product.image;
      document.getElementById('imagePreview').innerHTML = `<img src="${product.image}" class="preview-image">`;
      
      // حذف القديم
      products = products.filter(p => p.id !== id);
      saveProductsToLocal();
      renderAdminProducts();
      alert('✏️ عدل البيانات ثم اضغط "إضافة المنتج" لحفظ التعديلات');
    };

    loadProducts();
  })();
</script>
</body>
</html>
