<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>لوحة التحكم · عشانك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f5f7fa 0%, #ffffff 100%);
      color: #0a1929;
      min-height: 100vh;
      padding: 24px;
    }
    
    :root {
      --primary: #0a1929;
      --primary-light: #1e3a5f;
      --accent: #c0392b;
      --success: #27ae60;
      --white: #ffffff;
      --shadow: 0 15px 40px -12px rgba(10, 25, 41, 0.12);
      --border-light: 1px solid rgba(10, 25, 41, 0.08);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-title i {
      color: #8e44ad;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--primary);
      border: var(--border-light);
      box-shadow: var(--shadow);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -12px rgba(10, 25, 41, 0.2);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .btn-danger {
      background: var(--accent);
      color: white;
      border: none;
    }

    .btn-success {
      background: var(--success);
      color: white;
      border: none;
    }

    /* لوحة الإحصائيات */
    .stats-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-box {
      background: var(--white);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: var(--border-light);
    }

    .stat-box i {
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .stat-box .value {
      font-size: 36px;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-box .label {
      font-size: 15px;
      opacity: 0.65;
      margin-top: 4px;
    }

    /* تخطيط الصفحة */
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 24px;
    }

    .card {
      background: var(--white);
      border-radius: 36px;
      padding: 28px;
      box-shadow: var(--shadow);
      border: var(--border-light);
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 14px;
    }

    .input-field, .select-field, textarea {
      width: 100%;
      padding: 14px 16px;
      background: #f8fafc;
      border: 1.5px solid rgba(10, 25, 41, 0.1);
      border-radius: 20px;
      font-size: 15px;
      font-family: inherit;
      transition: 0.2s;
    }

    .input-field:focus, .select-field:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .size-input-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .size-tag {
      background: #eef2f6;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .image-preview {
      margin-top: 16px;
      border-radius: 20px;
      overflow: hidden;
      max-width: 200px;
    }

    .image-preview img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* قائمة المنتجات */
    .products-list {
      max-height: 500px;
      overflow-y: auto;
    }

    .admin-product-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: #f8fafc;
      border-radius: 20px;
      margin-bottom: 12px;
      border: var(--border-light);
    }

    .admin-product-img {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      object-fit: cover;
    }

    .admin-product-info {
      flex: 1;
    }

    .admin-product-info h4 {
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .admin-product-info p {
      font-size: 14px;
      opacity: 0.65;
    }

    .admin-product-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 40px;
      border: none;
      background: white;
      color: var(--primary);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border: var(--border-light);
    }

    .icon-btn:hover {
      background: var(--primary);
      color: white;
    }

    .icon-btn.delete:hover {
      background: var(--accent);
    }

    .file-upload {
      margin-top: 16px;
    }

    .file-upload label {
      display: block;
      padding: 14px;
      background: #f8fafc;
      border: 1.5px dashed rgba(10, 25, 41, 0.2);
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .file-upload label:hover {
      border-color: var(--primary);
      background: white;
    }

    .file-upload input {
      display: none;
    }

    @media (max-width: 900px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- الشريط العلوي -->
  <div class="top-bar">
    <h1 class="page-title">
      <i class="fas fa-crown"></i>
      لوحة تحكم المدير
    </h1>
    <div class="nav-buttons">
      <button class="btn" onclick="window.location.href='index.html'">
        <i class="fas fa-store"></i> المتجر
      </button>
      <button class="btn" onclick="window.location.href='profile.html'">
        <i class="fas fa-user"></i> الملف الشخصي
      </button>
    </div>
  </div>

  <!-- الإحصائيات -->
  <div class="stats-dashboard">
    <div class="stat-box">
      <i class="fas fa-box"></i>
      <div class="value" id="totalProducts">0</div>
      <div class="label">إجمالي المنتجات</div>
    </div>
    <div class="stat-box">
      <i class="fas fa-users"></i>
      <div class="value" id="totalUsers">0</div>
      <div class="label">المستخدمين</div>
    </div>
    <div class="stat-box">
      <i class="fas fa-shopping-cart"></i>
      <div class="value" id="totalOrders">0</div>
      <div class="label">الطلبات</div>
    </div>
    <div class="stat-box">
      <i class="fas fa-clock"></i>
      <div class="value" id="pendingOrders">0</div>
      <div class="label">طلبات معلقة</div>
    </div>
  </div>

  <div class="admin-grid">
    <!-- إضافة منتج جديد -->
    <div class="card">
      <div class="card-title">
        <i class="fas fa-plus-circle"></i>
        إضافة منتج جديد
      </div>
      
      <div class="input-group">
        <label class="input-label">اسم المنتج</label>
        <input type="text" id="productName" class="input-field" placeholder="مثال: تيشيرت قطني">
      </div>
      
      <div class="input-group">
        <label class="input-label">السعر (ج.م)</label>
        <input type="number" id="productPrice" class="input-field" placeholder="299">
      </div>
      
      <div class="input-group">
        <label class="input-label">الفئة</label>
        <select id="productCategory" class="select-field">
          <option value="men">👔 رجالي</option>
          <option value="women">🌸 نسائي</option>
        </select>
      </div>
      
      <div class="input-group">
        <label class="input-label">المقاسات (افصل بينها بفاصلة)</label>
        <input type="text" id="productSizes" class="input-field" placeholder="S, M, L, XL" value="S, M, L, XL">
      </div>
      
      <div class="input-group">
        <label class="input-label">الوصف</label>
        <textarea id="productDesc" class="input-field" placeholder="وصف المنتج..."></textarea>
      </div>
      
      <div class="input-group">
        <label class="input-label">رابط الصورة</label>
        <input type="text" id="productImage" class="input-field" placeholder="https://...">
      </div>
      
      <div class="file-upload">
        <label for="imageUpload">
          <i class="fas fa-cloud-upload-alt"></i> أو ارفع صورة
        </label>
        <input type="file" id="imageUpload" accept="image/*">
      </div>
      
      <div class="image-preview" id="imagePreview"></div>
      
      <button class="btn btn-primary" id="addProductBtn" style="width: 100%; margin-top: 20px;">
        <i class="fas fa-plus"></i> إضافة المنتج
      </button>
    </div>

    <!-- إدارة المنتجات -->
    <div class="card">
      <div class="card-title">
        <i class="fas fa-list"></i>
        المنتجات الحالية
        <div style="margin-right: auto; display: flex; gap: 8px;">
          <button class="icon-btn" id="exportProductsBtn" title="تصدير">
            <i class="fas fa-download"></i>
          </button>
          <button class="icon-btn" id="importProductsBtn" title="استيراد" onclick="document.getElementById('importFile').click()">
            <i class="fas fa-upload"></i>
          </button>
          <input type="file" id="importFile" accept=".json,application/json" style="display: none;">
        </div>
      </div>
      
      <div class="products-list" id="productsList">
        <p style="text-align: center; opacity: 0.5; padding: 20px;">جاري تحميل المنتجات...</p>
      </div>
      
      <button class="btn btn-danger" id="clearAllBtn" style="width: 100%; margin-top: 16px;">
        <i class="fas fa-trash"></i> حذف جميع المنتجات
      </button>
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_CURRENT = 'teeshop_current';
    const STORAGE_PRODUCTS = 'teeshop_products';
    const STORAGE_ORDERS = 'teeshop_orders_v3';
    const STORAGE_USERS = 'teeshop_users';

    const currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT));
    if (!currentUser || currentUser.role !== 'admin') {
      alert('غير مصرح لك بالدخول إلى لوحة التحكم');
      window.location.href = 'index.html';
      return;
    }

    let products = [];
    let editingId = null;

    // تحميل المنتجات
    async function loadProducts() {
      try {
        const res = await fetch('products.json');
        if (res.ok) {
          products = await res.json();
        } else {
          const local = localStorage.getItem(STORAGE_PRODUCTS);
          products = local ? JSON.parse(local) : [];
        }
      } catch (e) {
        const local = localStorage.getItem(STORAGE_PRODUCTS);
        products = local ? JSON.parse(local) : [];
      }

      if (!products.length) {
        products = [
          { id: 1, name: 'تيشيرت أساسي أبيض', price: 299, category: 'men', size: ['S', 'M', 'L'], image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300', description: 'قطن 100%' },
          { id: 2, name: 'تيشيرت نسائي وردي', price: 319, category: 'women', size: ['XS', 'S', 'M'], image: 'https://images.unsplash.com/photo-1434389677669-e08b4cac3105?w=300', description: 'قصة أنثوية' }
        ];
      }
      
      saveProductsToLocal();
      renderProductsList();
      updateStats();
    }

    function saveProductsToLocal() {
      localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products));
    }

    function updateStats() {
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
      const orders = JSON.parse(localStorage.getItem(STORAGE_ORDERS)) || [];
      const pending = orders.filter(o => o.status === 'pending').length;

      document.getElementById('totalProducts').textContent = products.length;
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('totalOrders').textContent = orders.length;
      document.getElementById('pendingOrders').textContent = pending;
    }

    function renderProductsList() {
      const container = document.getElementById('productsList');
      
      if (products.length === 0) {
        container.innerHTML = '<p style="text-align: center; opacity: 0.5; padding: 20px;">لا توجد منتجات</p>';
        return;
      }

      container.innerHTML = products.map(p => `
        <div class="admin-product-item">
          <img src="${p.image}" class="admin-product-img" alt="${p.name}" onerror="this.src='https://via.placeholder.com/70'">
          <div class="admin-product-info">
            <h4>${p.name}</h4>
            <p>${p.price} ج.م | ${p.category === 'men' ? 'رجالي' : 'نسائي'}</p>
            <p style="font-size: 12px;">المقاسات: ${(p.size || []).join(', ')}</p>
          </div>
          <div class="admin-product-actions">
            <button class="icon-btn" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
            <button class="icon-btn delete" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    // إضافة/تعديل منتج
    document.getElementById('addProductBtn').addEventListener('click', () => {
      const name = document.getElementById('productName').value.trim();
      const price = parseFloat(document.getElementById('productPrice').value);
      const category = document.getElementById('productCategory').value;
      const sizesStr = document.getElementById('productSizes').value;
      const sizes = sizesStr.split(',').map(s => s.trim()).filter(s => s);
      const description = document.getElementById('productDesc').value.trim();
      const image = document.getElementById('productImage').value.trim();

      if (!name || !price || !image) {
        alert('الاسم والسعر والصورة مطلوبة');
        return;
      }

      const productData = {
        name, price, category,
        size: sizes.length ? sizes : ['M'],
        description: description || name,
        image
      };

      if (editingId) {
        const index = products.findIndex(p => p.id === editingId);
        if (index !== -1) {
          products[index] = { ...products[index], ...productData };
        }
        editingId = null;
        document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-plus"></i> إضافة المنتج';
      } else {
        const newId = Math.max(...products.map(p => p.id), 0) + 1;
        products.push({ id: newId, ...productData });
      }

      saveProductsToLocal();
      renderProductsList();
      updateStats();
      clearForm();
      showToast(editingId ? '✅ تم تحديث المنتج' : '✅ تمت إضافة المنتج');
    });

    function clearForm() {
      document.getElementById('productName').value = '';
      document.getElementById('productPrice').value = '';
      document.getElementById('productSizes').value = 'S, M, L, XL';
      document.getElementById('productDesc').value = '';
      document.getElementById('productImage').value = '';
      document.getElementById('imagePreview').innerHTML = '';
      editingId = null;
      document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-plus"></i> إضافة المنتج';
    }

    // معاينة الصورة
    document.getElementById('productImage').addEventListener('input', (e) => {
      const url = e.target.value;
      const preview = document.getElementById('imagePreview');
      if (url) {
        preview.innerHTML = `<img src="${url}" style="width:100%; border-radius:16px;" onerror="this.style.display='none'">`;
      } else {
        preview.innerHTML = '';
      }
    });

    // رفع صورة (تحويل إلى Base64)
    document.getElementById('imageUpload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('productImage').value = ev.target.result;
          document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}" style="width:100%; border-radius:16px;">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // دوال عامة
    window.editProduct = (id) => {
      const product = products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('productName').value = product.name;
      document.getElementById('productPrice').value = product.price;
      document.getElementById('productCategory').value = product.category;
      document.getElementById('productSizes').value = (product.size || []).join(', ');
      document.getElementById('productDesc').value = product.description || '';
      document.getElementById('productImage').value = product.image;
      document.getElementById('imagePreview').innerHTML = `<img src="${product.image}" style="width:100%; border-radius:16px;">`;
      
      editingId = id;
      document.getElementById('addProductBtn').innerHTML = '<i class="fas fa-save"></i> حفظ التعديلات';
    };

    window.deleteProduct = (id) => {
      if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
        products = products.filter(p => p.id !== id);
        saveProductsToLocal();
        renderProductsList();
        updateStats();
        showToast('🗑️ تم حذف المنتج');
      }
    };

    // تصدير
    document.getElementById('exportProductsBtn').addEventListener('click', () => {
      const dataStr = JSON.stringify(products, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'products.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('📂 تم تصدير المنتجات');
    });

    // استيراد
    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (Array.isArray(imported)) {
            products = imported;
            saveProductsToLocal();
            renderProductsList();
            updateStats();
            showToast('✅ تم استيراد المنتجات بنجاح');
          }
        } catch (err) {
          alert('ملف JSON غير صالح');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    // حذف الكل
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (confirm('⚠️ هل أنت متأكد من حذف جميع المنتجات؟')) {
        products = [];
        saveProductsToLocal();
        renderProductsList();
        updateStats();
        showToast('🗑️ تم حذف جميع المنتجات');
      }
    });

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.cssText = `
        position: fixed; bottom: 30px; right: 30px;
        background: #0a1929; color: white;
        padding: 14px 28px; border-radius: 60px;
        z-index: 1000; font-weight: 500;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    loadProducts();
  })();
</script>
</body>
</html>
