<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>الملف الشخصي · عشانك</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#ffdad6", "on-surface": "#1a1c1f", "inverse-surface": "#2e3034",
            "on-secondary-fixed": "#1c1b1b", "tertiary-container": "#592300", "surface-bright": "#f9f9fe",
            "on-tertiary-fixed-variant": "#723610", "surface-container": "#ededf2", "on-secondary-container": "#636262",
            "surface-container-high": "#e8e8ed", "secondary": "#5f5e5e", "on-background": "#1a1c1f",
            "on-error": "#ffffff", "on-tertiary-container": "#d8885c", "surface-container-low": "#f3f3f8",
            "primary-fixed-dim": "#a7c8ff", "primary": "#001e40", "on-primary-fixed-variant": "#1f477b",
            "surface": "#f9f9fe", "on-secondary": "#ffffff", "on-error-container": "#93000a",
            "surface-dim": "#d9dade", "outline": "#737780", "tertiary": "#381300",
            "secondary-container": "#e2dfde", "error": "#ba1a1a", "tertiary-fixed-dim": "#ffb690",
            "surface-container-lowest": "#ffffff", "primary-container": "#003366", "on-secondary-fixed-variant": "#474746",
            "on-primary": "#ffffff", "tertiary-fixed": "#ffdbca", "outline-variant": "#c3c6d1",
            "inverse-on-surface": "#f0f0f5", "primary-fixed": "#d5e3ff", "on-tertiary-fixed": "#341100",
            "surface-tint": "#3a5f94", "on-primary-container": "#799dd6", "on-surface-variant": "#43474f",
            "on-primary-fixed": "#001b3c", "secondary-fixed": "#e5e2e1", "inverse-primary": "#a7c8ff",
            "background": "#f9f9fe", "secondary-fixed-dim": "#c8c6c5", "surface-container-highest": "#e2e2e7",
            "surface-variant": "#e2e2e7", "on-tertiary": "#ffffff"
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Inter"], "label": ["Inter"] }
        }
      }
    }
  </script>
  
  <style>
    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased pb-24">

<!-- الهيدر -->
<header class="glass-nav sticky top-0 z-30 py-4 px-4 border-b border-outline-variant">
  <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
    <a href="index.html" class="w-11 h-11 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors">
      <i class="fas fa-arrow-right text-lg text-primary"></i>
    </a>
    <h1 class="font-headline text-2xl font-bold text-primary">الملف الشخصي</h1>
    <div class="w-11"></div>
  </div>
</header>

<div class="max-w-2xl mx-auto px-4 py-6">
  
  <!-- بطاقة الملف الشخصي -->
  <div class="bg-surface rounded-[2.5rem] p-6 shadow-[0_10px_30px_rgba(0,30,64,0.08)] border border-white/20 mb-6">
    <div class="flex items-center gap-5 mb-6">
      <div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center shadow-lg">
        <span class="text-4xl font-bold text-white" id="profileAvatar">👤</span>
      </div>
      <div>
        <h2 class="font-headline text-2xl font-bold text-primary" id="profileName">أحمد محمد</h2>
        <p class="text-on-surface/60 flex items-center gap-1 mt-1">
          <i class="fas fa-envelope text-sm"></i>
          <span id="profileEmail">user@demo.com</span>
        </p>
        <p class="text-on-surface/60 flex items-center gap-1 mt-1">
          <i class="fas fa-phone text-sm"></i>
          <span id="profilePhone">غير محدد</span>
        </p>
      </div>
    </div>

    <!-- الإحصائيات -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="bg-surface-container-low rounded-2xl p-4 text-center">
        <i class="fas fa-shopping-bag text-2xl text-primary mb-2"></i>
        <div class="font-headline text-2xl font-bold text-primary" id="totalOrders">0</div>
        <div class="text-xs text-on-surface/60">طلبات</div>
      </div>
      <div class="bg-surface-container-low rounded-2xl p-4 text-center">
        <i class="fas fa-clock text-2xl text-primary mb-2"></i>
        <div class="font-headline text-2xl font-bold text-primary" id="pendingOrders">0</div>
        <div class="text-xs text-on-surface/60">معلقة</div>
      </div>
      <div class="bg-surface-container-low rounded-2xl p-4 text-center">
        <i class="fas fa-money-bill text-2xl text-primary mb-2"></i>
        <div class="font-headline text-2xl font-bold text-primary" id="totalSpent">0</div>
        <div class="text-xs text-on-surface/60">جنيه</div>
      </div>
    </div>

    <!-- نموذج التعديل -->
    <div id="editSection" style="display: none;">
      <div class="bg-surface-container-low rounded-2xl p-4 mb-4">
        <input type="text" id="editName" class="w-full p-4 bg-surface rounded-full border-none mb-3 font-body" placeholder="الاسم الكامل">
        <input type="tel" id="editPhone" class="w-full p-4 bg-surface rounded-full border-none mb-3 font-body" placeholder="رقم الهاتف">
        <input type="email" id="editEmail" class="w-full p-4 bg-surface rounded-full border-none font-body" disabled>
      </div>
      <div class="flex gap-3">
        <button id="saveProfileBtn" class="flex-1 bg-primary text-white py-4 rounded-full font-headline font-semibold hover:shadow-lg transition-all active:scale-95">
          حفظ التغييرات
        </button>
        <button id="cancelEditBtn" class="flex-1 bg-surface-container-high text-on-surface py-4 rounded-full font-headline font-semibold hover:bg-surface-container-highest transition-all">
          إلغاء
        </button>
      </div>
    </div>

    <button id="editProfileBtn" class="w-full bg-primary text-white py-4 rounded-full font-headline font-semibold text-lg hover:shadow-lg transition-all active:scale-95">
      <i class="fas fa-pen mr-2"></i> تعديل الملف الشخصي
    </button>
    
    <button id="logoutBtn" class="w-full bg-error-container text-error py-4 rounded-full font-headline font-semibold text-lg hover:bg-error/10 transition-all active:scale-95 mt-3">
      <i class="fas fa-sign-out-alt mr-2"></i> تسجيل الخروج
    </button>
  </div>

  <!-- سجل الطلبات -->
  <div class="bg-surface rounded-[2.5rem] p-6 shadow-[0_10px_30px_rgba(0,30,64,0.08)] border border-white/20">
    <h3 class="font-headline text-xl font-bold text-primary mb-4 flex items-center gap-2">
      <i class="fas fa-history"></i> سجل الطلبات
    </h3>
    <div id="ordersHistoryList"></div>
  </div>
</div>

<!-- رسائل التنبيه -->
<div id="toastMessage" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-on-surface text-white px-6 py-3 rounded-full shadow-lg z-50 opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap"></div>

<script>
  (function() {
    const STORAGE_CURRENT = 'teeshop_current';
    const STORAGE_ORDERS = 'teeshop_orders_v3';
    const STORAGE_USERS = 'teeshop_users';

    let currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT));
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    const orders = JSON.parse(localStorage.getItem(STORAGE_ORDERS)) || [];
    const userOrders = orders.filter(o => o.userId === currentUser.email);

    function showToast(msg) {
      const toast = document.getElementById('toastMessage');
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 2500);
    }

    function updateUI() {
      document.getElementById('profileAvatar').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
      document.getElementById('profileName').textContent = currentUser.name || 'مستخدم';
      document.getElementById('profileEmail').textContent = currentUser.email;
      document.getElementById('profilePhone').textContent = currentUser.phone || 'غير محدد';

      const total = userOrders.length;
      const pending = userOrders.filter(o => o.status === 'pending').length;
      const spent = userOrders.reduce((s, o) => s + (o.total || 0), 0);

      document.getElementById('totalOrders').textContent = total;
      document.getElementById('pendingOrders').textContent = pending;
      document.getElementById('totalSpent').textContent = spent;

      renderOrdersHistory();
    }

    function renderOrdersHistory() {
      const container = document.getElementById('ordersHistoryList');
      
      if (userOrders.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-on-surface/50"><i class="fas fa-box-open text-4xl mb-3 opacity-30"></i><p>لا توجد طلبات سابقة</p></div>';
        return;
      }

      const sorted = [...userOrders].reverse();
      container.innerHTML = sorted.map(order => {
        const statusClass = order.status === 'pending' ? 'text-yellow-600 bg-yellow-50' : 
                           order.status === 'cancelled' ? 'text-error bg-error-container' : 'text-green-600 bg-green-50';
        const statusText = order.status === 'pending' ? '⏳ قيد الانتظار' : 
                          order.status === 'cancelled' ? '❌ ملغي' : '✅ مكتمل';
        
        return `
          <div class="flex justify-between items-center p-4 bg-surface-container-low rounded-2xl mb-3">
            <div>
              <h4 class="font-bold">طلب #${order.id.toString().slice(-6)}</h4>
              <p class="text-xs text-on-surface/60">${new Date(order.createdAt).toLocaleDateString('ar-EG')}</p>
            </div>
            <div class="text-left">
              <span class="px-3 py-1 rounded-full text-xs font-medium ${statusClass}">${statusText}</span>
              <p class="font-bold text-primary mt-1">${order.total} ج.م</p>
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('editProfileBtn').addEventListener('click', () => {
      document.getElementById('editSection').style.display = 'block';
      document.getElementById('editProfileBtn').style.display = 'none';
      
      document.getElementById('editName').value = currentUser.name || '';
      document.getElementById('editPhone').value = currentUser.phone || '';
      document.getElementById('editEmail').value = currentUser.email;
    });

    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('editSection').style.display = 'none';
      document.getElementById('editProfileBtn').style.display = 'block';
    });

    document.getElementById('saveProfileBtn').addEventListener('click', () => {
      const newName = document.getElementById('editName').value.trim();
      const newPhone = document.getElementById('editPhone').value.trim();

      if (!newName) {
        showToast('الاسم مطلوب');
        return;
      }

      currentUser.name = newName;
      currentUser.phone = newPhone;
      localStorage.setItem(STORAGE_CURRENT, JSON.stringify(currentUser));

      const users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
      const idx = users.findIndex(u => u.email === currentUser.email);
      if (idx !== -1) {
        users[idx].name = newName;
        users[idx].phone = newPhone;
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
      }

      updateUI();
      document.getElementById('editSection').style.display = 'none';
      document.getElementById('editProfileBtn').style.display = 'block';
      showToast('✅ تم حفظ التغييرات');
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (!confirm('هل أنت متأكد من تسجيل الخروج؟')) return;
      
      if (typeof google !== 'undefined' && google.accounts?.id) {
        google.accounts.id.revoke(currentUser.email, () => {
          localStorage.removeItem(STORAGE_CURRENT);
          window.location.href = 'login.html';
        });
      } else {
        localStorage.removeItem(STORAGE_CURRENT);
        window.location.href = 'login.html';
      }
    });

    updateUI();
  })();
</script>
</body>
</html>
