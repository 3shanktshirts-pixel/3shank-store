<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>عشانك • أفخم متجر أزياء في مصر</title>
  <!-- الخطوط والأيقونات -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- مكتبات الحركة -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <style>
    /* ===== أساسيات التصميم الفاخر - كحلي وأبيض ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #f5f7fa;
      color: #0a1929;
      line-height: 1.4;
      min-height: 100vh;
      padding-bottom: 100px;
      transition: background 0.3s;
      overflow-x: hidden;
    }

    /* خلفية متحركة بتأثير Parallax - كحلي وأبيض */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 30%, rgba(10, 25, 41, 0.03), #ffffff 80%);
      z-index: -3;
      transition: transform 0.1s ease-out;
      will-change: transform;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><circle fill="rgba(10,25,41,0.03)" cx="20" cy="20" r="1.5"></circle></pattern></defs><rect width="100%" height="100%" fill="url(%23dots)"></rect></svg>');
      z-index: -2;
      animation: drift 40s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      0% { transform: translate(0,0); }
      100% { transform: translate(-40px,-40px); }
    }

    /* مؤشر السحب للتحديث */
    .pull-to-refresh {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 80px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 200;
      opacity: 0; transition: opacity 0.2s;
    }
    .pull-to-refresh.visible {
      opacity: 1;
    }
    .ptr-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(10, 25, 41, 0.1);
      border-top-color: #0a1929;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* هيدر زجاجي بتأثير ظل - كحلي */
    .ios-header {
      position: sticky; top: 0; z-index: 90;
      padding: 14px 0 10px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border-bottom: 0.5px solid rgba(10, 25, 41, 0.08);
      box-shadow: 0 10px 30px -10px rgba(10, 25, 41, 0.1);
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .logo-icon {
      font-size: 32px;
      color: #0a1929;
      filter: drop-shadow(0 0 15px rgba(10, 25, 41, 0.2));
      transition: transform 0.2s;
    }

    .logo-icon:hover { transform: scale(1.1); }

    .logo-text {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #0a1929, #1e3a5f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }

    .search-box {
      flex: 1;
      max-width: 400px;
      margin: 0 16px;
      transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1);
    }

    .search-box input {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 40px;
      background: rgba(10, 25, 41, 0.05);
      backdrop-filter: blur(10px);
      font-family: 'Cairo';
      font-size: 16px;
      color: #0a1929;
      transition: 0.3s;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
    }

    .search-box input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(10, 25, 41, 0.1), 0 10px 25px -5px rgba(0,0,0,0.1);
      transform: scale(1.02);
    }

    .search-box input::placeholder {
      color: rgba(10, 25, 41, 0.5);
    }

    .cart-button {
      background: rgba(10, 25, 41, 0.05);
      backdrop-filter: blur(10px);
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 30px;
      font-size: 26px;
      color: #0a1929;
      position: relative;
      cursor: pointer;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
      transition: 0.2s;
    }

    .cart-button:hover {
      background: rgba(10, 25, 41, 0.1);
      transform: scale(1.05);
    }

    .cart-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: #c0392b;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      box-shadow: 0 2px 10px rgba(192, 57, 43, 0.3);
    }

    /* الفلاتر */
    .filters-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .categories-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      flex: 1;
    }

    .category-chip {
      display: inline-block;
      padding: 10px 24px;
      background: rgba(10, 25, 41, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      font-weight: 600;
      color: #0a1929;
      cursor: pointer;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
      transition: all 0.2s;
    }

    .category-chip.active {
      background: #0a1929;
      color: white;
      box-shadow: 0 8px 20px rgba(10, 25, 41, 0.2);
      transform: translateY(-2px);
    }

    .filter-btn {
      background: rgba(10, 25, 41, 0.05);
      backdrop-filter: blur(10px);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #0a1929;
      cursor: pointer;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
      transition: 0.2s;
    }

    .filter-btn.active {
      background: #0a1929;
      color: white;
      box-shadow: 0 8px 20px rgba(10, 25, 41, 0.2);
    }

    /* شبكة المنتجات */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    /* بطاقة المنتج بتأثير Glare - كحلي وأبيض */
    .product-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(10, 25, 41, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.5);
      transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1);
      cursor: pointer;
      border: 0.5px solid rgba(255, 255, 255, 0.8);
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      animation: cardFadeIn 0.5s forwards;
    }

    .product-card::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      transform: translateZ(0);
    }

    .product-card:hover::after {
      opacity: 1;
      animation: glare 3s infinite;
    }

    @keyframes glare {
      0% { transform: translate(-30%, -30%) rotate(0deg); }
      100% { transform: translate(30%, 30%) rotate(180deg); }
    }

    @keyframes cardFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .product-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 30px 50px rgba(10, 25, 41, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.9);
    }

    .product-card:active {
      transform: scale(0.97);
    }

    .product-img {
      aspect-ratio: 1/1;
      background: #eef2f6;
      position: relative;
      overflow: hidden;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.2,0.9,0.4,1);
    }

    .product-card:hover .product-img img {
      transform: scale(1.08);
    }

    .badge-container {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 2;
    }

    .discount-badge {
      background: rgba(39, 174, 96, 0.9);
      backdrop-filter: blur(8px);
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 800;
      box-shadow: 0 6px 15px rgba(39, 174, 96, 0.2);
    }

    .new-badge {
      background: rgba(10, 25, 41, 0.9);
      backdrop-filter: blur(8px);
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 700;
      box-shadow: 0 6px 15px rgba(10, 25, 41, 0.2);
    }

    .bestseller-badge {
      background: rgba(192, 57, 43, 0.9);
      backdrop-filter: blur(8px);
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 700;
      box-shadow: 0 6px 15px rgba(192, 57, 43, 0.2);
    }

    .product-info {
      padding: 18px 14px 22px;
    }

    .product-title {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 8px;
      color: #0a1929;
    }

    .price-container {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }

    .original-price {
      font-size: 14px;
      color: #6b7a8a;
      text-decoration: line-through;
    }

    .current-price {
      font-size: 22px;
      font-weight: 800;
      color: #0a1929;
    }

    .stock-info {
      font-size: 13px;
      color: #6b7a8a;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stock-low { color: #f39c12; }
    .stock-out { color: #c0392b; }

    .add-btn {
      background: linear-gradient(145deg, #0a1929, #1e3a5f);
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(10, 25, 41, 0.2);
      transition: 0.2s;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
    }

    .add-btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 10px rgba(10, 25, 41, 0.2);
    }

    .add-btn:disabled {
      opacity: 0.5;
      background: #8e9aab;
      box-shadow: none;
    }

    /* شريط التبويب السفلي */
    .tab-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 400px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(30px);
      border-radius: 50px;
      padding: 6px 10px;
      display: flex;
      justify-content: space-around;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
      box-shadow: 0 20px 40px rgba(10, 25, 41, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.5);
      z-index: 95;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 4px;
      border-radius: 30px;
      color: #6b7a8a;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: 'Cairo';
    }

    .tab-item i {
      font-size: 24px;
      margin-bottom: 3px;
      transition: transform 0.2s;
    }

    .tab-item.active {
      background: rgba(10, 25, 41, 0.08);
      color: #0a1929;
    }

    .tab-item.active i {
      transform: translateY(-2px);
    }

    /* السلة الجانبية */
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      max-width: 440px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(50px);
      box-shadow: -10px 0 60px rgba(10, 25, 41, 0.1);
      z-index: 1000;
      transition: right 0.45s cubic-bezier(0.2,0.9,0.4,1);
      display: flex;
      flex-direction: column;
      border-left: 0.5px solid rgba(10, 25, 41, 0.1);
    }

    .cart-sidebar.open { right: 0; }

    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 25, 41, 0.3);
      backdrop-filter: blur(8px);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }

    .cart-overlay.open { opacity: 1; visibility: visible; }

    .cart-header {
      padding: 24px 22px;
      display: flex;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(10, 25, 41, 0.1);
    }

    .cart-header h3 {
      font-size: 28px;
      font-weight: 700;
      color: #0a1929;
    }

    .close-cart {
      background: rgba(10, 25, 41, 0.05);
      border: none;
      font-size: 28px;
      color: #0a1929;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      cursor: pointer;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
    }

    .cart-item {
      display: flex;
      gap: 16px;
      padding: 18px;
      background: rgba(10, 25, 41, 0.03);
      border-radius: 28px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
      border: 0.5px solid rgba(10, 25, 41, 0.05);
    }

    .cart-item-img {
      width: 75px;
      height: 75px;
      border-radius: 22px;
      object-fit: cover;
    }

    .cart-item-details { flex: 1; color: #0a1929; }
    .cart-item-title { font-weight: 700; }
    .cart-item-meta { font-size: 13px; color: #6b7a8a; margin: 4px 0; }
    .cart-item-price { color: #27ae60; font-weight: 700; }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .cart-item-actions input {
      width: 60px;
      padding: 8px;
      border-radius: 20px;
      border: none;
      background: rgba(10, 25, 41, 0.05);
      color: #0a1929;
      text-align: center;
    }

    .remove-item {
      background: none;
      border: none;
      color: #c0392b;
      font-size: 22px;
      cursor: pointer;
    }

    .cart-footer {
      padding: 22px;
      border-top: 0.5px solid rgba(10, 25, 41, 0.1);
      background: rgba(255, 255, 255, 0.6);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      font-size: 26px;
      color: #0a1929;
      margin-bottom: 18px;
    }

    .checkout-btn {
      background: linear-gradient(145deg, #0a1929, #1e3a5f);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 18px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(10, 25, 41, 0.2);
    }

    /* قسم الطلبات المعلقة */
    .pending-orders-section {
      padding: 18px;
      background: rgba(10, 25, 41, 0.02);
      margin: 8px 18px;
      border-radius: 32px;
    }

    .pending-order-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 18px;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
      box-shadow: 0 15px 30px rgba(10, 25, 41, 0.05);
    }

    .pending-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      color: #0a1929;
    }

    .pending-header i {
      color: #0a1929;
      font-size: 22px;
    }

    .timer {
      font-family: 'SF Mono', 'Cairo', monospace;
      font-size: 32px;
      font-weight: 700;
      background: #eef2f6;
      color: #0a1929;
      padding: 12px 20px;
      border-radius: 60px;
      text-align: center;
      letter-spacing: 4px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05), 0 0 30px rgba(10, 25, 41, 0.1);
      margin-bottom: 16px;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
    }

    .pending-products {
      font-size: 15px;
      color: #3a5068;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .truck-animation {
      display: inline-block;
      animation: truckMove 1.5s infinite alternate;
      color: #0a1929;
    }

    @keyframes truckMove {
      0% { transform: translateX(0); }
      100% { transform: translateX(12px); }
    }

    .cancel-order-btn {
      background: #c0392b;
      border: none;
      color: white;
      padding: 14px;
      border-radius: 50px;
      width: 100%;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(192, 57, 43, 0.2);
    }

    /* المودالات */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 25, 41, 0.3);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }

    .modal-overlay.active { visibility: visible; opacity: 1; }

    .product-modal {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(40px);
      border-radius: 48px;
      width: 90%;
      max-width: 480px;
      padding: 32px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 40px 80px rgba(10, 25, 41, 0.1);
      color: #0a1929;
    }

    .success-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      padding: 50px 40px;
      border-radius: 60px;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
      text-align: center;
      color: #0a1929;
      box-shadow: 0 40px 80px rgba(10, 25, 41, 0.15);
    }

    .success-popup.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .toast-message {
      position: fixed;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(10, 25, 41, 0.9);
      backdrop-filter: blur(20px);
      color: white;
      padding: 16px 32px;
      border-radius: 60px;
      z-index: 2000;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(10, 25, 41, 0.2);
    }

    .toast-message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden { display: none !important; }

    /* أزرار التنقل */
    .profile-link {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      width: 48px;
      height: 48px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0a1929;
      border: 0.5px solid rgba(10, 25, 41, 0.1);
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
    }

    .profile-link:hover {
      background: #0a1929;
      color: white;
    }

    .admin-link {
      position: fixed;
      top: 80px;
      left: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      width: 48px;
      height: 48px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8e44ad;
      border: 0.5px solid rgba(142, 68, 173, 0.2);
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
    }

    .admin-link:hover {
      background: #8e44ad;
      color: white;
    }

    .logout-btn {
      position: fixed;
      top: 140px;
      left: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      width: 48px;
      height: 48px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c0392b;
      border: 0.5px solid rgba(192, 57, 43, 0.2);
      cursor: pointer;
      transition: 0.2s;
      border: none;
    }

    .logout-btn:hover {
      background: #c0392b;
      color: white;
    }

    /* حقول الإدخال في المودالات */
    .product-modal input,
    .product-modal textarea,
    .product-modal select {
      width: 100%;
      padding: 16px;
      border-radius: 40px;
      border: none;
      background: rgba(10, 25, 41, 0.05);
      margin-bottom: 16px;
      color: #0a1929;
      font-family: 'Cairo';
    }

    .product-modal input::placeholder,
    .product-modal textarea::placeholder {
      color: rgba(10, 25, 41, 0.5);
    }

    .product-modal button[type="submit"] {
      background: #0a1929;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 40px;
      width: 100%;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- مؤشر السحب للتحديث -->
<div class="pull-to-refresh" id="pullToRefresh">
  <div class="ptr-spinner"></div>
</div>

<div id="toast" class="toast-message"></div>

<!-- أزرار التنقل -->
<a href="profile.html" class="profile-link" title="الملف الشخصي"><i class="fas fa-user"></i></a>
<a href="admin.html" class="admin-link" id="adminNavBtn" style="display: none;" title="لوحة التحكم"><i class="fas fa-crown"></i></a>
<button class="logout-btn" id="logoutBtn" title="تسجيل الخروج"><i class="fas fa-sign-out-alt"></i></button>

<!-- هيدر -->
<div class="ios-header">
  <div class="container header-content">
    <div class="logo-area">
      <span class="logo-icon"><i class="fas fa-sparkles"></i></span>
      <span class="logo-text">عشانك</span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
    </div>
    <button class="cart-button" id="cartToggle">
      <i class="fas fa-bag-shopping"></i>
      <span id="cartCountBadge" class="cart-badge">0</span>
    </button>
  </div>
</div>

<!-- فلاتر -->
<div class="container" data-aos="fade-down" data-aos-duration="600">
  <div class="filters-bar">
    <div class="categories-scroll">
      <span class="category-chip active" data-category="all">الكل</span>
      <span class="category-chip" data-category="men">رجالي</span>
      <span class="category-chip" data-category="women">نسائي</span>
    </div>
    <div class="filter-toggles">
      <button class="filter-btn" id="filterInStock"><i class="fas fa-box"></i> متوفر</button>
    </div>
  </div>
</div>

<!-- شبكة المنتجات -->
<div class="container">
  <div id="productsContainer" class="products-grid"></div>
</div>

<!-- شريط التبويب -->
<div class="tab-bar">
  <button class="tab-item active" data-tab="home"><i class="fas fa-house"></i><span>الرئيسية</span></button>
  <button class="tab-item" data-tab="search"><i class="fas fa-magnifying-glass"></i><span>بحث</span></button>
  <button class="tab-item" data-tab="cart"><i class="fas fa-bag-shopping"></i><span>السلة</span></button>
</div>

<!-- سلة جانبية -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>سلتي</h3>
    <button class="close-cart" id="closeCartBtn"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="cart-items" id="cartItemsContainer"></div>
  <div id="pendingOrdersContainer" class="pending-orders-section"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>الإجمالي</span>
      <span id="cartTotalAmount">0 ج.م</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn">إتمام الشراء</button>
  </div>
</div>

<!-- مودال المنتج -->
<div class="modal-overlay" id="productModal">
  <div class="product-modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h3 id="modalProductTitle"></h3>
      <button onclick="closeProductModal()" style="background:none;border:none;font-size:28px; color:#0a1929; cursor:pointer;">&times;</button>
    </div>
    <div style="display:flex; gap:12px; margin-bottom:20px;">
      <img id="mainModalImage" style="width:100%; border-radius:32px; aspect-ratio:1/1; object-fit:cover;">
    </div>
    <p id="modalProductDesc" style="margin-bottom:16px;"></p>
    <div id="modalStockInfo" style="margin-bottom:12px; font-size:14px;"></div>
    <div style="margin:15px 0;">
      <span id="modalOriginalPrice" style="text-decoration:line-through; color:#6b7a8a;"></span>
      <span id="modalCurrentPrice" style="font-size:28px; font-weight:800; margin-right:12px; color:#0a1929;"></span>
    </div>
    <select id="modalSizeSelect" style="width:100%; padding:14px; border-radius:40px; margin-bottom:12px; background:rgba(10,25,41,0.05); border:none; color:#0a1929;"></select>
    <select id="modalAgeSelect" style="width:100%; padding:14px; border-radius:40px; margin-bottom:20px; background:rgba(10,25,41,0.05); border:none; color:#0a1929;"></select>
    <button id="modalAddToCartBtn" style="background:#0a1929; color:white; border:none; padding:16px; border-radius:40px; width:100%; font-weight:700;">أضف إلى السلة</button>
  </div>
</div>

<!-- مودال إتمام الشراء -->
<div class="modal-overlay" id="checkoutModal">
  <div class="product-modal">
    <h2 style="margin-bottom:24px; color:#0a1929;">إتمام الطلب</h2>
    <form id="checkoutForm">
      <input type="text" id="custName" placeholder="الاسم الكامل" required>
      <input type="tel" id="custPhone" placeholder="رقم الهاتف" required>
      <input type="email" id="custEmail" placeholder="البريد الإلكتروني" required>
      <textarea id="custAddress" placeholder="عنوان التوصيل" rows="3" required></textarea>
      <button type="submit">تأكيد الطلب</button>
    </form>
  </div>
</div>

<!-- نافذة النجاح -->
<div class="success-popup" id="successPopup">
  <div style="font-size:80px; color:#27ae60; margin-bottom:20px;">✓</div>
  <h2 style="font-size:32px; color:#0a1929;">تم الطلب!</h2>
  <p style="font-size:20px; opacity:0.7; color:#0a1929;">شكراً لثقتك</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
  AOS.init({ once: true, offset: 50 });

  (function(){
    "use strict";

    // التحقق من الجلسة
    const STORAGE_CURRENT = 'teeshop_current';
    const currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT));
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    // إظهار/إخفاء أزرار المدير
    if (currentUser.role === 'admin') {
      document.getElementById('adminNavBtn').style.display = 'flex';
    }

    // تعبئة بيانات المستخدم في نموذج الطلب
    document.getElementById('custName').value = currentUser.name || '';
    document.getElementById('custPhone').value = currentUser.phone || '';
    document.getElementById('custEmail').value = currentUser.email || '';

    let products = [];
    let cart = [];
    let currentProduct = null;
    let currentCategory = 'all';
    let searchQuery = '';
    let filterInStock = false;
    let pendingOrders = [];
    let timerIntervals = [];

    // تأثير Parallax للخلفية
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 20 - 10;
      const y = (e.clientY / window.innerHeight) * 20 - 10;
      const bg = document.querySelector('body::before');
      if (bg) {
        bg.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
      }
    });

    // سحب للتحديث
    let touchStartY = 0;
    let pulling = false;
    const ptr = document.getElementById('pullToRefresh');
    
    window.addEventListener('touchstart', (e) => {
      if (window.scrollY === 0) {
        touchStartY = e.touches[0].clientY;
      }
    });
    
    window.addEventListener('touchmove', (e) => {
      if (window.scrollY === 0 && !pulling) {
        const touchY = e.touches[0].clientY;
        const diff = touchY - touchStartY;
        if (diff > 60) {
          pulling = true;
          ptr.classList.add('visible');
        }
      }
    });
    
    window.addEventListener('touchend', async () => {
      if (pulling) {
        ptr.classList.remove('visible');
        await loadProducts();
        showToast('🔄 تم تحديث المنتجات');
        pulling = false;
      }
    });

    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    async function loadProducts() {
      try {
        const res = await fetch('products.json');
        const json = await res.json();
        const stored = localStorage.getItem('ashanak_products');
        const local = stored ? JSON.parse(stored) : [];
        const merged = [...json];
        local.forEach(lp => {
          const idx = merged.findIndex(p => p.id === lp.id);
          if (idx >= 0) merged[idx] = lp;
          else merged.push(lp);
        });
        products = merged;
      } catch {
        const s = localStorage.getItem('ashanak_products');
        products = s ? JSON.parse(s) : [];
      }
      products = products.map(p => ({
        ...p,
        stock: p.stock ?? 10,
        active: p.active ?? true,
        isNew: p.isNew ?? false,
        isBestseller: p.isBestseller ?? false,
        images: p.images?.length ? p.images : ['https://images.pexels.com/photos/428338/pexels-photo-428338.jpeg?auto=compress&cs=tinysrgb&w=600'],
        sizes: p.sizes || ['S', 'M', 'L', 'XL'],
        ages: p.ages || ['12-14 سنة', '15-17 سنة', '18+ سنة']
      }));
      renderProducts();
    }

    function saveCart() {
      localStorage.setItem('ashanak_cart', JSON.stringify(cart));
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById('cartCountBadge').innerText = cart.reduce((s,i)=>s+i.quantity,0);
      renderCartSidebar();
    }

    function renderProducts() {
      let filtered = products.filter(p => {
        if (!p.active) return false;
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;
        if (filterInStock && p.stock <= 0) return false;
        if (searchQuery && !p.name.includes(searchQuery) && !(p.description || '').includes(searchQuery)) return false;
        return true;
      });

      const container = document.getElementById('productsContainer');
      if (filtered.length === 0) {
        container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:#6b7a8a;">😕 لا توجد منتجات</div>`;
        return;
      }

      container.innerHTML = filtered.map((p, index) => {
        const hasDiscount = p.originalPrice && p.originalPrice > p.price;
        const discountPercent = hasDiscount ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
        const stockClass = p.stock <= 0 ? 'stock-out' : (p.stock < 5 ? 'stock-low' : '');
        const stockText = p.stock <= 0 ? 'نفذ المخزون' : (p.stock < 5 ? `تبقى ${p.stock} فقط` : `${p.stock} قطعة`);
        
        return `
          <div class="product-card" style="animation-delay: ${index * 0.03}s;" onclick="openProductModal('${p.id}')">
            <div class="product-img">
              <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
              <div class="badge-container">
                ${hasDiscount ? `<span class="discount-badge">-${discountPercent}%</span>` : ''}
                ${p.isNew ? '<span class="new-badge">جديد</span>' : ''}
                ${p.isBestseller ? '<span class="bestseller-badge"><i class="fas fa-fire"></i> الأكثر مبيعاً</span>' : ''}
              </div>
            </div>
            <div class="product-info">
              <div class="product-title">${p.name}</div>
              <div class="price-container">
                ${hasDiscount ? `<span class="original-price">${p.originalPrice} ج.م</span>` : ''}
                <span class="current-price">${p.price} ج.م</span>
              </div>
              <div class="stock-info ${stockClass}">
                <i class="fas ${p.stock > 0 ? 'fa-box' : 'fa-box-open'}"></i> ${stockText}
              </div>
              <button class="add-btn" onclick="event.stopPropagation(); quickAdd('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''}>
                <i class="fas fa-plus"></i> ${p.stock > 0 ? 'أضف للسلة' : 'غير متوفر'}
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.quickAdd = (id) => openProductModal(id);

    window.openProductModal = (id) => {
      const p = products.find(x => x.id === id);
      if (!p || !p.active) return;
      currentProduct = p;
      
      document.getElementById('modalProductTitle').innerText = p.name;
      document.getElementById('modalProductDesc').innerText = p.description || '';
      document.getElementById('mainModalImage').src = p.images[0];
      document.getElementById('modalSizeSelect').innerHTML = p.sizes.map(s => `<option>${s}</option>`).join('');
      document.getElementById('modalAgeSelect').innerHTML = p.ages.map(a => `<option>${a}</option>`).join('');
      
      const stockInfo = document.getElementById('modalStockInfo');
      if (p.stock <= 0) {
        stockInfo.innerHTML = '<span style="color:#c0392b;"><i class="fas fa-times-circle"></i> غير متوفر حالياً</span>';
        document.getElementById('modalAddToCartBtn').disabled = true;
      } else {
        stockInfo.innerHTML = `<span style="color:#27ae60;"><i class="fas fa-check-circle"></i> متوفر (${p.stock} قطعة)</span>`;
        document.getElementById('modalAddToCartBtn').disabled = false;
      }
      
      const origSpan = document.getElementById('modalOriginalPrice');
      const currSpan = document.getElementById('modalCurrentPrice');
      if (p.originalPrice && p.originalPrice > p.price) {
        origSpan.innerText = p.originalPrice + ' ج.م';
        currSpan.innerText = p.price + ' ج.م';
      } else {
        origSpan.innerText = '';
        currSpan.innerText = p.price + ' ج.م';
      }
      
      document.getElementById('productModal').classList.add('active');
    };

    window.closeProductModal = () => document.getElementById('productModal').classList.remove('active');

    document.getElementById('modalAddToCartBtn').onclick = () => {
      if (!currentProduct) return;
      if (currentProduct.stock <= 0) {
        showToast('⚠️ المنتج غير متوفر حالياً');
        return;
      }
      
      const size = document.getElementById('modalSizeSelect').value;
      const age = document.getElementById('modalAgeSelect').value;
      
      const existingCartItem = cart.find(i => i.productId === currentProduct.id && i.size === size && i.age === age);
      const currentQty = existingCartItem ? existingCartItem.quantity : 0;
      if (currentQty >= currentProduct.stock) {
        showToast(`⚠️ لا يمكن إضافة أكثر من ${currentProduct.stock} قطعة`);
        return;
      }
      
      if (existingCartItem) {
        existingCartItem.quantity++;
      } else {
        cart.push({
          productId: currentProduct.id,
          name: currentProduct.name,
          price: currentProduct.price,
          size, age,
          quantity: 1,
          image: currentProduct.images[0],
          maxStock: currentProduct.stock
        });
      }
      
      saveCart();
      closeProductModal();
      showToast(`✅ تمت إضافة "${currentProduct.name}" إلى السلة`);
      
      confetti({particleCount: 50, spread: 60, origin: {y: 0.7}});
    };

    function renderCartSidebar() {
      const container = document.getElementById('cartItemsContainer');
      const totalSpan = document.getElementById('cartTotalAmount');
      
      if (cart.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:50px; color:#6b7a8a;"><i class="fas fa-bag-shopping" style="font-size:48px; opacity:0.3;"></i><p style="margin-top:15px;">سلة التسوق فارغة</p></div>';
        totalSpan.innerText = '0 ج.م';
        return;
      }
      
      let total = 0;
      container.innerHTML = cart.map((item, idx) => {
        total += item.price * item.quantity;
        const product = products.find(p => p.id === item.productId);
        const maxStock = product ? product.stock : 999;
        return `
          <div class="cart-item">
            <img src="${item.image}" class="cart-item-img" loading="lazy">
            <div class="cart-item-details">
              <div class="cart-item-title">${item.name}</div>
              <div class="cart-item-meta">مقاس: ${item.size} | العمر: ${item.age}</div>
              <div class="cart-item-price">${item.price} ج.م</div>
              <div class="cart-item-actions">
                <input type="number" min="1" max="${maxStock}" value="${item.quantity}" onchange="updateCartQuantity(${idx}, this.value)">
                <button class="remove-item" onclick="removeCartItem(${idx})"><i class="fas fa-trash"></i></button>
              </div>
            </div>
          </div>
        `;
      }).join('');
      totalSpan.innerText = total + ' ج.م';
    }

    window.updateCartQuantity = (idx, qty) => {
      qty = parseInt(qty);
      if (qty < 1) qty = 1;
      const item = cart[idx];
      const product = products.find(p => p.id === item.productId);
      if (product && qty > product.stock) {
        showToast(`⚠️ الكمية القصوى المتاحة هي ${product.stock}`);
        qty = product.stock;
      }
      cart[idx].quantity = qty;
      saveCart();
    };

    window.removeCartItem = (idx) => {
      cart.splice(idx, 1);
      saveCart();
      showToast('🗑️ تمت إزالة المنتج');
    };

    function openCart() {
      document.getElementById('cartSidebar').classList.add('open');
      document.getElementById('cartOverlay').classList.add('open');
    }

    // ========== إدارة الطلبات المعلقة ==========
    async function cancelPendingOrder(orderId) {
      const order = pendingOrders.find(o => o.id === orderId);
      if (!order) return;
      
      order.items.forEach(item => {
        const product = products.find(p => p.id === item.productId);
        if (product) product.stock += item.quantity;
      });
      localStorage.setItem('ashanak_products', JSON.stringify(products));
      
      try {
        await fetch('https://formspree.io/f/{your-form-id}', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: currentUser.email,
            subject: `❌ إلغاء طلب #${orderId}`,
            message: `العميل: ${order.customer.name}\nالهاتف: ${order.customer.phone}\nألغى الطلب رقم ${orderId}`
          })
        });
      } catch(e) {}
      
      pendingOrders = pendingOrders.filter(o => o.id !== orderId);
      savePendingOrders();
      
      const timerEntry = timerIntervals.find(t => t.orderId === orderId);
      if (timerEntry) {
        clearInterval(timerEntry.interval);
        timerIntervals = timerIntervals.filter(t => t.orderId !== orderId);
      }
      
      renderPendingOrders();
      renderProducts();
      showToast('❌ تم إلغاء الطلب واسترجاع المخزون');
    }

    function createPendingOrder(customer, items, totalAmount) {
      const now = new Date();
      const expiresAt = new Date(now.getTime() + 12 * 60 * 60 * 1000);
      const newOrder = {
        id: 'ORD-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
        customer,
        items: items.map(i => ({ ...i })),
        total: totalAmount,
        createdAt: now.toISOString(),
        expiresAt: expiresAt.toISOString()
      };
      pendingOrders.push(newOrder);
      savePendingOrders();
      startTimerForOrder(newOrder);
      renderPendingOrders();
    }

    function savePendingOrders() {
      localStorage.setItem('ashanak_pending_orders', JSON.stringify(pendingOrders));
    }

    function loadPendingOrders() {
      const saved = localStorage.getItem('ashanak_pending_orders');
      if (saved) {
        try {
          pendingOrders = JSON.parse(saved);
          const now = new Date();
          pendingOrders = pendingOrders.filter(order => {
            if (new Date(order.expiresAt) < now) {
              order.items.forEach(item => {
                const product = products.find(p => p.id === item.productId);
                if (product) product.stock += item.quantity;
              });
              localStorage.setItem('ashanak_products', JSON.stringify(products));
              return false;
            }
            return true;
          });
          savePendingOrders();
          pendingOrders.forEach(order => startTimerForOrder(order));
        } catch(e) { pendingOrders = []; }
      }
      renderPendingOrders();
    }

    function startTimerForOrder(order) {
      const existing = timerIntervals.find(t => t.orderId === order.id);
      if (existing) clearInterval(existing.interval);
      
      const interval = setInterval(() => {
        const now = new Date();
        const expires = new Date(order.expiresAt);
        const diff = expires - now;
        if (diff <= 0) {
          cancelPendingOrder(order.id);
          clearInterval(interval);
          timerIntervals = timerIntervals.filter(t => t.orderId !== order.id);
        } else {
          const timerSpan = document.querySelector(`.timer[data-order-id="${order.id}"]`);
          if (timerSpan) {
            const hours = Math.floor(diff / (1000*60*60));
            const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
            const seconds = Math.floor((diff % (1000*60)) / 1000);
            timerSpan.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
          }
        }
      }, 1000);
      timerIntervals.push({ orderId: order.id, interval });
    }

    function renderPendingOrders() {
      const container = document.getElementById('pendingOrdersContainer');
      if (!pendingOrders.length) { container.innerHTML = ''; return; }
      
      container.innerHTML = pendingOrders.map(order => {
        const now = new Date();
        const expires = new Date(order.expiresAt);
        const diff = expires - now;
        const hours = Math.floor(diff / (1000*60*60));
        const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
        const seconds = Math.floor((diff % (1000*60)) / 1000);
        const timeStr = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        
        const itemNames = order.items.map(i => i.name).slice(0,2).join('، ');
        const more = order.items.length > 2 ? ` +${order.items.length-2}` : '';
        const totalItems = order.items.reduce((s,i) => s + i.quantity, 0);
        
        return `
          <div class="pending-order-card" data-aos="fade-left" id="order-${order.id}">
            <div class="pending-header">
              <i class="fas fa-hourglass-half"></i>
              <span>طلب #${order.id.slice(-6)}</span>
            </div>
            <div class="timer" data-order-id="${order.id}">${timeStr}</div>
            <div class="pending-products">
              <span class="truck-animation"><i class="fas fa-truck"></i></span>
              <span>${itemNames}${more} (${totalItems} قطعة)</span>
            </div>
            <div style="font-size:14px; margin-bottom:12px; display:flex; justify-content:space-between; color:#0a1929;">
              <span>الإجمالي: <strong>${order.total} ج.م</strong></span>
            </div>
            <button class="cancel-order-btn" onclick="cancelPendingOrder('${order.id}')">إلغاء الطلب</button>
            <p style="font-size:11px; margin-top:8px; opacity:0.6;">يمكن الإلغاء خلال 12 ساعة</p>
          </div>
        `;
      }).join('');
    }

    window.cancelPendingOrder = (orderId) => {
      if (confirm('هل أنت متأكد من إلغاء الطلب؟')) {
        cancelPendingOrder(orderId);
      }
    };

    // ========== إتمام الشراء ==========
    document.getElementById('checkoutBtn').addEventListener('click', () => {
      if (!cart.length) { showToast('السلة فارغة'); return; }
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('cartOverlay').classList.remove('open');
      document.getElementById('checkoutModal').classList.add('active');
    });

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      for (let item of cart) {
        const product = products.find(p => p.id === item.productId);
        if (!product || product.stock < item.quantity) {
          showToast(`⚠️ المخزون غير كافي لـ ${item.name}`);
          return;
        }
      }
      
      const customer = {
        name: document.getElementById('custName').value,
        phone: document.getElementById('custPhone').value,
        email: document.getElementById('custEmail').value,
        address: document.getElementById('custAddress').value
      };
      const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);
      
      // تحديث بيانات المستخدم
      currentUser.name = customer.name;
      currentUser.phone = customer.phone;
      localStorage.setItem(STORAGE_CURRENT, JSON.stringify(currentUser));
      
      cart.forEach(item => {
        const product = products.find(p => p.id === item.productId);
        if (product) product.stock = Math.max(0, product.stock - item.quantity);
      });
      localStorage.setItem('ashanak_products', JSON.stringify(products));
      
      try {
        const res = await fetch('https://formspree.io/f/{your-form-id}', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: customer.email,
            subject: `🛍️ طلب جديد من ${customer.name}`,
            message: `الاسم: ${customer.name}\nالهاتف: ${customer.phone}\nالبريد: ${customer.email}\nالعنوان: ${customer.address}\nالطلب: ${cart.map(i => `${i.name} x${i.quantity}`).join('\n')}\nالإجمالي: ${total} ج.م`
          })
        });
        
        if(res.ok) {
          createPendingOrder(customer, cart, total);
          cart = [];
          saveCart();
          document.getElementById('checkoutModal').classList.remove('active');
          document.getElementById('successPopup').classList.add('show');
          confetti({particleCount: 300, spread: 100, origin: {y: 0.6}});
          setTimeout(() => document.getElementById('successPopup').classList.remove('show'), 3000);
          document.getElementById('checkoutForm').reset();
          // إعادة تعبئة البيانات
          document.getElementById('custName').value = currentUser.name || '';
          document.getElementById('custPhone').value = currentUser.phone || '';
          document.getElementById('custEmail').value = currentUser.email || '';
          renderProducts();
        } else {
          showToast('حدث خطأ، حاول مجدداً');
        }
      } catch(err) {
        showToast('فشل الاتصال');
      }
    });

    // ========== الأحداث ==========
    document.getElementById('cartToggle').addEventListener('click', openCart);
    document.getElementById('closeCartBtn').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('cartOverlay').classList.remove('open');
    });
    document.getElementById('cartOverlay').addEventListener('click', () => {
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('cartOverlay').classList.remove('open');
    });

    document.querySelectorAll('.category-chip').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        currentCategory = el.dataset.category;
        renderProducts();
      });
    });

    document.getElementById('filterInStock').addEventListener('click', (e) => {
      filterInStock = !filterInStock;
      e.currentTarget.classList.toggle('active', filterInStock);
      renderProducts();
    });

    document.querySelectorAll('.tab-item').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(ti => ti.classList.remove('active'));
        t.classList.add('active');
        if(t.dataset.tab === 'cart') openCart();
        if(t.dataset.tab === 'home') window.scrollTo({top:0, behavior:'smooth'});
        if(t.dataset.tab === 'search') document.getElementById('searchInput').focus();
      });
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderProducts();
    });

    // تسجيل الخروج
    document.getElementById('logoutBtn').addEventListener('click', () => {
      if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
        if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
          google.accounts.id.revoke(currentUser.email, () => {
            localStorage.removeItem(STORAGE_CURRENT);
            window.location.href = 'login.html';
          });
        } else {
          localStorage.removeItem(STORAGE_CURRENT);
          window.location.href = 'login.html';
        }
      }
    });

    // بدء التشغيل
    loadProducts().then(() => {
      loadPendingOrders();
    });
    const savedCart = localStorage.getItem('ashanak_cart');
    if(savedCart) cart = JSON.parse(savedCart);
    updateCartUI();
  })();
</script>
</body>
</html>
