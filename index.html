<script>
  AOS.init({ once: true, offset: 50, duration: 600 });

  (function() {
    "use strict";

    // ========== التهيئة ==========
    const STORAGE_CURRENT = 'teeshop_current';
    const currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT));
    
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }

    document.getElementById('userNameDisplay').textContent = currentUser.name?.split(' ')[0] || 'مستخدم';
    if (currentUser.role === 'admin') {
      document.getElementById('adminNavBtn').classList.remove('hidden');
    }

    document.getElementById('custName').value = currentUser.name || '';
    document.getElementById('custPhone').value = currentUser.phone || '';
    document.getElementById('custEmail').value = currentUser.email || '';

    // ========== المتغيرات ==========
    let products = [];
    let cart = JSON.parse(localStorage.getItem('ashanak_cart')) || [];
    let currentProduct = null;
    let currentCategory = 'all';
    let searchQuery = '';
    let pendingOrders = JSON.parse(localStorage.getItem('ashanak_pending_orders')) || [];
    let timerIntervals = [];

    function showToast(msg, duration = 2500) {
      const toast = document.getElementById('toastMessage');
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', duration);
    }

    function saveCart() {
      localStorage.setItem('ashanak_cart', JSON.stringify(cart));
      updateCartUI();
    }

    function savePendingOrders() {
      localStorage.setItem('ashanak_pending_orders', JSON.stringify(pendingOrders));
    }

    function updateCartUI() {
      const totalQty = cart.reduce((s, i) => s + i.quantity, 0);
      document.getElementById('cartCountBadge').textContent = totalQty;
      renderCartItems();
    }

    // ========== تحميل المنتجات ==========
    async function loadProducts() {
      try {
        const res = await fetch('products.json');
        const json = await res.json();
        const stored = localStorage.getItem('ashanak_products');
        const local = stored ? JSON.parse(stored) : [];
        const merged = [...json];
        local.forEach(lp => {
          const idx = merged.findIndex(p => p.id === lp.id);
          if (idx >= 0) merged[idx] = lp;
          else merged.push(lp);
        });
        products = merged;
      } catch {
        const s = localStorage.getItem('ashanak_products');
        products = s ? JSON.parse(s) : [];
      }
      
      products = products.map(p => ({
        ...p,
        stock: p.stock ?? 10,
        active: p.active ?? true,
        isNew: p.isNew ?? Math.random() > 0.5,
        isBestseller: p.isBestseller ?? Math.random() > 0.7,
        images: p.images?.length ? p.images : ['https://images.pexels.com/photos/428338/pexels-photo-428338.jpeg?auto=compress&cs=tinysrgb&w=600'],
        sizes: p.sizes || ['S', 'M', 'L', 'XL'],
        ages: p.ages || ['12-14 سنة', '15-17 سنة', '18+ سنة'],
        brand: p.brand || 'عشانك',
        rating: p.rating || (4 + Math.random()).toFixed(1)
      }));
      
      renderProducts();
    }

    function renderProducts() {
      let filtered = products.filter(p => {
        if (!p.active) return false;
        if (currentCategory !== 'all' && p.category !== currentCategory) return false;
        if (searchQuery && !p.name.includes(searchQuery) && !(p.description || '').includes(searchQuery)) return false;
        return true;
      });

      const container = document.getElementById('productsContainer');
      
      if (filtered.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-16 text-on-surface/50"><i class="fas fa-box-open text-6xl mb-4 opacity-30"></i><p class="text-lg">لا توجد منتجات</p><p class="text-sm mt-2">جرب البحث عن شيء آخر</p></div>`;
        return;
      }

      container.innerHTML = filtered.map(p => {
        const hasDiscount = p.originalPrice && p.originalPrice > p.price;
        const discountPercent = hasDiscount ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
        
        return `
          <div class="product-card group cursor-pointer" onclick="openProductModal('${p.id}')" data-aos="fade-up" data-aos-delay="${Math.random() * 200}">
            <div class="relative aspect-[4/5] rounded-[2rem] overflow-hidden mb-3 bg-surface-container-high">
              <img src="${p.images[0]}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy">
              <button class="absolute top-3 left-3 w-9 h-9 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center shadow-sm hover:bg-error hover:text-white transition-colors" onclick="event.stopPropagation()">
                <i class="far fa-heart text-lg"></i>
              </button>
              ${p.isNew ? '<span class="absolute top-3 right-3 bg-primary text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-lg">جديد</span>' : ''}
              ${hasDiscount ? `<span class="absolute bottom-3 right-3 bg-error text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-lg">-${discountPercent}%</span>` : ''}
            </div>
            <div class="flex items-center gap-1 mb-1">
              <span class="text-xs text-outline">${p.brand}</span>
              <span class="text-xs text-accent ml-auto flex items-center gap-0.5">
                <i class="fas fa-star text-[10px]"></i> ${p.rating}
              </span>
            </div>
            <h4 class="font-headline font-bold text-on-surface mb-1 line-clamp-1">${p.name}</h4>
            <div class="flex items-center gap-2">
              <span class="font-headline font-bold text-primary text-lg">${p.price} ج.م</span>
              ${hasDiscount ? `<span class="text-xs text-outline line-through">${p.originalPrice} ج.م</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    // ========== السلة ==========
    function renderCartItems() {
      const container = document.getElementById('cartItemsContainer');
      const totalSpan = document.getElementById('cartTotalAmount');
      
      if (cart.length === 0) {
        container.innerHTML = '<div class="text-center py-16 text-on-surface/50"><i class="fas fa-shopping-cart text-6xl mb-4 opacity-30"></i><p class="text-lg">سلة التسوق فارغة</p><p class="text-sm mt-2">استعرض المنتجات وأضف ما يعجبك</p></div>';
        totalSpan.textContent = '0 ج.م';
        return;
      }
      
      let total = 0;
      container.innerHTML = cart.map((item, idx) => {
        total += item.price * item.quantity;
        return `
          <div class="flex gap-3 p-4 bg-surface-container-low rounded-2xl mb-3">
            <img src="${item.image}" class="w-20 h-20 rounded-xl object-cover" loading="lazy">
            <div class="flex-1">
              <div class="flex justify-between">
                <h5 class="font-bold">${item.name}</h5>
                <button onclick="removeCartItem(${idx})" class="text-error hover:bg-error-container p-1 rounded-full transition-colors">
                  <i class="fas fa-trash text-sm"></i>
                </button>
              </div>
              <p class="text-xs text-on-surface/60">مقاس: ${item.size} | ${item.age}</p>
              <p class="font-bold text-primary mt-1">${item.price} ج.م</p>
              <div class="flex items-center gap-3 mt-2">
                <div class="flex items-center gap-1 bg-surface-container-high rounded-full">
                  <button onclick="updateCartQty(${idx}, ${item.quantity - 1})" class="w-8 h-8 flex items-center justify-center hover:bg-surface-container-highest rounded-full transition-colors">−</button>
                  <span class="w-8 text-center font-medium">${item.quantity}</span>
                  <button onclick="updateCartQty(${idx}, ${item.quantity + 1})" class="w-8 h-8 flex items-center justify-center hover:bg-surface-container-highest rounded-full transition-colors">+</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      totalSpan.textContent = total + ' ج.م';
      renderPendingOrders();
    }

    window.updateCartQty = (idx, qty) => {
      if (qty < 1) {
        cart.splice(idx, 1);
      } else {
        cart[idx].quantity = qty;
      }
      saveCart();
    };

    window.removeCartItem = (idx) => {
      cart.splice(idx, 1);
      saveCart();
      showToast('🗑️ تمت إزالة المنتج');
    };

    // ========== الطلبات المعلقة ==========
    function renderPendingOrders() {
      const container = document.getElementById('pendingOrdersContainer');
      const activeOrders = pendingOrders.filter(o => new Date(o.expiresAt) > new Date());
      
      if (activeOrders.length === 0) {
        container.innerHTML = '';
        return;
      }
      
      container.innerHTML = `
        <div class="mt-4 pt-4 border-t border-outline-variant">
          <h4 class="font-headline font-bold text-primary mb-3 flex items-center gap-2">
            <i class="fas fa-hourglass-half"></i> طلبات نشطة (${activeOrders.length})
          </h4>
          ${activeOrders.map(order => `
            <div class="bg-surface-container-low rounded-2xl p-4 mb-3">
              <div class="flex justify-between items-center mb-2">
                <span class="font-bold">طلب #${order.id.slice(-6)}</span>
                <span class="text-primary font-bold">${order.total} ج.م</span>
              </div>
              <div class="timer-font text-3xl font-bold text-center bg-surface-container-high rounded-full py-2 mb-3" data-order-id="${order.id}">
                --:--:--
              </div>
              <div class="flex items-center gap-2 text-sm text-on-surface/60 mb-3">
                <span class="truck-animation"><i class="fas fa-truck"></i></span>
                <span class="line-clamp-1">${order.items.map(i => i.name).join('، ')}</span>
              </div>
              <button onclick="cancelPendingOrder('${order.id}')" class="w-full bg-error-container text-error py-2.5 rounded-full font-medium text-sm hover:bg-error hover:text-white transition-all">
                <i class="fas fa-ban ml-1"></i> إلغاء الطلب
              </button>
              <p class="text-xs text-center text-on-surface/40 mt-2">يمكن الإلغاء خلال 12 ساعة</p>
            </div>
          `).join('')}
        </div>
      `;
      
      activeOrders.forEach(order => startOrderTimer(order));
    }

    function startOrderTimer(order) {
      const existing = timerIntervals.find(t => t.orderId === order.id);
      if (existing) clearInterval(existing.interval);
      
      const interval = setInterval(() => {
        const expires = new Date(order.expiresAt);
        const diff = expires - new Date();
        
        if (diff <= 0) {
          cancelPendingOrder(order.id);
          clearInterval(interval);
          return;
        }
        
        const timerSpan = document.querySelector(`.timer-font[data-order-id="${order.id}"]`);
        if (timerSpan) {
          const hours = Math.floor(diff / 3600000);
          const minutes = Math.floor((diff % 3600000) / 60000);
          const seconds = Math.floor((diff % 60000) / 1000);
          timerSpan.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
      }, 1000);
      
      timerIntervals.push({ orderId: order.id, interval });
    }

    window.cancelPendingOrder = async (orderId) => {
      if (!confirm('هل أنت متأكد من إلغاء الطلب؟')) return;
      
      const order = pendingOrders.find(o => o.id === orderId);
      if (!order) return;
      
      try {
        await fetch('https://formspree.io/f/{your-form-id}', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: currentUser.email,
            subject: `❌ إلغاء طلب #${orderId}`,
            message: `العميل: ${order.customer.name}\nالهاتف: ${order.customer.phone}\nألغى الطلب رقم ${orderId}\nالقيمة: ${order.total} ج.م`
          })
        });
      } catch(e) {}
      
      pendingOrders = pendingOrders.filter(o => o.id !== orderId);
      savePendingOrders();
      
      const timerEntry = timerIntervals.find(t => t.orderId === orderId);
      if (timerEntry) {
        clearInterval(timerEntry.interval);
        timerIntervals = timerIntervals.filter(t => t.orderId !== orderId);
      }
      
      renderPendingOrders();
      showToast('❌ تم إلغاء الطلب');
    };

    // ========== مودال المنتج ==========
    window.openProductModal = (id) => {
      const p = products.find(x => x.id === id);
      if (!p) return;
      currentProduct = p;
      
      document.getElementById('modalProductTitle').textContent = p.name;
      document.getElementById('modalProductDesc').textContent = p.description || 'منتج عالي الجودة من عشانك';
      document.getElementById('mainModalImage').src = p.images[0];
      document.getElementById('modalCurrentPrice').textContent = p.price + ' ج.م';
      document.getElementById('modalSizeSelect').innerHTML = p.sizes.map(s => `<option>${s}</option>`).join('');
      document.getElementById('modalAgeSelect').innerHTML = p.ages.map(a => `<option>${a}</option>`).join('');
      
      document.getElementById('productModal').style.opacity = '1';
      document.getElementById('productModal').style.pointerEvents = 'auto';
    };

    window.closeProductModal = () => {
      document.getElementById('productModal').style.opacity = '0';
      document.getElementById('productModal').style.pointerEvents = 'none';
    };

    document.getElementById('modalAddToCartBtn').onclick = () => {
      if (!currentProduct) return;
      
      const size = document.getElementById('modalSizeSelect').value;
      const age = document.getElementById('modalAgeSelect').value;
      
      const existing = cart.find(i => i.productId === currentProduct.id && i.size === size && i.age === age);
      
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({
          productId: currentProduct.id,
          name: currentProduct.name,
          price: currentProduct.price,
          size, age,
          quantity: 1,
          image: currentProduct.images[0]
        });
      }
      
      saveCart();
      closeProductModal();
      showToast(`✅ تمت إضافة "${currentProduct.name}" إلى السلة`);
      confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
    };

    // ========== السلة ==========
    window.openCart = () => {
      document.getElementById('cartSidebar').style.transform = 'translateX(0)';
      document.getElementById('cartOverlay').style.opacity = '1';
      document.getElementById('cartOverlay').style.pointerEvents = 'auto';
    };

    window.closeCart = () => {
      document.getElementById('cartSidebar').style.transform = 'translateX(100%)';
      document.getElementById('cartOverlay').style.opacity = '0';
      document.getElementById('cartOverlay').style.pointerEvents = 'none';
    };

    document.getElementById('cartOverlay').onclick = closeCart;

    // ========== إتمام الطلب ==========
    window.openCheckoutModal = () => {
      if (cart.length === 0) {
        showToast('السلة فارغة');
        return;
      }
      closeCart();
      document.getElementById('checkoutModal').style.opacity = '1';
      document.getElementById('checkoutModal').style.pointerEvents = 'auto';
    };

    window.closeCheckoutModal = () => {
      document.getElementById('checkoutModal').style.opacity = '0';
      document.getElementById('checkoutModal').style.pointerEvents = 'none';
    };

    document.getElementById('checkoutForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const customer = {
        name: document.getElementById('custName').value,
        phone: document.getElementById('custPhone').value,
        email: document.getElementById('custEmail').value,
        address: document.getElementById('custAddress').value
      };
      const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      
      currentUser.name = customer.name;
      currentUser.phone = customer.phone;
      localStorage.setItem(STORAGE_CURRENT, JSON.stringify(currentUser));
      
      document.getElementById('globalLoader').classList.remove('hidden');
      
      try {
        const res = await fetch('https://formspree.io/f/{your-form-id}', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: customer.email,
            subject: `🛍️ طلب جديد من ${customer.name}`,
            message: `الاسم: ${customer.name}\nالهاتف: ${customer.phone}\nالبريد: ${customer.email}\nالعنوان: ${customer.address}\n\nالطلب:\n${cart.map(i => `${i.name} (${i.size} - ${i.age}) x${i.quantity}`).join('\n')}\n\nالإجمالي: ${total} ج.م`
          })
        });
        
        if (res.ok) {
          const newOrder = {
            id: 'ORD-' + Date.now(),
            customer,
            items: cart.map(i => ({ ...i })),
            total,
            createdAt: new Date().toISOString(),
            expiresAt: new Date(Date.now() + 12 * 60 * 60 * 1000).toISOString()
          };
          pendingOrders.push(newOrder);
          savePendingOrders();
          
          cart = [];
          saveCart();
          
          closeCheckoutModal();
          document.getElementById('globalLoader').classList.add('hidden');
          
          const popup = document.getElementById('successPopup');
          const content = document.getElementById('successPopupContent');
          popup.style.opacity = '1';
          popup.style.pointerEvents = 'auto';
          content.style.transform = 'scale(1)';
          
          confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
          
          setTimeout(() => {
            popup.style.opacity = '0';
            popup.style.pointerEvents = 'none';
            content.style.transform = 'scale(0.9)';
          }, 3500);
          
          document.getElementById('checkoutForm').reset();
          document.getElementById('custName').value = currentUser.name || '';
          document.getElementById('custPhone').value = currentUser.phone || '';
          document.getElementById('custEmail').value = currentUser.email || '';
          
          renderPendingOrders();
        }
      } catch(err) {
        showToast('فشل الاتصال بالخادم');
      }
      
      document.getElementById('globalLoader').classList.add('hidden');
    };

    window.closeSuccessPopup = () => {
      const popup = document.getElementById('successPopup');
      const content = document.getElementById('successPopupContent');
      popup.style.opacity = '0';
      popup.style.pointerEvents = 'none';
      content.style.transform = 'scale(0.9)';
    };

    // ========== تسجيل الخروج ==========
    window.handleLogout = () => {
      if (!confirm('هل أنت متأكد من تسجيل الخروج؟')) return;
      
      if (typeof google !== 'undefined' && google.accounts?.id) {
        google.accounts.id.revoke(currentUser.email, () => {
          localStorage.removeItem(STORAGE_CURRENT);
          window.location.href = 'login.html';
        });
      } else {
        localStorage.removeItem(STORAGE_CURRENT);
        window.location.href = 'login.html';
      }
    };

    // ========== الفئات ==========
    document.querySelectorAll('.category-card').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.dataset.category;
        renderProducts();
      });
    });
    
    document.querySelector('.category-card[data-category="all"]').classList.add('active');

    // ========== البحث ==========
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderProducts();
    });

    // ========== بدء التشغيل ==========
    loadProducts();
    updateCartUI();
    renderPendingOrders();
  })();
</script>

</body>
</html>
