<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عشانك • متجر التيشرتات الرجالي</title>
  <!-- الخطوط والأيقونات -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- AOS للظهور التدريجي -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #fdfdfd; color: #1e1e2f; line-height: 1.5; scroll-behavior: smooth; }
    .container { max-width: 1350px; margin: 0 auto; padding: 0 20px; }

    :root {
      --primary: #2a2a72;
      --primary-light: #4a4a9a;
      --secondary: #009ffd;
      --accent: #ff6b6b;
      --discount: #10b981;
      --bg-light: #f9f9ff;
      --shadow-sm: 0 10px 30px -5px rgba(0,0,0,0.05);
      --shadow-md: 0 20px 40px -10px rgba(0,0,0,0.1);
      --shadow-hover: 0 30px 50px -15px rgba(42,42,114,0.15);
      --border-radius-card: 28px;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .top-bar { background: var(--primary); color: white; padding: 8px 0; font-size: 0.9rem; }
    .top-bar .container { display: flex; justify-content: space-between; }
    .top-bar a { color: white; text-decoration: none; margin-right: 20px; font-weight: 500; }
    .top-bar i { margin-left: 6px; }

    .main-header {
      padding: 15px 0;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.5);
    }
    .main-header .container { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .logo { display: flex; align-items: baseline; gap: 5px; }
    .logo h1 {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }
    .logo span { font-size: 1.8rem; color: var(--accent); margin-right: 5px; }

    .search-wrapper { flex: 1; max-width: 480px; position: relative; }
    .search-wrapper input {
      width: 100%; padding: 14px 22px; border: 2px solid transparent; border-radius: 60px;
      background: white; box-shadow: var(--shadow-sm); font-family: 'Cairo', sans-serif;
      font-size: 1rem; transition: var(--transition);
    }
    .search-wrapper input:focus {
      outline: none; border-color: var(--primary-light);
      box-shadow: 0 0 0 5px rgba(42,42,114,0.1);
    }
    .search-wrapper button {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      background: var(--primary); color: white; border: none; width: 45px; height: 45px;
      border-radius: 50%; font-size: 1.2rem; cursor: pointer; transition: var(--transition);
    }
    .search-wrapper button:hover { background: var(--primary-light); }

    .header-actions { display: flex; align-items: center; gap: 25px; }
    .icon-btn {
      background: none; border: none; color: var(--primary); font-size: 1.7rem;
      cursor: pointer; position: relative; transition: var(--transition);
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px); box-shadow: var(--shadow-sm);
    }
    .icon-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }
    .cart-badge {
      position: absolute; top: -5px; right: -5px; background: var(--accent); color: white;
      border-radius: 30px; padding: 2px 8px; font-size: 0.75rem; font-weight: bold;
      box-shadow: 0 4px 8px rgba(255,107,107,0.3);
    }
    .admin-link {
      color: var(--primary); text-decoration: none; font-weight: 600; padding: 8px 16px;
      background: white; border-radius: 40px; box-shadow: var(--shadow-sm);
      transition: var(--transition); display: flex; align-items: center; gap: 6px;
    }
    .admin-link:hover { background: var(--primary); color: white; }

    .nav-menu { background: white; box-shadow: var(--shadow-sm); }
    .nav-menu ul { display: flex; list-style: none; gap: 15px; padding: 12px 0; }
    .nav-menu li a {
      text-decoration: none; color: #444; font-weight: 600; padding: 10px 22px;
      border-radius: 40px; transition: var(--transition); display: block;
    }
    .nav-menu li a:hover, .nav-menu li a.active { background: var(--primary); color: white; }

    .main-content { display: flex; gap: 30px; margin: 40px 0; }

    .filters-sidebar {
      width: 280px; background: white; border-radius: var(--border-radius-card);
      padding: 25px 20px; box-shadow: var(--shadow-md); height: fit-content;
      position: sticky; top: 120px; border: 1px solid rgba(255,255,255,0.5);
    }
    .filter-section { margin-bottom: 30px; }
    .filter-title {
      font-weight: 800; margin-bottom: 18px; font-size: 1.2rem;
      display: flex; align-items: center; gap: 10px; color: var(--primary);
    }
    .filter-option {
      display: flex; align-items: center; margin-bottom: 14px; cursor: pointer;
      transition: var(--transition); padding: 6px 10px; border-radius: 40px;
    }
    .filter-option:hover { background: var(--bg-light); }
    .filter-option input { margin-left: 12px; accent-color: var(--primary); width: 18px; height: 18px; }

    .products-area { flex: 1; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .section-header h2 {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(145deg, #1e1e2f, #2a2a72);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .sort-select {
      padding: 12px 20px; border-radius: 40px; border: 1px solid #ddd;
      background: white; font-family: 'Cairo', sans-serif; box-shadow: var(--shadow-sm);
    }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }

    .product-card {
      background: white; border-radius: var(--border-radius-card); overflow: hidden;
      box-shadow: var(--shadow-md); transition: var(--transition);
      border: 1px solid rgba(255,255,255,0.5); cursor: pointer; transform: translateY(0);
    }
    .product-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-hover); }

    .product-img {
      height: 280px; background: #f2f2fa; display: flex; align-items: center;
      justify-content: center; overflow: hidden; position: relative;
    }
    .product-img img {
      width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease;
    }
    .product-card:hover .product-img img { transform: scale(1.08); }

    .discount-badge {
      position: absolute; top: 15px; right: 15px; background: var(--discount);
      color: white; padding: 6px 14px; border-radius: 30px; font-size: 0.9rem;
      font-weight: 800; box-shadow: 0 4px 10px rgba(16,185,129,0.3);
      z-index: 2;
    }

    .product-info { padding: 20px; }
    .product-title { font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; }

    .price-container {
      display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
    }
    .original-price {
      font-size: 1.1rem; color: #94a3b8; text-decoration: line-through; font-weight: 500;
    }
    .current-price {
      font-size: 1.6rem; font-weight: 800; color: var(--discount);
    }
    .no-discount { color: var(--primary); }

    .add-btn {
      width: 100%; background: linear-gradient(145deg, var(--primary), var(--primary-light));
      color: white; border: none; padding: 14px; border-radius: 40px;
      font-weight: 700; font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      transition: var(--transition); box-shadow: 0 8px 15px rgba(42,42,114,0.2);
    }
    .add-btn:hover {
      background: linear-gradient(145deg, var(--primary-light), var(--secondary));
      transform: scale(1.02); box-shadow: 0 12px 20px rgba(42,42,114,0.3);
    }

    /* سلة جانبية */
    .cart-sidebar {
      position: fixed; top: 0; right: -480px; width: 450px; height: 100vh;
      background: white; box-shadow: -10px 0 40px rgba(0,0,0,0.1); z-index: 1000;
      transition: right 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      display: flex; flex-direction: column; border-radius: 40px 0 0 40px;
    }
    .cart-sidebar.open { right: 0; }
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
      z-index: 999; opacity: 0; visibility: hidden; transition: 0.3s;
    }
    .cart-overlay.open { opacity: 1; visibility: visible; }

    .cart-header { padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .close-cart { background: none; border: none; font-size: 2rem; cursor: pointer; color: #666; }

    .cart-items-container { flex: 1; overflow-y: auto; padding: 20px; }
    .cart-item { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
    .cart-item-img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; }
    .cart-item-details { flex: 1; }
    .cart-item-title { font-weight: 700; }
    .cart-item-meta { font-size: 0.85rem; color: #777; margin: 5px 0; }
    .cart-item-price { color: var(--discount); font-weight: 700; }
    .cart-item-actions { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .cart-item-actions input { width: 60px; padding: 5px; border: 1px solid #ddd; border-radius: 30px; text-align: center; }
    .remove-item { color: var(--accent); cursor: pointer; background: none; border: none; font-size: 1.2rem; }

    .cart-footer { padding: 25px; border-top: 1px solid #eee; background: var(--bg-light); }
    .cart-total { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; }
    .checkout-btn {
      background: linear-gradient(145deg, var(--primary), var(--secondary)); color: white;
      border: none; padding: 16px; border-radius: 50px; font-weight: 700; font-size: 1.2rem;
      cursor: pointer; width: 100%; transition: var(--transition);
    }

    /* مودال المنتج */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 1100;
      visibility: hidden; opacity: 0; transition: 0.2s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .product-modal {
      background: white; border-radius: 48px; max-width: 850px; width: 90%;
      max-height: 90vh; overflow-y: auto; padding: 35px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.2);
    }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .close-modal { background: none; border: none; font-size: 2rem; cursor: pointer; }

    .modal-gallery { display: flex; gap: 20px; margin-bottom: 25px; }
    .main-image { flex: 1; height: 350px; border-radius: 30px; background: #f5f5fa; display: flex; align-items: center; justify-content: center; }
    .main-image img { max-width: 100%; max-height: 100%; border-radius: 24px; }
    .thumbnail-list { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 350px; }
    .thumbnail { width: 85px; height: 85px; border-radius: 20px; border: 3px solid transparent; cursor: pointer; object-fit: cover; transition: var(--transition); }
    .thumbnail.active { border-color: var(--primary); transform: scale(1.02); }

    .option-group { margin-bottom: 25px; }
    .option-group label { font-weight: 700; display: block; margin-bottom: 10px; }
    .option-group select { width: 100%; padding: 14px; border-radius: 40px; border: 1px solid #ddd; font-family: 'Cairo'; }

    .modal-price { margin: 20px 0; }
    .modal-original { font-size: 1.3rem; color: #94a3b8; text-decoration: line-through; margin-left: 15px; }
    .modal-current { font-size: 2rem; font-weight: 800; color: var(--discount); }

    .modal-add-btn {
      background: linear-gradient(145deg, var(--primary), var(--secondary)); color: white;
      border: none; padding: 16px; border-radius: 50px; font-weight: 700;
      font-size: 1.2rem; cursor: pointer; width: 100%;
    }

    /* نموذج الطلب */
    .checkout-modal .product-modal { max-width: 550px; }
    .form-group { margin-bottom: 20px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 14px 18px; border: 2px solid #eee; border-radius: 50px;
      font-family: 'Cairo'; transition: 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }
    .submit-order {
      background: var(--primary); color: white; padding: 16px; border-radius: 50px;
      border: none; font-weight: 700; width: 100%; cursor: pointer;
    }

    /* رسالة النجاح */
    .success-popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      background: white; padding: 45px 60px; border-radius: 60px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.2); text-align: center; z-index: 2000;
      opacity: 0; visibility: hidden; transition: 0.3s;
    }
    .success-popup.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
    .checkmark {
      width: 90px; height: 90px; background: #00a884; border-radius: 50%;
      margin: 0 auto 25px; position: relative; animation: pop 0.5s;
    }
    .checkmark::after {
      content: ''; position: absolute; left: 28px; top: 15px; width: 22px; height: 45px;
      border-right: 6px solid white; border-bottom: 6px solid white; transform: rotate(45deg);
    }
    @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }

    footer { background: var(--primary); color: white; padding: 30px 0; margin-top: 60px; text-align: center; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="container">
      <div>🚚 توصيل سريع ومجاني للطلبات فوق 200 ريال</div>
      <div>
        <a href="#"><i class="fas fa-headset"></i> خدمة العملاء</a>
        <a href="admin.html" target="_blank"><i class="fas fa-cog"></i> لوحة التحكم</a>
      </div>
    </div>
  </div>

  <header class="main-header">
    <div class="container">
      <div class="logo">
        <span>✨</span>
        <h1>عشانك</h1>
      </div>
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="ابحث عن تيشيرتك...">
        <button id="searchBtn"><i class="fas fa-search"></i></button>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="cartToggle">
          <i class="fas fa-shopping-bag"></i>
          <span id="cartCountBadge" class="cart-badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <nav class="nav-menu">
    <div class="container">
      <ul>
        <li><a href="#" class="nav-link active" data-category="all">الكل</a></li>
        <li><a href="#" class="nav-link" data-category="men">رجالي</a></li>
        <li><a href="#" class="nav-link" data-category="youth">شبابي</a></li>
      </ul>
    </div>
  </nav>

  <div class="container main-content">
    <aside class="filters-sidebar" data-aos="fade-left">
      <div class="filter-section">
        <div class="filter-title"><i class="fas fa-filter"></i> الفئة</div>
        <label class="filter-option"><input type="radio" name="categoryFilter" value="all" checked> الكل</label>
        <label class="filter-option"><input type="radio" name="categoryFilter" value="men"> رجالي</label>
        <label class="filter-option"><input type="radio" name="categoryFilter" value="youth"> شبابي</label>
      </div>
      <div class="filter-section">
        <div class="filter-title"><i class="fas fa-tag"></i> السعر</div>
        <label class="filter-option"><input type="radio" name="priceFilter" value="all" checked> الكل</label>
        <label class="filter-option"><input type="radio" name="priceFilter" value="under100"> أقل من 100</label>
        <label class="filter-option"><input type="radio" name="priceFilter" value="100-200"> 100 - 200</label>
        <label class="filter-option"><input type="radio" name="priceFilter" value="over200"> أكثر من 200</label>
      </div>
    </aside>

    <div class="products-area">
      <div class="section-header">
        <h2 id="categoryTitle">جميع المنتجات</h2>
        <select id="sortSelect" class="sort-select">
          <option value="default">ترتيب افتراضي</option>
          <option value="priceAsc">السعر: الأقل أولاً</option>
          <option value="priceDesc">السعر: الأعلى أولاً</option>
        </select>
      </div>
      <div id="productsContainer" class="products-grid"></div>
    </div>
  </div>

  <!-- سلة جانبية -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3><i class="fas fa-shopping-bag"></i> سلة التسوق</h3>
      <button class="close-cart" id="closeCartBtn">&times;</button>
    </div>
    <div class="cart-items-container" id="cartItemsContainer"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>الإجمالي</span>
        <span id="cartTotalAmount">0 ر.س</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-check-circle"></i> إتمام الشراء</button>
    </div>
  </div>

  <!-- مودال المنتج -->
  <div class="modal-overlay" id="productModal">
    <div class="product-modal">
      <div class="modal-header">
        <h2 id="modalProductTitle"></h2>
        <button class="close-modal" onclick="closeProductModal()">&times;</button>
      </div>
      <div class="modal-gallery">
        <div class="main-image"><img id="mainModalImage" src="" alt=""></div>
        <div class="thumbnail-list" id="thumbnailList"></div>
      </div>
      <p id="modalProductDesc" style="margin-bottom:20px;"></p>
      <div class="modal-price">
        <span id="modalOriginalPrice" class="modal-original"></span>
        <span id="modalCurrentPrice" class="modal-current"></span>
      </div>
      <div class="option-group">
        <label>المقاس</label>
        <select id="modalSizeSelect"></select>
      </div>
      <div class="option-group">
        <label>الفئة العمرية</label>
        <select id="modalAgeSelect"></select>
      </div>
      <button class="modal-add-btn" id="modalAddToCartBtn"><i class="fas fa-cart-plus"></i> أضف إلى السلة</button>
    </div>
  </div>

  <!-- مودال الطلب -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="product-modal checkout-modal">
      <div class="modal-header">
        <h2>إتمام الطلب</h2>
        <button class="close-modal" onclick="closeCheckoutModal()">&times;</button>
      </div>
      <form id="checkoutForm">
        <div class="form-group"><input type="text" id="custName" placeholder="الاسم الكامل" required></div>
        <div class="form-group"><input type="tel" id="custPhone" placeholder="رقم الهاتف" required></div>
        <div class="form-group"><input type="email" id="custEmail" placeholder="البريد الإلكتروني" required></div>
        <div class="form-group"><textarea id="custAddress" rows="3" placeholder="عنوان التوصيل" required></textarea></div>
        <button type="submit" class="submit-order"><i class="fas fa-paper-plane"></i> تأكيد الطلب</button>
      </form>
    </div>
  </div>

  <!-- رسالة نجاح -->
  <div class="success-popup" id="successPopup">
    <div class="checkmark"></div>
    <h2>تم الطلب بنجاح! 🎉</h2>
    <p>شكراً لثقتك، سيتم تجهيز طلبك قريباً.</p>
  </div>

  <footer>
    <div class="container">
      <p>© 2025 عشانك - متجر التيشرتات الرجالي والشبابي. جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
  </script>
  <script>
    (function(){
      "use strict";

      let products = [];
      let cart = [];
      let currentProduct = null;
      let currentCategory = 'all';
      let currentPriceFilter = 'all';
      let currentSort = 'default';
      let searchQuery = '';

      async function loadProducts() {
        try {
          const response = await fetch('products.json');
          if (!response.ok) throw new Error('فشل تحميل المنتجات');
          const jsonProducts = await response.json();
          const stored = localStorage.getItem('ashanak_products');
          const localProducts = stored ? JSON.parse(stored) : [];
          const merged = [...jsonProducts];
          localProducts.forEach(lp => {
            const index = merged.findIndex(p => p.id === lp.id);
            if (index >= 0) merged[index] = lp;
            else merged.push(lp);
          });
          products = merged;
        } catch (error) {
          const stored = localStorage.getItem('ashanak_products');
          products = stored ? JSON.parse(stored) : [];
        }
        products.forEach(p => { if (!p.images || p.images.length === 0) p.images = ['https://placehold.co/600x600']; });
        renderProducts();
        updateCartUI();
      }

      function saveCart() { localStorage.setItem('ashanak_cart', JSON.stringify(cart)); updateCartUI(); }
      function updateCartUI() {
        document.getElementById('cartCountBadge').innerText = cart.reduce((s,i)=>s+i.quantity,0);
        renderCartSidebar();
      }

      function filterAndSortProducts() {
        let filtered = [...products];
        if (currentCategory !== 'all') {
          filtered = filtered.filter(p => p.category === currentCategory || (currentCategory === 'youth' && p.ages.some(a => a.includes('15') || a.includes('16') || a.includes('17'))));
        }
        if (currentPriceFilter === 'under100') filtered = filtered.filter(p => p.price < 100);
        else if (currentPriceFilter === '100-200') filtered = filtered.filter(p => p.price >= 100 && p.price <= 200);
        else if (currentPriceFilter === 'over200') filtered = filtered.filter(p => p.price > 200);
        if (searchQuery) filtered = filtered.filter(p => p.name.includes(searchQuery) || p.description.includes(searchQuery));
        if (currentSort === 'priceAsc') filtered.sort((a,b) => a.price - b.price);
        else if (currentSort === 'priceDesc') filtered.sort((a,b) => b.price - a.price);
        return filtered;
      }

      function calculateDiscount(original, current) {
        if (!original || original <= current) return null;
        return Math.round(((original - current) / original) * 100);
      }

      function renderProducts() {
        const container = document.getElementById('productsContainer');
        const filtered = filterAndSortProducts();
        if (filtered.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">😕 لا توجد منتجات مطابقة</div>';
          return;
        }
        container.innerHTML = filtered.map(p => {
          const hasDiscount = p.originalPrice && p.originalPrice > p.price;
          const discountPercent = hasDiscount ? calculateDiscount(p.originalPrice, p.price) : null;
          return `
            <div class="product-card" data-aos="fade-up" onclick="openProductModal('${p.id}')">
              <div class="product-img">
                <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
                ${hasDiscount ? `<span class="discount-badge">-${discountPercent}%</span>` : ''}
              </div>
              <div class="product-info">
                <div class="product-title">${p.name}</div>
                <div class="price-container">
                  ${hasDiscount ? `<span class="original-price">${p.originalPrice} ر.س</span>` : ''}
                  <span class="current-price ${!hasDiscount ? 'no-discount' : ''}">${p.price} ر.س</span>
                </div>
                <button class="add-btn" onclick="event.stopPropagation(); quickAddToCart('${p.id}')">
                  <i class="fas fa-shopping-bag"></i> أضف للسلة
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      function renderCartSidebar() {
        const container = document.getElementById('cartItemsContainer');
        const totalSpan = document.getElementById('cartTotalAmount');
        if (cart.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-shopping-cart" style="font-size:3rem;opacity:0.3;"></i><p>سلة التسوق فارغة</p></div>';
          totalSpan.innerText = '0 ر.س';
          return;
        }
        let total = 0;
        container.innerHTML = cart.map((item, idx) => {
          total += item.price * item.quantity;
          return `
            <div class="cart-item">
              <img src="${item.image}" class="cart-item-img">
              <div class="cart-item-details">
                <div class="cart-item-title">${item.name}</div>
                <div class="cart-item-meta">مقاس: ${item.size} | العمر: ${item.age}</div>
                <div class="cart-item-price">${item.price} ر.س</div>
                <div class="cart-item-actions">
                  <input type="number" min="1" value="${item.quantity}" onchange="updateCartQuantity(${idx}, this.value)">
                  <button class="remove-item" onclick="removeCartItem(${idx})"><i class="fas fa-trash"></i></button>
                </div>
              </div>
            </div>
          `;
        }).join('');
        totalSpan.innerText = total + ' ر.س';
      }

      window.updateCartQuantity = (idx,qty) => { qty=parseInt(qty); if(qty<1) qty=1; cart[idx].quantity=qty; saveCart(); };
      window.removeCartItem = (idx) => { cart.splice(idx,1); saveCart(); };
      window.quickAddToCart = (id) => openProductModal(id);

      window.openProductModal = (id) => {
        const p = products.find(x=>x.id===id); if(!p) return;
        currentProduct = p;
        document.getElementById('modalProductTitle').innerText = p.name;
        document.getElementById('modalProductDesc').innerText = p.description;
        document.getElementById('mainModalImage').src = p.images[0];
        const thumbDiv = document.getElementById('thumbnailList');
        thumbDiv.innerHTML = p.images.map((img,i)=> `<img src="${img}" class="thumbnail ${i===0?'active':''}" onclick="setMainImage('${img}',this)">`).join('');
        const sizeSel = document.getElementById('modalSizeSelect');
        sizeSel.innerHTML = p.sizes.map(s=>`<option>${s}</option>`).join('');
        const ageSel = document.getElementById('modalAgeSelect');
        ageSel.innerHTML = p.ages.map(a=>`<option>${a}</option>`).join('');
        
        const originalSpan = document.getElementById('modalOriginalPrice');
        const currentSpan = document.getElementById('modalCurrentPrice');
        if (p.originalPrice && p.originalPrice > p.price) {
          originalSpan.innerText = p.originalPrice + ' ر.س';
          currentSpan.innerText = p.price + ' ر.س';
        } else {
          originalSpan.innerText = '';
          currentSpan.innerText = p.price + ' ر.س';
        }
        
        document.getElementById('productModal').classList.add('active');
      };

      window.setMainImage = (src,el) => {
        document.getElementById('mainModalImage').src=src;
        document.querySelectorAll('.thumbnail').forEach(t=>t.classList.remove('active'));
        el.classList.add('active');
      };
      window.closeProductModal = () => document.getElementById('productModal').classList.remove('active');

      document.getElementById('modalAddToCartBtn').onclick = () => {
        if(!currentProduct) return;
        const size = document.getElementById('modalSizeSelect').value;
        const age = document.getElementById('modalAgeSelect').value;
        const exist = cart.find(i=>i.productId===currentProduct.id && i.size===size && i.age===age);
        if(exist) exist.quantity++;
        else cart.push({ productId:currentProduct.id, name:currentProduct.name, price:currentProduct.price, size, age, quantity:1, image:currentProduct.images[0] });
        saveCart();
        closeProductModal();
        document.getElementById('cartSidebar').classList.add('open');
        document.getElementById('cartOverlay').classList.add('open');
      };

      const sidebar = document.getElementById('cartSidebar');
      const overlay = document.getElementById('cartOverlay');
      document.getElementById('cartToggle').addEventListener('click', (e) => { e.preventDefault(); sidebar.classList.add('open'); overlay.classList.add('open'); });
      document.getElementById('closeCartBtn').addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });
      overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

      document.querySelectorAll('input[name="categoryFilter"]').forEach(r=>r.addEventListener('change', e=>{
        currentCategory = e.target.value;
        document.getElementById('categoryTitle').innerText = currentCategory==='all'?'جميع المنتجات':currentCategory==='men'?'رجالي':'شبابي';
        renderProducts();
      }));
      document.querySelectorAll('input[name="priceFilter"]').forEach(r=>r.addEventListener('change', e=>{ currentPriceFilter=e.target.value; renderProducts(); }));
      document.getElementById('sortSelect').addEventListener('change', e=>{ currentSort=e.target.value; renderProducts(); });
      
      document.querySelectorAll('.nav-link').forEach(l=>l.addEventListener('click', e=>{
        e.preventDefault();
        currentCategory = l.dataset.category;
        document.querySelector(`input[name="categoryFilter"][value="${currentCategory}"]`).checked = true;
        document.getElementById('categoryTitle').innerText = l.innerText;
        renderProducts();
        document.querySelectorAll('.nav-link').forEach(ln=>ln.classList.remove('active'));
        l.classList.add('active');
      }));
      
      document.getElementById('searchBtn').addEventListener('click', ()=>{ searchQuery = document.getElementById('searchInput').value.trim(); renderProducts(); });
      document.getElementById('searchInput').addEventListener('keyup', e=>{ if(e.key==='Enter'){ searchQuery=e.target.value.trim(); renderProducts(); } });

      const checkoutModal = document.getElementById('checkoutModal');
      window.closeCheckoutModal = () => checkoutModal.classList.remove('active');
      document.getElementById('checkoutBtn').addEventListener('click', ()=>{
        if(!cart.length) { alert('السلة فارغة'); return; }
        sidebar.classList.remove('open'); overlay.classList.remove('open');
        checkoutModal.classList.add('active');
      });

      document.getElementById('checkoutForm').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const order = cart.map(i=>`${i.name} (${i.size} - ${i.age}) x${i.quantity}`).join('\n');
        const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
        const fd = new FormData();
        fd.append('name', document.getElementById('custName').value);
        fd.append('phone', document.getElementById('custPhone').value);
        fd.append('email', document.getElementById('custEmail').value);
        fd.append('address', document.getElementById('custAddress').value);
        fd.append('order', order);
        fd.append('total', total+' ر.س');
        try {
          const res = await fetch('https://formspree.io/f/xojpgzyn', { method:'POST', body:fd, headers:{'Accept':'application/json'} });
          if(res.ok){
            checkoutModal.classList.remove('active');
            document.getElementById('successPopup').classList.add('show');
            confetti({particleCount:150, spread:80, origin:{y:0.6}});
            setTimeout(()=>confetti({particleCount:80, spread:100, origin:{y:0.6, x:0.3}}),150);
            cart=[]; saveCart(); document.getElementById('checkoutForm').reset();
            setTimeout(()=>document.getElementById('successPopup').classList.remove('show'),3000);
          } else alert('خطأ في الإرسال');
        } catch(err) { alert('فشل الاتصال'); }
      });

      loadProducts();
      const savedCart = localStorage.getItem('ashanak_cart');
      if(savedCart) cart = JSON.parse(savedCart);
      updateCartUI();
    })();
  </script>
</body>
</html>
