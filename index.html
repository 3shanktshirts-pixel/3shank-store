<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>عشانك • أفخم متجر</title>
  <!-- الخطوط -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    /* تخصيصات إضافية */
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
    }
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .product-card {
      transition: all 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
    }
    .product-card img {
      transition: transform 0.5s;
    }
    .product-card:hover img {
      transform: scale(1.05);
    }
    .size-btn.active {
      background: #0a1929 !important;
      color: white !important;
    }
    .timer-font {
      font-family: monospace;
      letter-spacing: 2px;
    }
  </style>
</head>
<body class="bg-[#f5f7fa] text-gray-900 antialiased">

<!-- Toast -->
<div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl z-50 opacity-0 transition pointer-events-none whitespace-nowrap"></div>

<!-- نجاح الطلب -->
<div id="successModal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition duration-300">
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="closeSuccessModal()"></div>
  <div class="relative glass rounded-[3rem] p-12 text-center max-w-md w-full mx-4 shadow-2xl transform transition duration-300 scale-90" id="successModalContent">
    <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
      <i class="fas fa-check text-4xl text-white"></i>
    </div>
    <h2 class="text-3xl font-bold text-gray-900 mb-2">تم الطلب!</h2>
    <p class="text-gray-600">شكراً لتسوقك معنا 🤍</p>
    <button onclick="closeSuccessModal()" class="mt-8 bg-gray-900 text-white px-8 py-3 rounded-full font-bold w-full">موافق</button>
  </div>
</div>

<!-- مودال المنتج -->
<div id="productModal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition duration-300">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-md" onclick="closeProductModal()"></div>
  <div class="relative glass w-full max-w-5xl max-h-[90vh] mx-4 rounded-[3rem] overflow-hidden flex flex-col lg:flex-row shadow-2xl">
    <button onclick="closeProductModal()" class="absolute top-5 right-5 z-20 w-10 h-10 rounded-full bg-white/80 flex items-center justify-center hover:bg-red-500 hover:text-white transition"><i class="fas fa-times"></i></button>
    <div class="lg:w-1/2 p-8 flex items-center justify-center bg-gradient-to-br from-gray-900/5">
      <img id="modalImage" class="w-full max-w-sm aspect-square object-cover rounded-[2.5rem] shadow-2xl border-4 border-white/30" src="" alt="">
    </div>
    <div class="lg:w-1/2 p-8 overflow-y-auto max-h-[90vh]">
      <span class="text-sm text-gray-500" id="modalBrand"></span>
      <h2 class="text-3xl font-bold text-gray-900 mt-1 mb-2" id="modalTitle"></h2>
      <p class="text-gray-600 mb-4" id="modalDesc"></p>
      <div class="flex items-baseline gap-2 mb-2">
        <span class="text-4xl font-black text-gray-900" id="modalPrice"></span>
        <span class="text-gray-400 line-through" id="modalOldPrice"></span>
      </div>
      <p class="text-green-600 text-sm mb-4"><i class="fas fa-check-circle"></i> <span id="modalStock"></span> قطعة</p>
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">المقاس</label>
        <div class="flex flex-wrap gap-2" id="modalSizes"></div>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">الفئة العمرية</label>
        <select id="modalAge" class="w-full p-4 bg-gray-100 rounded-xl border-none"></select>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold mb-2">الكمية</label>
        <div class="flex items-center gap-3">
          <button onclick="decrementModalQty()" class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-xl">−</button>
          <span id="modalQty" class="text-xl font-bold w-8 text-center">1</span>
          <button onclick="incrementModalQty()" class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-xl">+</button>
        </div>
      </div>
      <button id="modalAddToCart" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">
        <i class="fas fa-shopping-cart"></i> أضف إلى السلة
      </button>
      <button onclick="buyNowFromModal()" class="w-full mt-3 bg-gray-200 text-gray-900 py-4 rounded-2xl font-bold text-lg hover:bg-gray-900 hover:text-white transition">شراء سريع</button>
    </div>
  </div>
</div>

<!-- مودال إتمام الطلب -->
<div id="checkoutModal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition duration-300">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-md" onclick="closeCheckoutModal()"></div>
  <div class="relative glass w-full max-w-2xl mx-4 rounded-[3rem] p-8 shadow-2xl">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold text-gray-900">إتمام الطلب</h2>
      <button onclick="closeCheckoutModal()" class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center hover:bg-red-500 hover:text-white"><i class="fas fa-times"></i></button>
    </div>
    <form id="checkoutForm">
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="text" id="custName" placeholder="الاسم الكامل" class="p-4 bg-gray-100 rounded-xl" required>
        <input type="tel" id="custPhone" placeholder="رقم الهاتف" class="p-4 bg-gray-100 rounded-xl" required>
      </div>
      <input type="email" id="custEmail" placeholder="البريد الإلكتروني" class="w-full p-4 bg-gray-100 rounded-xl mb-4" required>
      <textarea id="custAddress" placeholder="عنوان التوصيل" rows="2" class="w-full p-4 bg-gray-100 rounded-xl mb-4" required></textarea>
      <div class="bg-gray-50 p-4 rounded-2xl mb-4">
        <p class="font-semibold mb-2">ملخص الطلب</p>
        <div id="orderSummary" class="space-y-1 text-sm max-h-40 overflow-auto"></div>
        <div class="flex justify-between font-bold text-lg mt-3 pt-3 border-t">
          <span>الإجمالي</span>
          <span id="checkoutTotal">0 ج.م</span>
        </div>
      </div>
      <button type="submit" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold text-lg">تأكيد الطلب</button>
    </form>
  </div>
</div>

<!-- السلة الجانبية -->
<div id="cartOverlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition"></div>
<div id="cartSidebar" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-500 flex flex-col">
  <div class="p-6 border-b flex justify-between items-center">
    <h2 class="text-2xl font-bold text-gray-900">سلة التسوق</h2>
    <button onclick="closeCart()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-red-500 hover:text-white"><i class="fas fa-times"></i></button>
  </div>
  <div class="flex-1 overflow-y-auto p-4" id="cartItemsContainer"></div>
  <div id="pendingOrdersContainer" class="px-4"></div>
  <div class="p-6 border-t">
    <div class="flex justify-between text-xl font-bold mb-4">
      <span>الإجمالي</span>

    </div>
    <button onclick="openCheckoutModal()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold">إتمام الشراء</button>

<!-- المحتوى الرئيسي -->
<div class="max-w-7xl mx-auto px-4 md:px-6 pb-28">

  <!-- هيدر -->
  <header class="glass sticky top-4 z-30 py-3 px-6 rounded-full shadow-lg border border-white/30 mt-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center shadow-md">
        <i class="fas fa-crown text-white"></i>
      </div>
      <h1 class="text-2xl font-black text-gray-900">عشانك<span class="text-gray-400">.</span></h1>
    </div>
    <div class="flex items-center gap-2">
      <a href="profile.html" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-900 hover:text-white transition"><i class="fas fa-user"></i></a>
      <a href="admin.html" id="adminLink" class="hidden w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center hover:bg-purple-600 hover:text-white transition"><i class="fas fa-crown"></i></a>
      <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center hover:bg-red-500 hover:text-white transition"><i class="fas fa-sign-out-alt"></i></button>
      <button onclick="openCart()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-900 hover:text-white transition relative">

    </div>
  </header>

  <!-- ترحيب -->
  <section class="py-10" data-aos="fade-up">
    <div class="flex items-center gap-4">
      <div class="flex-1">
        <p class="text-gray-500 text-xl mb-1">مرحباً،</p>
        <h2 class="text-5xl md:text-6xl font-black text-gray-900 flex items-center gap-3">
          <span id="userName">أحمد</span>
          <span class="text-4xl">👋</span>
        </h2>
      </div>
      <div class="w-20 h-20 bg-gray-900/10 rounded-full flex items-center justify-center">
        <i class="fas fa-sparkles text-3xl text-gray-900"></i>
      </div>
    </div>
  </section>

  <!-- بانر -->
  <section class="mb-8" data-aos="fade-up">
    <div class="bg-gradient-to-br from-gray-900 to-gray-700 rounded-[3rem] p-8 md:p-10 text-white relative overflow-hidden shadow-xl">
      <div class="absolute inset-0 opacity-10">
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-white rounded-full blur-3xl"></div>
      </div>
      <div class="relative z-10 flex justify-between items-center">
        <div>
          <span class="bg-white/20 backdrop-blur px-4 py-1 rounded-full text-sm">🎉 عرض خاص</span>
          <h3 class="text-3xl md:text-4xl font-bold mt-4 mb-2">خصم 30% على أول طلب</h3>
          <p class="text-white/80 mb-4">كود: <span class="bg-white/20 px-3 py-1 rounded-full font-mono">AHSHANK30</span></p>
          <button onclick="document.getElementById('searchInput').focus()" class="bg-white text-gray-900 px-6 py-3 rounded-full font-bold hover:shadow-lg transition">تسوق الآن →</button>
        </div>
        <i class="fas fa-gem text-6xl opacity-40 hidden md:block"></i>
      </div>
    </div>
  </section>

  <!-- بحث -->
  <section class="mb-8" data-aos="fade-up">
    <div class="relative">
      <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="text" id="searchInput" placeholder="ابحث عن منتج..." class="w-full bg-white/70 backdrop-blur-sm rounded-full py-5 pr-14 pl-6 text-lg border border-white/30 shadow-md focus:ring-2 focus:ring-gray-900/30">
    </div>
  </section>

  <!-- الفئات -->
  <section class="mb-8" data-aos="fade-up">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-2xl font-bold text-gray-900">الفئات</h3>
      <a href="#" class="text-sm text-gray-500">عرض الكل</a>
    </div>
    <div class="flex gap-4 overflow-x-auto pb-2">
      <div class="category-chip flex flex-col items-center gap-1 cursor-pointer min-w-[90px] active" data-cat="all">
        <div class="w-20 h-20 rounded-2xl bg-white shadow-md flex items-center justify-center transition">
          <i class="fas fa-border-all text-2xl text-gray-900"></i>
        </div>
        <span class="text-sm font-medium">الكل</span>
      </div>
      <div class="category-chip flex flex-col items-center gap-1 cursor-pointer min-w-[90px]" data-cat="men">
        <div class="w-20 h-20 rounded-2xl bg-white shadow-md flex items-center justify-center transition">
          <i class="fas fa-user-tie text-2xl text-gray-900"></i>
        </div>
        <span class="text-sm font-medium">رجالي</span>
      </div>
      <div class="category-chip flex flex-col items-center gap-1 cursor-pointer min-w-[90px]" data-cat="women">
        <div class="w-20 h-20 rounded-2xl bg-white shadow-md flex items-center justify-center transition">
          <i class="fas fa-female text-2xl text-gray-900"></i>
        </div>
        <span class="text-sm font-medium">نسائي</span>
      </div>
    </div>
  </section>

  <!-- المنتجات -->
  <section data-aos="fade-up">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-2xl font-bold text-gray-900">✨ منتجات مميزة</h3>
      <a href="#" class="text-sm text-gray-500">عرض الكل</a>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5" id="productsGrid"></div>
  </section>
</div>

<!-- شريط سفلي -->
<nav class="glass fixed bottom-4 left-4 right-4 max-w-md mx-auto rounded-full p-2 shadow-xl flex justify-around border border-white/30 z-30">
  <a href="index.html" class="flex flex-col items-center py-1 px-6 rounded-full text-gray-900 bg-gray-900/10"><i class="fas fa-home text-xl"></i><span class="text-xs font-bold">الرئيسية</span></a>
  <button onclick="openCart()" class="flex flex-col items-center py-1 px-6 rounded-full text-gray-500 hover:text-gray-900"><i class="fas fa-shopping-cart text-xl"></i><span class="text-xs font-bold">السلة</span></button>
  <a href="profile.html" class="flex flex-col items-center py-1 px-6 rounded-full text-gray-500 hover:text-gray-900"><i class="fas fa-user text-xl"></i><span class="text-xs font-bold">حسابي</span></a>
</nav>

<script>
  AOS.init({ once: true, duration: 700 });

  (function(){
    // ---------- التهيئة ----------
    const STORAGE_CURRENT = 'teeshop_current';
    const FORMSPREE_ID = 'xqkrgkvo'; // ⚠️ استبدل بمعرفك
    
    const currentUser = JSON.parse(localStorage.getItem(STORAGE_CURRENT));
    if(!currentUser) location.href = 'login.html';

    document.getElementById('userName').textContent = currentUser.name?.split(' ')[0] || 'زائر';
    if(currentUser.role === 'admin') document.getElementById('adminLink').classList.remove('hidden');

    // تعبئة نموذج الطلب
    document.getElementById('custName').value = currentUser.name || '';
    document.getElementById('custPhone').value = currentUser.phone || '';
    document.getElementById('custEmail').value = currentUser.email || '';

    // ---------- المتغيرات ----------
    let products = [];
    let cart = JSON.parse(localStorage.getItem('ashanak_cart')) || [];
    let favorites = JSON.parse(localStorage.getItem('ashanak_fav')) || [];
    let pendingOrders = JSON.parse(localStorage.getItem('ashanak_pending')) || [];
    let currentCategory = 'all', searchQuery = '';
    let currentProduct = null, selectedSize = null, modalQty = 1;
    let timers = [];

    // ---------- دوال مساعدة ----------
    function toast(msg, dur=2500) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', dur);
    }

    function saveCart() { localStorage.setItem('ashanak_cart', JSON.stringify(cart)); updateCartUI(); }
    function updateCartUI() {
      document.getElementById('cartBadge').textContent = cart.reduce((s,i)=>s+i.quantity,0);
      renderCartItems();
    }

    // ---------- المنتجات ----------
    async function loadProducts() {
      try {
        const res = await fetch('products.json');
        products = res.ok ? await res.json() : [];
      } catch { products = []; }
      if(!products.length) {
        // منتجات افتراضية للعرض
        products = [
          { id:'1', name:'تيشيرت أساسي أبيض', price:299, category:'men', brand:'عشانك', rating:4.5, stock:10, sizes:['S','M','L'], ages:['12-14','15-17'], images:['https://images.pexels.com/photos/428338/pexels-photo-428338.jpeg?auto=compress&cs=tinysrgb&w=600'], isNew:true },
          { id:'2', name:'تيشيرت نسائي وردي', price:319, category:'women', brand:'عشانك', rating:4.8, stock:8, sizes:['XS','S','M'], ages:['15-17','18+'], images:['https://images.pexels.com/photos/1434389677669-e08b4cac3105?auto=compress&cs=tinysrgb&w=600'], isNew:false },
        ];
      }
      renderProducts();
    }

    function renderProducts() {
      const filtered = products.filter(p => (currentCategory==='all'||p.category===currentCategory) &&
        (!searchQuery || p.name.includes(searchQuery)));
      const grid = document.getElementById('productsGrid');
      if(!filtered.length) { grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">لا توجد منتجات</div>`; return; }
      grid.innerHTML = filtered.map(p => {
        const hasDiscount = p.originalPrice && p.originalPrice > p.price;
        const isFav = favorites.includes(p.id);
        return `
          <div class="product-card bg-white rounded-3xl overflow-hidden shadow-md hover:shadow-2xl transition cursor-pointer group" onclick="openModal('${p.id}')">
            <div class="relative aspect-square bg-gray-100">
              <img src="${p.images?.[0] || 'https://via.placeholder.com/300'}" class="w-full h-full object-cover" loading="lazy">
              <button class="absolute top-3 left-3 w-10 h-10 rounded-full bg-white/80 backdrop-blur shadow flex items-center justify-center ${isFav ? 'text-red-500' : 'text-gray-400'} hover:bg-red-500 hover:text-white transition z-10" onclick="event.stopPropagation(); toggleFavorite('${p.id}', this)">
                <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
              </button>
              ${p.isNew ? '<span class="absolute top-3 right-3 bg-gray-900 text-white text-xs font-bold px-3 py-1 rounded-full">جديد</span>' : ''}
              ${hasDiscount ? `<span class="absolute bottom-3 right-3 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full">-${Math.round((1-p.price/p.originalPrice)*100)}%</span>` : ''}
            </div>
            <div class="p-4">
              <span class="text-xs text-gray-500">${p.brand||'عشانك'}</span>
              <h4 class="font-bold text-gray-800 mt-1">${p.name}</h4>
              <div class="flex items-center justify-between mt-2">
                <div>
                  <span class="text-xl font-black text-gray-900">${p.price} ج.م</span>
                  ${hasDiscount ? `<span class="text-xs text-gray-400 line-through mr-1">${p.originalPrice}</span>` : ''}
                </div>
              </div>
              <button class="w-full mt-3 bg-gray-900 text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:bg-gray-700 transition add-to-cart-btn" onclick="event.stopPropagation(); quickAdd('${p.id}', this)">
                <i class="fas fa-shopping-cart"></i> أضف للسلة
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // ---------- الإضافة السريعة ----------
    window.quickAdd = (id, btn) => {
      const p = products.find(x => x.id == id);
      if(!p) return;
      const size = (p.sizes||['M'])[0], age = (p.ages||['18+'])[0];
      const existing = cart.find(i => i.productId == id && i.size === size && i.age === age);
      if(existing) existing.quantity++;
      else cart.push({ productId: p.id, name: p.name, price: p.price, size, age, quantity:1, image: p.images?.[0] });
      saveCart();
      if(btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> تم';
        btn.classList.add('bg-green-600');
        setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('bg-green-600'); }, 1200);
      }
      toast(`✅ تمت إضافة ${p.name}`);
      confetti({particleCount:40, spread:50, origin:{y:0.7}});
    };

    // ---------- المفضلة ----------
    window.toggleFavorite = (id, btn) => {
      const idx = favorites.indexOf(id);
      if(idx > -1) favorites.splice(idx,1);
      else favorites.push(id);
      localStorage.setItem('ashanak_fav', JSON.stringify(favorites));
      const icon = btn.querySelector('i');
      const isFav = favorites.includes(id);
      icon.className = isFav ? 'fas fa-heart' : 'far fa-heart';
      btn.classList.toggle('text-red-500', isFav);
      toast(isFav ? '❤️ أضيف للمفضلة' : '💔 أزيل من المفضلة');
    };

    // ---------- مودال المنتج ----------
    window.openModal = (id) => {
      const p = products.find(x=>x.id==id); if(!p) return;
      currentProduct = p; selectedSize = (p.sizes||['M'])[0]; modalQty = 1;
      document.getElementById('modalImage').src = p.images?.[0] || '';
      document.getElementById('modalBrand').textContent = p.brand||'';
      document.getElementById('modalTitle').textContent = p.name;
      document.getElementById('modalDesc').textContent = p.description||'';
      document.getElementById('modalPrice').textContent = p.price + ' ج.م';
      document.getElementById('modalOldPrice').textContent = p.originalPrice ? p.originalPrice+' ج.م' : '';
      document.getElementById('modalStock').textContent = p.stock||0;
      document.getElementById('modalQty').textContent = modalQty;
      const sizesDiv = document.getElementById('modalSizes');
      sizesDiv.innerHTML = (p.sizes||['M']).map(s => `<button class="size-btn px-4 py-2 rounded-full bg-gray-200 font-medium ${s===selectedSize?'active':''}" onclick="selectSize('${s}')">${s}</button>`).join('');
      document.getElementById('modalAge').innerHTML = (p.ages||['18+']).map(a => `<option>${a}</option>`).join('');
      document.getElementById('productModal').style.opacity = '1';
      document.getElementById('productModal').style.pointerEvents = 'auto';
    };
    window.selectSize = (s) => { selectedSize = s; document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.textContent===s)); };
    window.incrementModalQty = () => { if(currentProduct && modalQty < currentProduct.stock) { modalQty++; document.getElementById('modalQty').textContent = modalQty; } };
    window.decrementModalQty = () => { if(modalQty>1) { modalQty--; document.getElementById('modalQty').textContent = modalQty; } };
    window.closeProductModal = () => { document.getElementById('productModal').style.opacity='0'; document.getElementById('productModal').style.pointerEvents='none'; };
    document.getElementById('modalAddToCart').onclick = () => {
      if(!currentProduct) return;
      const age = document.getElementById('modalAge').value;
      const exist = cart.find(i => i.productId === currentProduct.id && i.size===selectedSize && i.age===age);
      if(exist) exist.quantity += modalQty;
      else cart.push({ productId: currentProduct.id, name: currentProduct.name, price: currentProduct.price, size: selectedSize, age, quantity: modalQty, image: currentProduct.images?.[0] });
      saveCart(); closeProductModal(); toast(`✅ أضيف ${modalQty} قطعة`); confetti({particleCount:80});
    };
    window.buyNowFromModal = () => { document.getElementById('modalAddToCart').click(); setTimeout(() => { closeProductModal(); openCheckoutModal(); }, 200); };

    // ---------- السلة ----------
    function renderCartItems() {
      const cont = document.getElementById('cartItemsContainer');
      const totalSpan = document.getElementById('cartTotal');
      if(!cart.length) { cont.innerHTML = '<p class="text-center py-10 text-gray-400">السلة فارغة</p>'; totalSpan.textContent = '0 ج.م'; return; }
      let total = 0;
      cont.innerHTML = cart.map((item,i) => {
        total += item.price*item.quantity;
        return `<div class="flex gap-3 p-3 bg-gray-50 rounded-2xl mb-3"><img src="${item.image}" class="w-16 h-16 rounded-xl object-cover"><div class="flex-1"><div class="flex justify-between"><h5 class="font-bold">${item.name}</h5><button onclick="removeCartItem(${i})" class="text-red-500"><i class="fas fa-trash"></i></button></div><p class="text-xs text-gray-500">${item.size} | ${item.age}</p><p class="font-bold text-gray-900">${item.price} ج.م</p><div class="flex items-center gap-2 mt-1"><button onclick="updateCartQty(${i}, ${item.quantity-1})" class="w-8 h-8 rounded-full bg-gray-200">−</button><span class="w-6 text-center">${item.quantity}</span><button onclick="updateCartQty(${i}, ${item.quantity+1})" class="w-8 h-8 rounded-full bg-gray-200">+</button></div></div></div>`;
      }).join('');
      totalSpan.textContent = total + ' ج.م';
      renderPending();
    }
    window.updateCartQty = (i,q) => { if(q<1) cart.splice(i,1); else cart[i].quantity = q; saveCart(); };
    window.removeCartItem = (i) => { cart.splice(i,1); saveCart(); toast('🗑️ تمت الإزالة'); };

    // ---------- الطلبات المعلقة ----------
    function renderPending() {
      const cont = document.getElementById('pendingOrdersContainer');
      const active = pendingOrders.filter(o => o.status==='pending' && new Date(o.expiresAt) > new Date());
      if(!active.length) { cont.innerHTML = ''; return; }
      cont.innerHTML = `<div class="mt-4 pt-4 border-t"><h4 class="font-bold mb-2">⏳ طلبات نشطة</h4>` + active.map(o => `
        <div class="bg-gray-50 p-3 rounded-xl mb-2">
          <div class="flex justify-between"><span>#${o.id.slice(-6)}</span><span class="font-bold">${o.total} ج.م</span></div>
          <div class="timer-font text-xl text-center my-2" data-id="${o.id}">--:--:--</div>
          <button class="w-full bg-red-100 text-red-600 py-1 rounded-lg text-sm" onclick="cancelOrder('${o.id}')">إلغاء</button>
        </div>
      `).join('') + '</div>';
      active.forEach(o => startTimer(o));
    }
    function startTimer(order) {
      const el = document.querySelector(`.timer-font[data-id="${order.id}"]`);
      if(!el) return;
      const update = () => {
        const diff = new Date(order.expiresAt) - new Date();
        if(diff <= 0) { cancelOrder(order.id); return; }
        const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        el.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      };
      update(); const int = setInterval(update, 1000); timers.push({id: order.id, int});
    }
    window.cancelOrder = async (id) => {
      const order = pendingOrders.find(o=>o.id===id); if(!order) return;
      if(!confirm('إلغاء الطلب؟')) return;
      order.status = 'cancelled'; localStorage.setItem('ashanak_pending', JSON.stringify(pendingOrders));
      await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: order.customer.email, subject: 'إلغاء طلب', message: `تم إلغاء الطلب ${id}` }) });
      renderPending(); toast('تم الإلغاء');
    };

    // ---------- إتمام الطلب ----------
    window.openCheckoutModal = () => { if(!cart.length) return toast('السلة فارغة');
      const summ = document.getElementById('orderSummary');
      const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
      summ.innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.name} x${i.quantity}</span><span>${i.price*i.quantity} ج.م</span></div>`).join('');
      document.getElementById('checkoutTotal').textContent = total + ' ج.م';
      document.getElementById('checkoutModal').style.opacity='1'; document.getElementById('checkoutModal').style.pointerEvents='auto';
    };
    window.closeCheckoutModal = () => { document.getElementById('checkoutModal').style.opacity='0'; document.getElementById('checkoutModal').style.pointerEvents='none'; };
    document.getElementById('checkoutForm').onsubmit = async (e) => {
      e.preventDefault();
      const cust = { name: document.getElementById('custName').value, phone: document.getElementById('custPhone').value, email: document.getElementById('custEmail').value, address: document.getElementById('custAddress').value };
      const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
      currentUser.name = cust.name; currentUser.phone = cust.phone; localStorage.setItem(STORAGE_CURRENT, JSON.stringify(currentUser));
      closeCheckoutModal();
      try {
        await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: cust.email, subject: 'طلب جديد', message: `العميل: ${cust.name} | الإجمالي: ${total} ج.م` }) });
        const newOrder = { id: 'ORD-'+Date.now(), customer: cust, items: [...cart], total, status:'pending', createdAt: new Date().toISOString(), expiresAt: new Date(Date.now()+12*60*60*1000).toISOString() };
        pendingOrders.push(newOrder); localStorage.setItem('ashanak_pending', JSON.stringify(pendingOrders));
        cart = []; saveCart();
        const pop = document.getElementById('successModal'); pop.style.opacity='1'; pop.style.pointerEvents='auto';
        document.getElementById('successModalContent').style.transform='scale(1)';
        confetti({particleCount:300, spread:100});
        setTimeout(() => { pop.style.opacity='0'; pop.style.pointerEvents='none'; }, 3500);
        renderPending();
        document.getElementById('checkoutForm').reset();
        document.getElementById('custName').value = currentUser.name || '';
        document.getElementById('custPhone').value = currentUser.phone || '';
        document.getElementById('custEmail').value = currentUser.email || '';
      } catch { toast('خطأ في الاتصال'); }
    };
    window.closeSuccessModal = () => { document.getElementById('successModal').style.opacity='0'; document.getElementById('successModal').style.pointerEvents='none'; };

    // ---------- السلة الجانبية ----------
    window.openCart = () => { document.getElementById('cartSidebar').style.transform='translateX(0)'; document.getElementById('cartOverlay').style.opacity='1'; document.getElementById('cartOverlay').style.pointerEvents='auto'; };
    window.closeCart = () => { document.getElementById('cartSidebar').style.transform='translateX(100%)'; document.getElementById('cartOverlay').style.opacity='0'; document.getElementById('cartOverlay').style.pointerEvents='none'; };
    document.getElementById('cartOverlay').onclick = closeCart;

    // ---------- فئات وبحث ----------
    document.querySelectorAll('.category-chip').forEach(el => el.addEventListener('click', function() {
      document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
      this.classList.add('active'); currentCategory = this.dataset.cat; renderProducts();
    }));
    document.querySelector('[data-cat="all"]').classList.add('active');
    document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value.trim(); renderProducts(); });

    // ---------- خروج ----------
    window.logout = () => { if(confirm('تسجيل الخروج؟')) { localStorage.removeItem(STORAGE_CURRENT); location.href='login.html'; } };

    // ---------- بدء ----------
    loadProducts();
    updateCartUI();
  })();
</script>
</body>
</html>
