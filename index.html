<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>عشانك · متجر الأزياء الفاخرة</title>
  
  <!-- الخطوط -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#001e40',
            'primary-container': '#003366',
            surface: '#f9f9fe',
            'surface-low': '#f3f3f8',
            'surface-container': '#ededf2',
            'surface-high': '#e8e8ed',
            'surface-lowest': '#ffffff',
            'on-surface': '#1a1c1f',
            'on-surface-variant': '#43474f',
            outline: '#737780',
            'outline-variant': '#c3c6d1',
            error: '#ba1a1a',
            'error-container': '#ffdad6',
          },
          fontFamily: {
            headline: ['"Plus Jakarta Sans"', 'Tajawal', 'sans-serif'],
            body: ['Tajawal', 'sans-serif'],
          },
          borderRadius: {
            'xl': '0.75rem',
            '2xl': '1rem',
            '3xl': '1.5rem',
            '4xl': '2rem',
          }
        }
      }
    }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #f9f9fe;
      color: #1a1c1f;
    }
    .font-headline { font-family: 'Plus Jakarta Sans', 'Tajawal', sans-serif; letter-spacing: -0.02em; }
    
    /* تأثير الزجاج */
    .glass-nav {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(195, 198, 209, 0.15);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    
    /* ظلال ناعمة */
    .shadow-ambient {
      box-shadow: 0 20px 35px -8px rgba(0, 30, 64, 0.08), 0 8px 18px -6px rgba(0, 20, 40, 0.05);
    }
    .hover-lift {
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 45px -12px rgba(0, 30, 64, 0.12);
    }
    
    /* أيقونات */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    
    /* شريط التمرير */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f3f3f8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #c3c6d1; border-radius: 10px; }
    
    /* الصفحات */
    .page { display: none; }
    .page.active { display: block; }
    
    /* زر Google مخصص */
    .google-btn-wrapper {
      min-height: 48px;
    }
    #google-signin-btn-container {
      display: flex;
      justify-content: center;
    }
  </style>
  
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-surface text-on-surface">

<!-- ========== حاوية الصفحات ========== -->
<div id="app">
  <!-- الصفحة الرئيسية - المتجر -->
  <div id="page-store" class="page active"></div>
  <!-- صفحة سلة التسوق -->
  <div id="page-cart" class="page"></div>
  <!-- صفحة تسجيل الدخول / إنشاء حساب -->
  <div id="page-auth" class="page"></div>
  <!-- صفحة المنتج الفردي -->
  <div id="page-product" class="page"></div>
  <!-- صفحة لوحة التحكم (المخزون) -->
  <div id="page-dashboard" class="page"></div>
</div>

<!-- ========== شريط التنقل السفلي ========== -->
<nav class="lg:hidden fixed bottom-0 left-0 right-0 glass-nav border-t border-outline-variant/20 py-2 px-6 z-40">
  <div class="flex justify-around items-center">
    <button data-page="store" class="nav-link flex flex-col items-center text-primary">
      <span class="material-symbols-outlined">storefront</span>
      <span class="text-xs mt-1">المتجر</span>
    </button>
    <button data-page="cart" class="nav-link flex flex-col items-center text-on-surface-variant">
      <span class="material-symbols-outlined">shopping_bag</span>
      <span class="text-xs mt-1">السلة</span>
      <span class="cart-badge-mobile absolute -mt-1 mr-6 bg-primary text-white text-[10px] min-w-[18px] h-[18px] flex items-center justify-center rounded-full font-bold">0</span>
    </button>
    <button data-page="auth" class="nav-link flex flex-col items-center text-on-surface-variant">
      <span class="material-symbols-outlined">person</span>
      <span class="text-xs mt-1">حسابي</span>
    </button>
    <button data-page="dashboard" class="nav-link flex flex-col items-center text-on-surface-variant">
      <span class="material-symbols-outlined">inventory</span>
      <span class="text-xs mt-1">المخزون</span>
    </button>
  </div>
</nav>

<script>
  (function(){
    "use strict";

    // ---------- إعدادات Formspree ----------
    const FORMSPREE_URL = 'https://formspree.io/f/meoapzdk';
    
    // ---------- Google Client ID ----------
    const GOOGLE_CLIENT_ID = '876111425484-6hrf70a1d9kh2uvcrr56ih3f1koro67v.apps.googleusercontent.com';
    
    // ---------- الحالة العامة ----------
    let cart = JSON.parse(localStorage.getItem('as7ank_cart')) || [];
    let currentUser = null; // { name, email, picture }
    
    // المنتجات
    const products = [
      { id: 1, name: 'تيشيرت هايبر فورم', price: 275, image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDFfgleSJlKs_PWM8vx7STAzI4vxfy4VPPbZd7yCo7YzHPvK2Xceb6F8JpX12Bzy8X1tojTtVVF7bXWTivuxJ-oPi5J9dYRGeK_gyuM0K9BPhPw2AsnV39fq6DEHeBAYyv4pTu1ulUnHgeH3zQGHZoM6H4Okr36_JkQ7Mw5-OgZBdzQBCCzh79LlZi5mIvwnX8iiwFmqvpP9qHR-iV6ngOIi9GRnJsFFKItfVASeJNRAXh9NVImxfHnYo55SfSen0NIg-uAbt7gZPFX', sizes: ['S', 'M', 'L', 'XL'] },
      { id: 2, name: 'فورتكس جرافيك', price: 210, image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBpmrTC1TITSheAdboyfFQ9LXR1lMDLWmIjoLcBDctUd1UMVgCJhb-gWRWy0GJsoTD4JUysoZ7W5bX_DG3HiKAkRn5msi2DnYfybdQ6RvHpSb-T0uiVbZYebajjvRWvTjw5HUhrgj6QYFMPrvxBwyiIH8RYgIlGCO_nLf2W1BFUJ7u40NcEz3BDEwUeHQhWPIXqjpo-yxcqGwXWJIiKu9BC_KmnrAxtAtitXM0llvoApEKIwYgvZDjq_B00F2lNotngNVMrSVonOLOK', sizes: ['M', 'L', 'XL'] },
      { id: 3, name: 'كينتك بوكسي', price: 240, image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuA_OaXj2rdqCalJQ884vZnBkFR6TdqcZDBsl5JbRJGFOKh2IsSX1lXf1jQTSZt8HukqMhymFHTZCGHJCm8UaV08ne7fncYZcB3MkpWj6Bzi21vYRKoLRjkH-iv3OVSwmQibOscE8GIh-w_S7ZCi2sXeNUjiv3UyiGxUWJC9ImkxVShERIhdXJDF3AI0SU2J2fzNDFk-3C8vc51xSEwQKw3wBzBRLCH0OORDg09eLum8Ju4tw4rXCdGZZxh393VBG-4cgNHdAo-pMIp3', sizes: ['S', 'M', 'L'] },
      { id: 4, name: 'أوريجن تي', price: 190, image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuB1_SWSMvFPOSfaecVaZ7BJ7IzVd6Uo3kXQTDcIU4DZldd1qa5nUHljlkN5AgEut-GYMYPOa8nb89LO91iqy30T4a1LbzC7zrO-qnaEpYg2TOrvxMtG_SH9MZGe3Ly3djU4-emEk-bfuRU--LbAFiXGfJhI3TfZeb3rKr8kQ8ZbWql8ypi7Pb_awU4NSsmY2WUWbOuHIg9WKdaSpShO1-8e7-Cg7GHyAZAZyNiyxd3xV4JClI2ORZ_2e7dZ1WeAfe3ecficZYTFIzdn', sizes: ['XS', 'S', 'M', 'L', 'XL'] },
      { id: 5, name: 'سلسلة جاليري', price: 260, image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDXlV1raQ018UOO62TNJ5mPJK0TGGfLg392th6KUUWXEtHTDRHqoD3TQYWmfDMhsSbam7GAJZCUsxN8B_AOOA52bj7cNv67S9BppSknufJ1Fw5FpHL3S6z4P5kOgKO85snBoeQh5M1vqXwYPKpp4QKLZwUBorUDEttYYCh8CfgqX179UpG_oqlXY5uf_-mTUDXCWhS25_aTPJjk4ThxS-tuTLtrDsP5Mk3Hfiwq1wDC32w8sWOV0ssDj29UrqxhdyZuqwn4QftSnsUf', sizes: ['M', 'L'] }
    ];

    // عناصر DOM
    const pageStore = document.getElementById('page-store');
    const pageCart = document.getElementById('page-cart');
    const pageAuth = document.getElementById('page-auth');
    const pageProduct = document.getElementById('page-product');
    const pageDashboard = document.getElementById('page-dashboard');

    // ========== دوال مساعدة ==========
    function saveCart() { localStorage.setItem('as7ank_cart', JSON.stringify(cart)); }
    function updateCartBadges() {
      const total = cart.reduce((s, i) => s + i.quantity, 0);
      document.querySelectorAll('.cart-badge, .cart-badge-mobile').forEach(b => b.textContent = total);
    }
    function formatPrice(price) { return price + ' ر.س'; }

    // ========== تبديل الصفحات ==========
    function showPage(pageId) {
      [pageStore, pageCart, pageAuth, pageProduct, pageDashboard].forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${pageId}`).classList.add('active');
      
      // تحديث روابط التنقل
      document.querySelectorAll('.nav-link').forEach(link => {
        if (link.dataset.page === pageId) {
          link.classList.add('text-primary');
          link.classList.remove('text-on-surface-variant');
        } else {
          link.classList.add('text-on-surface-variant');
          link.classList.remove('text-primary');
        }
      });

      // تحميل المحتوى
      if (pageId === 'store') renderStore();
      else if (pageId === 'cart') renderCart();
      else if (pageId === 'auth') renderAuth();
      else if (pageId === 'dashboard') renderDashboard();
      
      window.scrollTo(0, 0);
      updateCartBadges();
    }

    // ========== عرض المتجر ==========
    function renderStore() {
      pageStore.innerHTML = `
        <nav class="fixed top-0 w-full z-50 glass-nav">
          <div class="flex justify-between items-center h-20 px-4 md:px-8 max-w-screen-2xl mx-auto">
            <div class="text-2xl md:text-3xl font-black tracking-tighter text-primary font-headline">عشانك</div>
            <div class="hidden md:flex items-center gap-8">
              <a class="text-primary font-bold border-b-2 border-primary pb-1" href="#">الجديد</a>
              <a class="text-primary/60 hover:text-primary" href="#">المجموعات</a>
              <a class="text-primary/60 hover:text-primary" href="#">الألبوم</a>
              <a class="text-primary/60 hover:text-primary" href="#">الأرشيف</a>
            </div>
            <div class="flex items-center gap-3">
              <button class="nav-cart p-2 hover:bg-primary/5 rounded-full relative" data-page="cart">
                <span class="material-symbols-outlined">shopping_bag</span>
                <span class="cart-badge absolute -top-1 -right-1 bg-primary text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
              </button>
              <button class="p-2 hover:bg-primary/5 rounded-full" data-page="auth">
                <span class="material-symbols-outlined">person</span>
              </button>
              <button class="p-2 hover:bg-primary/5 rounded-full" data-page="dashboard">
                <span class="material-symbols-outlined">inventory</span>
              </button>
            </div>
          </div>
        </nav>
        <main class="pt-24 md:pt-28 pb-24 md:pb-12">
          <section class="px-4 md:px-8 mb-8">
            <div class="max-w-screen-2xl mx-auto h-[500px] md:h-[600px] rounded-4xl overflow-hidden relative group">
              <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent z-10"></div>
              <img class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCS1XjiMr9h1MqG3YdHebUifcJ9z7qKlD5Uh2vsgHhKB2c-JRml7pF9cd0MvMwmBgOnmD4kL3yMCaGY4bCe592gu79ti41DLzq-NP3CPUeL8Si6NPPL9hY6gQj0NYM0KJNADKYyAk89jz94exwZMqjXP0UPFe8-vMBbY7t2I2h1gmyt9G1WYPYJgZpChNuIrroLPI0p7ZqqJGXwRxjW5V8QJfWpHtF5iQbUPy2X1Njdwy5P3gvorO16a011QMSd_K46JI3LsXR-DkVV" alt="hero">
              <div class="absolute bottom-8 right-8 md:bottom-12 md:right-12 z-20 max-w-2xl text-right text-white">
                <span class="bg-white/10 backdrop-blur-md border border-white/20 px-4 py-1.5 rounded-full text-xs tracking-widest">جديد • شتاء ٢٤</span>
                <h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tighter leading-none my-4">أرشيف<br/>النيون '٢٤</h1>
                <p class="text-white/80 text-base md:text-lg mb-6">المجموعة الأساسية للجيل القادم. قطن ثقيل فاخر.</p>
                <button class="quick-add bg-white text-primary px-8 py-4 rounded-xl font-bold text-sm" data-id="1">تسوق الآن →</button>
              </div>
            </div>
          </section>
          <section class="px-4 md:px-8">
            <div class="max-w-screen-2xl mx-auto">
              <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl md:text-3xl font-headline font-bold">أحدث القطع</h2>
                <div class="flex gap-2 overflow-x-auto pb-2">
                  <button class="bg-primary text-white px-5 py-2 rounded-full text-sm">الكل</button>
                  <button class="bg-surface-low px-5 py-2 rounded-full text-sm">تيشيرتات</button>
                  <button class="bg-surface-low px-5 py-2 rounded-full text-sm">أوفر سايز</button>
                </div>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                ${products.map(p => `
                  <div class="group bg-surface-lowest rounded-3xl overflow-hidden shadow-ambient hover-lift transition-smooth">
                    <div class="aspect-square overflow-hidden relative">
                      <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="${p.name}">
                      <button class="quick-add absolute top-4 left-4 bg-white/90 backdrop-blur-sm p-3 rounded-full opacity-0 group-hover:opacity-100 transition" data-id="${p.id}">
                        <span class="material-symbols-outlined text-primary">add_shopping_cart</span>
                      </button>
                    </div>
                    <div class="p-5 text-right">
                      <h3 class="font-headline font-bold text-lg">${p.name}</h3>
                      <p class="text-primary font-black text-xl mt-1">${formatPrice(p.price)}</p>
                      <button class="view-product mt-3 w-full border border-primary/20 text-primary py-2 rounded-xl font-medium text-sm" data-id="${p.id}">عرض التفاصيل</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        </main>
      `;
      
      // ربط الأزرار
      pageStore.querySelectorAll('[data-page]').forEach(btn => {
        btn.addEventListener('click', () => showPage(btn.dataset.page));
      });
      pageStore.querySelectorAll('.quick-add').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          const product = products.find(p => p.id === id);
          addToCart(product);
        });
      });
      pageStore.querySelectorAll('.view-product').forEach(btn => {
        btn.addEventListener('click', () => renderProductPage(parseInt(btn.dataset.id)));
      });
    }

    function addToCart(product, qty = 1) {
      const existing = cart.find(i => i.id === product.id);
      if (existing) existing.quantity += qty;
      else cart.push({ ...product, quantity: qty });
      saveCart();
      updateCartBadges();
      alert(`✅ تمت إضافة "${product.name}" إلى السلة`);
    }

    function renderProductPage(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      pageProduct.innerHTML = `
        <nav class="fixed top-0 w-full z-50 glass-nav">
          <div class="flex items-center h-20 px-4 md:px-8 max-w-screen-2xl mx-auto">
            <button class="back-btn p-2 hover:bg-primary/5 rounded-full"><span class="material-symbols-outlined">arrow_forward</span></button>

            <div class="w-10"></div>
          </div>
        </nav>
        <main class="pt-28 pb-24 px-4 md:px-8 max-w-5xl mx-auto">
          <div class="grid md:grid-cols-2 gap-8 md:gap-12">
            <div class="rounded-4xl overflow-hidden shadow-ambient">
              <img src="${product.image}" class="w-full h-auto" alt="${product.name}">
            </div>
            <div class="text-right">
              <h1 class="text-4xl font-headline font-extrabold">${product.name}</h1>
              <p class="text-3xl font-black text-primary my-4">${formatPrice(product.price)}</p>
              <p class="text-on-surface-variant leading-relaxed">تيشيرت أوفر سايز بتصميم حصري من مجموعة عشانك. قطن مصري ثقيل 280GSM.</p>
              <div class="mt-8">
                <label class="block mb-3 font-bold">المقاس</label>
                <div class="flex gap-3 justify-end">
                  ${product.sizes.map(s => `<button class="size-btn w-14 h-14 rounded-xl border border-outline-variant hover:border-primary font-bold">${s}</button>`).join('')}
                </div>
              </div>
              <div class="flex gap-4 mt-10">
                <button class="add-to-cart-btn flex-1 bg-primary text-white py-5 rounded-2xl font-bold text-lg" data-id="${product.id}">أضف إلى السلة</button>
              </div>
              <button class="back-btn mt-8 w-full text-primary underline">← العودة للمتجر</button>
            </div>
          </div>
        </main>
      `;
      showPage('product');
      pageProduct.querySelector('.add-to-cart-btn').addEventListener('click', () => addToCart(product));
      pageProduct.querySelectorAll('.back-btn').forEach(b => b.addEventListener('click', () => showPage('store')));
    }

    // ========== سلة التسوق ==========
    function renderCart() {
      const subtotal = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
      pageCart.innerHTML = `
        <nav class="fixed top-0 w-full z-50 glass-nav">
          <div class="flex items-center h-20 px-4 md:px-8 max-w-screen-2xl mx-auto">
            <button class="back-to-store p-2 hover:bg-primary/5 rounded-full"><span class="material-symbols-outlined">arrow_forward</span></button>
            <div class="flex-1 text-center font-headline text-xl font-bold">سلة التسوق</div>
            <div class="w-10"></div>
          </div>
        </nav>
        <main class="pt-28 pb-32 px-4 md:px-8 max-w-screen-xl mx-auto">
          ${cart.length === 0 ? `
            <div class="text-center py-20 bg-surface-low rounded-4xl">
              <span class="material-symbols-outlined text-6xl text-outline">shopping_bag</span>
              <h2 class="text-2xl font-bold mt-4">سلتك فارغة</h2>
              <button class="back-to-store mt-6 bg-primary text-white px-8 py-3 rounded-full">تصفح المتجر</button>
            </div>
          ` : `
            <div class="grid lg:grid-cols-3 gap-8">
              <div class="lg:col-span-2 space-y-4">
                ${cart.map((item, idx) => `
                  <div class="bg-surface-lowest p-5 rounded-3xl shadow-ambient flex flex-col sm:flex-row gap-5 items-center">
                    <img src="${item.image}" class="w-28 h-28 object-cover rounded-2xl">
                    <div class="flex-1 text-right">
                      <h4 class="font-bold text-lg">${item.name}</h4>
                      <p class="text-primary font-bold">${formatPrice(item.price)}</p>
                    </div>
                    <div class="flex items-center gap-3">
                      <button class="qty-dec w-10 h-10 rounded-full bg-surface-low" data-idx="${idx}">−</button>
                      <span class="w-8 text-center font-bold">${item.quantity}</span>
                      <button class="qty-inc w-10 h-10 rounded-full bg-surface-low" data-idx="${idx}">+</button>

                  <div class="flex justify-between"><span>المجموع</span><span>${formatPrice(subtotal)}</span></div>
                  <div class="flex justify-between"><span>الشحن</span><span>يُحسب لاحقاً</span></div>
                </div>
                <hr class="my-6">
                <div class="flex justify-between text-xl font-black"><span>الإجمالي</span><span>${formatPrice(subtotal)}</span></div>
                
                <div class="mt-8 space-y-4">
                  <input type="text" id="custName" placeholder="الاسم الكامل" class="w-full bg-surface-low border-none rounded-xl p-4 text-right">
                  <input type="tel" id="custPhone" placeholder="رقم الجوال" class="w-full bg-surface-low border-none rounded-xl p-4 text-right">
                  <textarea id="custAddress" placeholder="العنوان بالتفصيل" class="w-full bg-surface-low border-none rounded-xl p-4 text-right" rows="2"></textarea>
                </div>
                <button id="placeOrderBtn" class="w-full mt-6 bg-gradient-to-l from-primary to-primary-container text-white py-5 rounded-xl font-bold text-lg">تأكيد الطلب</button>
                <button id="cancelOrderBtn" class="w-full mt-3 bg-error/10 text-error py-3 rounded-xl font-medium">إلغاء الطلب</button>
                <div id="orderFeedback" class="mt-4 text-sm text-center"></div>
              </div>
            </div>
          `}
        </main>
      `;
      updateCartBadges();
      
      pageCart.querySelectorAll('.back-to-store').forEach(b => b.addEventListener('click', () => showPage('store')));
      
      if (cart.length > 0) {
        pageCart.querySelectorAll('.qty-inc').forEach(b => b.addEventListener('click', (e) => {
          const idx = e.currentTarget.dataset.idx;
          cart[idx].quantity++;
          saveCart(); renderCart();
        }));
        pageCart.querySelectorAll('.qty-dec').forEach(b => b.addEventListener('click', (e) => {
          const idx = e.currentTarget.dataset.idx;
          if (cart[idx].quantity > 1) cart[idx].quantity--;
          else cart.splice(idx, 1);
          saveCart(); renderCart();
        }));
        pageCart.querySelectorAll('.remove-item').forEach(b => b.addEventListener('click', (e) => {
          const idx = e.currentTarget.dataset.idx;
          cart.splice(idx, 1);
          saveCart(); renderCart();
        }));
        
        document.getElementById('placeOrderBtn').addEventListener('click', async () => {
          const name = document.getElementById('custName')?.value.trim();
          const phone = document.getElementById('custPhone')?.value.trim();
          const address = document.getElementById('custAddress')?.value.trim();
          if (!name || !phone || !address) return alert('الرجاء إدخال الاسم ورقم الجوال والعنوان');
          
          const total = cart.reduce((s,i) => s + i.price*i.quantity, 0);
          const order = {
            action: 'طلب_جديد',
            customer: { name, phone, address, email: currentUser?.email || 'غير مسجل' },
            items: cart.map(i => `${i.name} (${i.quantity})`).join(' | '),
            total: total + ' ر.س',
            timestamp: new Date().toLocaleString('ar-EG')
          };
          
          try {
            await fetch(FORMSPREE_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(order) });
            document.getElementById('orderFeedback').textContent = '✅ تم إرسال الطلب بنجاح!';
            cart = []; saveCart(); updateCartBadges();
            setTimeout(() => showPage('store'), 1500);
          } catch { 
            document.getElementById('orderFeedback').textContent = '⚠️ خطأ في الإرسال، لكن الطلب محفوظ محلياً.';
          }
        });
        
        document.getElementById('cancelOrderBtn').addEventListener('click', async () => {
          const name = document.getElementById('custName')?.value.trim() || 'عميل';
          const phone = document.getElementById('custPhone')?.value.trim() || 'غير محدد';
          const cancelData = {
            action: 'إلغاء_طلب',
            customer: { name, phone },
            items: cart.map(i => i.name).join(', '),
            timestamp: new Date().toLocaleString('ar-EG')
          };
          await fetch(FORMSPREE_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cancelData) });
          cart = []; saveCart(); updateCartBadges();
          document.getElementById('orderFeedback').textContent = '🔄 تم إلغاء الطلب';
          setTimeout(() => showPage('store'), 1200);
        });
      }
    }

    // ========== صفحة التوثيق (Google Identity Services حقيقي) ==========
    function renderAuth() {
      pageAuth.innerHTML = `
        <main class="min-h-screen flex items-center justify-center p-6 bg-surface">
          <div class="absolute inset-0 overflow-hidden"><div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div></div>
          <div class="relative z-10 w-full max-w-md">
            <div class="text-center mb-10">
              <h1 class="font-headline font-black text-5xl text-primary">عشانك</h1>
              <p class="text-sm tracking-widest mt-2">أزياء الشارع المنسقة</p>
            </div>
            <div class="glass-card bg-white/80 p-8 md:p-10 rounded-4xl shadow-ambient">
              <div id="authLoggedOutView">
                <h2 class="font-headline text-2xl font-extrabold text-center mb-6">تسجيل الدخول</h2>
                
                <!-- حاوية زر Google الرسمي -->
                <div id="google-signin-btn-container" class="flex justify-center mb-4"></div>
                
                <div class="relative my-8">
                  <hr class="border-outline-variant/30">
                  <span class="absolute left-1/2 -translate-x-1/2 -top-3 bg-white px-4 text-xs">أو</span>
                </div>
                
                <div class="text-center text-sm text-on-surface-variant">
                  <p>سيتم تفعيل التسجيل بالبريد قريباً</p>
                  <button class="back-to-store mt-6 text-primary font-bold underline">العودة للمتجر</button>
                </div>
              </div>
              
              <div id="authLoggedInView" class="hidden text-center">
                <span class="material-symbols-outlined text-6xl text-primary">check_circle</span>
                <h3 class="text-xl font-bold mt-4" id="userDisplayName">مرحباً</h3>
                <p class="text-on-surface-variant text-sm" id="userEmail"></p>
                <button id="logoutBtn" class="mt-8 bg-error/10 text-error py-3 px-8 rounded-xl font-medium">تسجيل الخروج</button>
                <button class="back-to-store mt-4 w-full bg-primary text-white py-3 rounded-xl">العودة للمتجر</button>
              </div>
            </div>
          </div>
        </main>
      `;
      showPage('auth');
      
      // إعداد Google Identity Services
      if (window.google) {
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: logincallback,
          auto_select: false,
          context: 'signin',
          ux_mode: 'popup'
        });
        
        google.accounts.id.renderButton(
          document.getElementById('google-signin-btn-container'),
          { 
            type: 'standard', 
            theme: 'outline', 
            size: 'large', 
            text: 'signin_with',
            shape: 'rectangular',
            logo_alignment: 'left',
            width: 280
          }
        );
      }
      
      // تحديث واجهة المستخدم حسب حالة تسجيل الدخول
      function updateAuthUI() {
        const loggedOutView = document.getElementById('authLoggedOutView');
        const loggedInView = document.getElementById('authLoggedInView');
        if (currentUser) {
          loggedOutView.classList.add('hidden');
          loggedInView.classList.remove('hidden');
          document.getElementById('userDisplayName').textContent = currentUser.name;
          document.getElementById('userEmail').textContent = currentUser.email;
        } else {
          loggedOutView.classList.remove('hidden');
          loggedInView.classList.add('hidden');
        }
      }
      updateAuthUI();
      
      pageAuth.querySelector('#logoutBtn')?.addEventListener('click', () => {
        currentUser = null;
        updateAuthUI();
        showPage('store');
      });
      
      pageAuth.querySelectorAll('.back-to-store').forEach(b => b.addEventListener('click', () => showPage('store')));
    }

    // ========== دالة callback لـ Google ==========
    window.logincallback = function(response) {
      try {
        // فك تشفير JWT للحصول على بيانات المستخدم
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = {
          name: payload.name,
          email: payload.email,
          picture: payload.picture
        };
        
        // تحديث واجهة المستخدم
        const loggedOutView = document.getElementById('authLoggedOutView');
        const loggedInView = document.getElementById('authLoggedInView');
        if (loggedOutView && loggedInView) {
          loggedOutView.classList.add('hidden');
          loggedInView.classList.remove('hidden');
          document.getElementById('userDisplayName').textContent = currentUser.name;
          document.getElementById('userEmail').textContent = currentUser.email;
        }
        
        // الانتقال للمتجر بعد ثانية
        setTimeout(() => showPage('store'), 1000);
      } catch (e) {
        console.error('خطأ في معالجة تسجيل الدخول:', e);
      }
    };

    // ========== لوحة التحكم ==========
    function renderDashboard() {
      pageDashboard.innerHTML = `
        <nav class="fixed top-0 w-full z-50 glass-nav">
          <div class="flex items-center h-20 px-4 md:px-8 max-w-screen-2xl mx-auto">
            <button class="back-to-store p-2 hover:bg-primary/5 rounded-full"><span class="material-symbols-outlined">arrow_forward</span></button>
            <div class="flex-1 text-center font-headline text-xl font-bold">لوحة تحكم المخزون</div>
            <div class="w-10"></div>
          </div>
        </nav>
        <main class="pt-28 pb-24 px-4 md:px-8 max-w-screen-2xl mx-auto">
          <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-surface-lowest p-8 rounded-4xl shadow-ambient">
              <h2 class="text-2xl font-bold mb-6">إضافة منتج جديد</h2>
              <div class="border-2 border-dashed border-outline-variant rounded-3xl p-8 text-center">
                <span class="material-symbols-outlined text-5xl text-outline">cloud_upload</span>
                <p class="font-bold mt-2">اسحب الصور هنا</p>
              </div>
              <input placeholder="اسم المنتج" class="w-full bg-surface-low border-none rounded-xl p-4 mt-6">
              <input placeholder="السعر (ر.س)" class="w-full bg-surface-low border-none rounded-xl p-4 mt-4">
              <button class="w-full mt-6 bg-primary text-white py-5 rounded-xl font-bold">نشر المنتج</button>
            </div>
            <div class="bg-surface-lowest p-6 rounded-4xl shadow-ambient">
              <h3 class="font-bold text-lg mb-4">المنتجات النشطة</h3>
              ${products.slice(0,3).map(p => `
                <div class="flex gap-4 items-center py-3 border-b">
                  <img src="${p.image}" class="w-14 h-14 rounded-xl object-cover">
                  <div><p class="font-bold">${p.name}</p><p>${formatPrice(p.price)}</p></div>
                </div>
              `).join('')}
            </div>
          </div>
        </main>
      `;
      pageDashboard.querySelector('.back-to-store').addEventListener('click', () => showPage('store'));
    }

    // ========== ربط التنقل ==========
    document.querySelectorAll('[data-page]').forEach(el => {
      el.addEventListener('click', (e) => { e.preventDefault(); showPage(el.dataset.page); });
    });

    // بدء التطبيق
    renderStore();
    updateCartBadges();
    
    // دوال عامة
    window.showPage = showPage;
    window.addToCart = addToCart;
  })();
</script>
</body>
</html>
