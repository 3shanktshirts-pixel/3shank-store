<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تسجيل الدخول · عشانك</title>
  <!-- الخطوط والأيقونات -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f5f7fa 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #0a1929;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 48px;
      padding: 44px 36px;
      box-shadow: 0 30px 50px -10px rgba(10, 25, 41, 0.15), 0 10px 30px -10px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .logo {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -1.5px;
      text-align: center;
      margin-bottom: 40px;
      color: #0a1929;
    }

    .logo span {
      color: #0a1929;
      font-weight: 300;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      padding: 18px 20px;
      font-size: 17px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #d0d9e8;
      border-radius: 28px;
      font-weight: 500;
      transition: 0.2s;
      color: #0a1929;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
    }

    .input-field:focus {
      outline: none;
      border-color: #0a1929;
      background: white;
      box-shadow: 0 4px 12px rgba(10, 25, 41, 0.1);
    }

    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 48px;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-primary {
      background: #0a1929;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(10, 25, 41, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.98);
      background: #1e3a5f;
    }

    .btn-outline {
      background: white;
      color: #0a1929;
      border: 1px solid #d0d9e8;
      box-shadow: 0 6px 16px rgba(0,0,0,0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 28px 0;
      color: #5a6d7e;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #d0d9e8;
    }

    .divider-text {
      padding: 0 16px;
      font-weight: 500;
    }

    .toggle-link {
      text-align: center;
      margin-top: 24px;
      color: #2c3e50;
    }

    .toggle-link a {
      color: #0a1929;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1.5px solid #0a1929;
    }

    .error-message {
      color: #c0392b;
      font-size: 14px;
      margin-top: 8px;
      text-align: center;
    }

    .g_id_signin {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .demo-note {
      text-align: center;
      margin-top: 24px;
      opacity: 0.7;
      font-size: 13px;
      color: #2c3e50;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo">عشانك<span>.</span></div>

  <!-- نموذج تسجيل الدخول -->
  <div id="loginForm">
    <div class="input-group">
      <input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني" value="user@demo.com" dir="ltr">
    </div>
    <div class="input-group">
      <input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور" value="123456" dir="ltr">
    </div>
    <button class="btn btn-primary" id="loginSubmit">تسجيل الدخول</button>
    <div class="toggle-link">
      ليس لديك حساب؟ <a href="#" id="showRegister">إنشاء حساب جديد</a>
    </div>
  </div>

  <!-- نموذج إنشاء حساب (مخفي افتراضيًا) -->
  <div id="registerForm" style="display: none;">
    <div class="input-group">
      <input type="text" id="regName" class="input-field" placeholder="الاسم الكامل">
    </div>
    <div class="input-group">
      <input type="email" id="regEmail" class="input-field" placeholder="البريد الإلكتروني" dir="ltr">
    </div>
    <div class="input-group">
      <input type="password" id="regPassword" class="input-field" placeholder="كلمة المرور" dir="ltr">
    </div>
    <button class="btn btn-primary" id="registerSubmit">إنشاء حساب</button>
    <div class="toggle-link">
      لديك حساب بالفعل؟ <a href="#" id="showLogin">تسجيل الدخول</a>
    </div>
  </div>

  <div class="divider">
    <span class="divider-line"></span>
    <span class="divider-text">أو</span>
    <span class="divider-line"></span>
  </div>

  <!-- Google Sign-In -->
  <div id="g_id_onload"
       data-client_id="876111425484-6hrf70a1d9kh2uvcrr56ih3f1koro67v.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="logincallback"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
       data-type="standard"
       data-shape="rectangular"
       data-theme="outline"
       data-text="signin_with"
       data-size="large"
       data-logo_alignment="left">
  </div>

  <div id="errorMsg" class="error-message"></div>
  <p class="demo-note">بيانات تجريبية: admin@teeshop.com / admin123</p>
</div>

<script>
  (function() {
    // ---------- تخزين المستخدمين والجلسة ----------
    const STORAGE_USERS = 'teeshop_users';
    const STORAGE_CURRENT = 'teeshop_current';

    // تهيئة بيانات افتراضية
    if (!localStorage.getItem(STORAGE_USERS)) {
      const defaultUsers = [
        { email: 'admin@teeshop.com', password: 'admin123', name: 'المدير', role: 'admin' },
        { email: 'user@demo.com', password: '123456', name: 'أحمد', role: 'user' }
      ];
      localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
    }

    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');

    // تبديل النماذج
    document.getElementById('showRegister').addEventListener('click', (e) => {
      e.preventDefault();
      loginFormDiv.style.display = 'none';
      registerFormDiv.style.display = 'block';
      errorMsg.textContent = '';
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      registerFormDiv.style.display = 'none';
      loginFormDiv.style.display = 'block';
      errorMsg.textContent = '';
    });

    // تسجيل الدخول التقليدي
    document.getElementById('loginSubmit').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS));
      const user = users.find(u => u.email === email && u.password === password);
      
      if (user) {
        const sessionUser = {
          email: user.email,
          name: user.name,
          role: user.role,
          phone: user.phone || '',
          loggedInAt: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_CURRENT, JSON.stringify(sessionUser));
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
      }
    });

    // إنشاء حساب جديد
    document.getElementById('registerSubmit').addEventListener('click', () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      
      if (!name || !email || !password) {
        errorMsg.textContent = 'جميع الحقول مطلوبة';
        return;
      }
      
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS));
      if (users.find(u => u.email === email)) {
        errorMsg.textContent = 'البريد الإلكتروني مستخدم بالفعل';
        return;
      }
      
      const newUser = { email, password, name, role: 'user' };
      users.push(newUser);
      localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
      
      // تسجيل الدخول تلقائيًا
      const sessionUser = { email: newUser.email, name: newUser.name, role: newUser.role };
      localStorage.setItem(STORAGE_CURRENT, JSON.stringify(sessionUser));
      window.location.href = 'index.html';
    });

    // دالة callback لتسجيل الدخول عبر Google
    window.logincallback = async (response) => {
      try {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const email = payload.email;
        const name = payload.name || email.split('@')[0];
        
        let users = JSON.parse(localStorage.getItem(STORAGE_USERS));
        let user = users.find(u => u.email === email);
        
        if (!user) {
          // إنشاء حساب جديد تلقائيًا إذا لم يكن موجودًا
          user = { email, name, role: 'user', password: '' };
          users.push(user);
          localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        }
        
        const sessionUser = { email: user.email, name: user.name, role: user.role };
        localStorage.setItem(STORAGE_CURRENT, JSON.stringify(sessionUser));
        window.location.href = 'index.html';
      } catch (e) {
        errorMsg.textContent = 'حدث خطأ أثناء تسجيل الدخول بـ Google';
        console.error(e);
      }
    };

    // توجيه المستخدم المسجل بالفعل إلى الصفحة الرئيسية
    if (localStorage.getItem(STORAGE_CURRENT)) {
      window.location.href = 'index.html';
    }
  })();
</script>
</body>
</html>
