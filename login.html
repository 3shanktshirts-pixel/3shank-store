<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>تسجيل الدخول · عشانك</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#ffdad6", "on-surface": "#1a1c1f", "inverse-surface": "#2e3034",
            "on-secondary-fixed": "#1c1b1b", "tertiary-container": "#592300", "surface-bright": "#f9f9fe",
            "on-tertiary-fixed-variant": "#723610", "surface-container": "#ededf2", "on-secondary-container": "#636262",
            "surface-container-high": "#e8e8ed", "secondary": "#5f5e5e", "on-background": "#1a1c1f",
            "on-error": "#ffffff", "on-tertiary-container": "#d8885c", "surface-container-low": "#f3f3f8",
            "primary-fixed-dim": "#a7c8ff", "primary": "#001e40", "on-primary-fixed-variant": "#1f477b",
            "surface": "#f9f9fe", "on-secondary": "#ffffff", "on-error-container": "#93000a",
            "surface-dim": "#d9dade", "outline": "#737780", "tertiary": "#381300",
            "secondary-container": "#e2dfde", "error": "#ba1a1a", "tertiary-fixed-dim": "#ffb690",
            "surface-container-lowest": "#ffffff", "primary-container": "#003366", "on-secondary-fixed-variant": "#474746",
            "on-primary": "#ffffff", "tertiary-fixed": "#ffdbca", "outline-variant": "#c3c6d1",
            "inverse-on-surface": "#f0f0f5", "primary-fixed": "#d5e3ff", "on-tertiary-fixed": "#341100",
            "surface-tint": "#3a5f94", "on-primary-container": "#799dd6", "on-surface-variant": "#43474f",
            "on-primary-fixed": "#001b3c", "secondary-fixed": "#e5e2e1", "inverse-primary": "#a7c8ff",
            "background": "#f9f9fe", "secondary-fixed-dim": "#c8c6c5", "surface-container-highest": "#e2e2e7",
            "surface-variant": "#e2e2e7", "on-tertiary": "#ffffff"
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
          fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Inter"], "label": ["Inter"] }
        }
      }
    }
  </script>
  
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <!-- الشعار -->
  <div class="text-center mb-8">
    <h1 class="font-headline text-5xl font-black tracking-tight text-primary">عشانك<span class="text-on-primary-container">.</span></h1>
    <p class="text-on-surface/60 mt-2">تسوق أحدث صيحات الموضة</p>
  </div>

  <!-- بطاقة تسجيل الدخول -->
  <div class="glass-card rounded-[2.5rem] p-8 shadow-[0_20px_50px_rgba(0,30,64,0.12)] border border-white/20">
    
    <!-- نموذج تسجيل الدخول -->
    <div id="loginForm">
      <div class="mb-4">
        <input type="email" id="loginEmail" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body placeholder:text-outline focus:ring-2 focus:ring-primary-container" placeholder="البريد الإلكتروني" value="user@demo.com" dir="ltr">
      </div>
      <div class="mb-4">
        <input type="password" id="loginPassword" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body placeholder:text-outline focus:ring-2 focus:ring-primary-container" placeholder="كلمة المرور" value="123456" dir="ltr">
      </div>
      <button id="loginSubmit" class="w-full bg-primary text-white py-4 rounded-full font-headline font-semibold text-lg hover:shadow-lg transition-all active:scale-95 mb-4">
        تسجيل الدخول
      </button>
      <p class="text-center text-on-surface/60">
        ليس لديك حساب؟ 
        <a href="#" id="showRegister" class="text-primary font-semibold hover:underline underline-offset-4">إنشاء حساب جديد</a>
      </p>
    </div>

    <!-- نموذج إنشاء حساب -->
    <div id="registerForm" style="display: none;">
      <div class="mb-4">
        <input type="text" id="regName" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body placeholder:text-outline focus:ring-2 focus:ring-primary-container" placeholder="الاسم الكامل">
      </div>
      <div class="mb-4">
        <input type="email" id="regEmail" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body placeholder:text-outline focus:ring-2 focus:ring-primary-container" placeholder="البريد الإلكتروني" dir="ltr">
      </div>
      <div class="mb-4">
        <input type="password" id="regPassword" class="w-full p-4 bg-surface-container-low rounded-full border-none font-body placeholder:text-outline focus:ring-2 focus:ring-primary-container" placeholder="كلمة المرور" dir="ltr">
      </div>
      <button id="registerSubmit" class="w-full bg-primary text-white py-4 rounded-full font-headline font-semibold text-lg hover:shadow-lg transition-all active:scale-95 mb-4">
        إنشاء حساب
      </button>
      <p class="text-center text-on-surface/60">
        لديك حساب بالفعل؟ 
        <a href="#" id="showLogin" class="text-primary font-semibold hover:underline underline-offset-4">تسجيل الدخول</a>
      </p>
    </div>

    <!-- فاصل -->
    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-outline-variant"></div>
      <span class="text-sm text-outline">أو</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>

    <!-- Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="876111425484-6hrf70a1d9kh2uvcrr56ih3f1koro67v.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="logincallback"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin flex justify-center"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>

    <div id="errorMsg" class="text-error text-sm text-center mt-4"></div>
    
    <p class="text-center text-xs text-outline mt-6">
      بيانات تجريبية: admin@teeshop.com / admin123
    </p>
  </div>
</div>

<script>
  (function() {
    const STORAGE_USERS = 'teeshop_users';
    const STORAGE_CURRENT = 'teeshop_current';

    async function loadUsersFromJSON() {
      try {
        const res = await fetch('users.json');
        if (res.ok) {
          const jsonUsers = await res.json();
          let localUsers = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
          jsonUsers.forEach(u => { if (!localUsers.find(lu => lu.email === u.email)) localUsers.push(u); });
          localStorage.setItem(STORAGE_USERS, JSON.stringify(localUsers));
        }
      } catch(e) {}
      if (!localStorage.getItem(STORAGE_USERS)) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify([
          { email: 'admin@teeshop.com', password: 'admin123', name: 'المدير', role: 'admin' },
          { email: 'user@demo.com', password: '123456', name: 'أحمد', role: 'user' }
        ]));
      }
    }
    loadUsersFromJSON();

    const loginDiv = document.getElementById('loginForm');
    const registerDiv = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');

    document.getElementById('showRegister').addEventListener('click', e => {
      e.preventDefault();
      loginDiv.style.display = 'none';
      registerDiv.style.display = 'block';
      errorMsg.textContent = '';
    });

    document.getElementById('showLogin').addEventListener('click', e => {
      e.preventDefault();
      registerDiv.style.display = 'none';
      loginDiv.style.display = 'block';
      errorMsg.textContent = '';
    });

    document.getElementById('loginSubmit').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS));
      const user = users.find(u => u.email === email && u.password === pass);
      
      if (user) {
        localStorage.setItem(STORAGE_CURRENT, JSON.stringify({
          email: user.email, name: user.name, role: user.role, phone: user.phone
        }));
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
      }
    });

    document.getElementById('registerSubmit').addEventListener('click', () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      
      if (!name || !email || !pass) {
        errorMsg.textContent = 'جميع الحقول مطلوبة';
        return;
      }
      
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS));
      if (users.find(u => u.email === email)) {
        errorMsg.textContent = 'البريد الإلكتروني مستخدم بالفعل';
        return;
      }
      
      const newUser = { email, password: pass, name, role: 'user' };
      users.push(newUser);
      localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
      localStorage.setItem(STORAGE_CURRENT, JSON.stringify({ email, name, role: 'user' }));
      window.location.href = 'index.html';
    });

    window.logincallback = async (response) => {
      try {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const email = payload.email;
        const name = payload.name || email.split('@')[0];
        
        let users = JSON.parse(localStorage.getItem(STORAGE_USERS));
        let user = users.find(u => u.email === email);
        
        if (!user) {
          user = { email, name, role: 'user', password: '' };
          users.push(user);
          localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        }
        
        localStorage.setItem(STORAGE_CURRENT, JSON.stringify({
          email: user.email, name: user.name, role: user.role
        }));
        window.location.href = 'index.html';
      } catch (e) {
        errorMsg.textContent = 'حدث خطأ أثناء تسجيل الدخول بـ Google';
      }
    };

    if (localStorage.getItem(STORAGE_CURRENT)) {
      window.location.href = 'index.html';
    }
  })();
</script>
</body>
</html>
