<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تسجيل الدخول · عشانك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, rgba(10,25,41,0.02) 0%, #f2f5f9 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; color: #0a1929;
    }
    .glass-card {
      width: 100%; max-width: 440px;
      background: rgba(255,255,255,0.68); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
      border-radius: 52px; padding: 40px 32px;
      box-shadow: 0 30px 50px -10px rgba(10,25,41,0.15), 0 0 0 1px rgba(255,255,255,0.6) inset;
      border: 0.5px solid rgba(255,255,255,0.9);
    }
    .logo { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; text-align: center; margin-bottom: 36px; color: #0a1929; }
    .logo span { font-weight: 300; }
    .input-field {
      width: 100%; padding: 18px 20px; font-size: 16px;
      background: rgba(255,255,255,0.7); border: 0.5px solid rgba(10,25,41,0.1);
      border-radius: 32px; backdrop-filter: blur(10px); margin-bottom: 16px;
      transition: 0.2s; color: #0a1929; font-weight: 500;
    }
    .input-field:focus { outline: none; border-color: #0a1929; background: white; }
    .btn {
      width: 100%; padding: 18px; border: none; border-radius: 48px; font-weight: 700;
      font-size: 18px; cursor: pointer; transition: 0.2s; margin-top: 8px;
    }
    .btn-primary { background: #0a1929; color: white; box-shadow: 0 12px 20px -8px rgba(10,25,41,0.3); }
    .btn-primary:active { background: #1e3a5f; transform: scale(0.98); }
    .divider { display: flex; align-items: center; margin: 28px 0; color: #4a5a6a; }
    .divider-line { flex:1; height:1px; background: rgba(10,25,41,0.1); }
    .toggle-link { text-align: center; margin-top: 24px; }
    .toggle-link a { color: #0a1929; font-weight: 700; text-decoration: none; border-bottom: 1.5px solid #0a1929; }
    .g_id_signin { display: flex; justify-content: center; margin-top: 16px; }
    .error-message { color: #c0392b; text-align: center; margin-top: 10px; font-size: 14px; }
    .demo-note { text-align: center; margin-top: 24px; opacity: 0.6; font-size: 13px; }
  </style>
</head>
<body>
<div class="glass-card">
  <div class="logo">عشانك<span>.</span></div>
  
  <!-- نموذج تسجيل الدخول -->
  <div id="loginForm">
    <input type="email" id="loginEmail" class="input-field" placeholder="البريد الإلكتروني" value="user@demo.com" dir="ltr">
    <input type="password" id="loginPassword" class="input-field" placeholder="كلمة المرور" value="123456" dir="ltr">
    <button class="btn btn-primary" id="loginSubmit">تسجيل الدخول</button>
    <div class="toggle-link">ليس لديك حساب؟ <a href="#" id="showRegister">إنشاء حساب جديد</a></div>
  </div>

  <!-- نموذج إنشاء حساب -->
  <div id="registerForm" style="display: none;">
    <input type="text" id="regName" class="input-field" placeholder="الاسم الكامل">
    <input type="email" id="regEmail" class="input-field" placeholder="البريد الإلكتروني" dir="ltr">
    <input type="password" id="regPassword" class="input-field" placeholder="كلمة المرور" dir="ltr">
    <button class="btn btn-primary" id="registerSubmit">إنشاء حساب</button>
    <div class="toggle-link">لديك حساب بالفعل؟ <a href="#" id="showLogin">تسجيل الدخول</a></div>
  </div>

  <div class="divider"><span class="divider-line"></span><span style="padding:0 12px;">أو</span><span class="divider-line"></span></div>

  <!-- Google Sign-In -->
  <div id="g_id_onload"
       data-client_id="876111425484-6hrf70a1d9kh2uvcrr56ih3f1koro67v.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="logincallback"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
       data-type="standard"
       data-shape="rectangular"
       data-theme="outline"
       data-text="signin_with"
       data-size="large"
       data-logo_alignment="left">
  </div>

  <div id="errorMsg" class="error-message"></div>
  <p class="demo-note">admin@teeshop.com / admin123</p>
</div>

<script>
  (function() {
    const STORAGE_USERS = 'teeshop_users';
    const STORAGE_CURRENT = 'teeshop_current';

    async function loadUsersFromJSON() {
      try {
        const res = await fetch('users.json');
        if (res.ok) {
          const jsonUsers = await res.json();
          let localUsers = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
          jsonUsers.forEach(u => { if (!localUsers.find(lu => lu.email === u.email)) localUsers.push(u); });
          localStorage.setItem(STORAGE_USERS, JSON.stringify(localUsers));
        }
      } catch(e) { console.warn('users.json not loaded'); }
      if (!localStorage.getItem(STORAGE_USERS)) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify([{ email: 'admin@teeshop.com', password: 'admin123', name: 'المدير', role: 'admin' }]));
      }
    }
    loadUsersFromJSON();

    const loginDiv = document.getElementById('loginForm');
    const registerDiv = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');

    document.getElementById('showRegister').addEventListener('click', e => { e.preventDefault(); loginDiv.style.display='none'; registerDiv.style.display='block'; errorMsg.textContent=''; });
    document.getElementById('showLogin').addEventListener('click', e => { e.preventDefault(); registerDiv.style.display='none'; loginDiv.style.display='block'; errorMsg.textContent=''; });

    document.getElementById('loginSubmit').addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS));
      const user = users.find(u => u.email === email && u.password === pass);
      if(user) {
        localStorage.setItem(STORAGE_CURRENT, JSON.stringify({ email: user.email, name: user.name, role: user.role, phone: user.phone }));
        window.location.href = 'index.html';
      } else errorMsg.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
    });

    document.getElementById('registerSubmit').addEventListener('click', () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      if(!name||!email||!pass) { errorMsg.textContent = 'جميع الحقول مطلوبة'; return; }
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS));
      if(users.find(u=>u.email===email)) { errorMsg.textContent='البريد الإلكتروني مستخدم بالفعل'; return; }
      const newUser = { email, password: pass, name, role: 'user' };
      users.push(newUser);
      localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
      localStorage.setItem(STORAGE_CURRENT, JSON.stringify({ email, name, role: 'user' }));
      window.location.href = 'index.html';
    });

    window.logincallback = async (response) => {
      try {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const email = payload.email;
        const name = payload.name || email.split('@')[0];
        let users = JSON.parse(localStorage.getItem(STORAGE_USERS));
        let user = users.find(u => u.email === email);
        if(!user) { user = { email, name, role: 'user', password: '' }; users.push(user); localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
        localStorage.setItem(STORAGE_CURRENT, JSON.stringify({ email: user.email, name: user.name, role: user.role }));
        window.location.href = 'index.html';
      } catch(e) { errorMsg.textContent = 'خطأ في تسجيل الدخول بـ Google'; }
    };

    if(localStorage.getItem(STORAGE_CURRENT)) window.location.href = 'index.html';
  })();
</script>
</body>
</html>
